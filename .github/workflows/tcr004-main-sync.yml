---
name: TCR-004 Main Sync

on:
  push:
    branches:
      - feat/tcr-004-proficiency-reference-index
    paths:
      - ".github/workflows/tcr004-main-sync.yml"

permissions:
  contents: write

jobs:
  sync-main:
    if: github.repository == 'blakinio/canary' && github.ref == 'refs/heads/feat/tcr-004-proficiency-reference-index'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact branch
        uses: actions/checkout@v4
        with:
          ref: feat/tcr-004-proficiency-reference-index
          fetch-depth: 0

      - name: Merge current main and remove helper
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git merge --no-edit origin/main
          rm .github/workflows/tcr004-main-sync.yml
          git add .github/workflows/tcr004-main-sync.yml
          git commit -m "ci(tcr): remove temporary main sync helper"
          git push origin HEAD:feat/tcr-004-proficiency-reference-index
