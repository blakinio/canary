name: Finalize CS-007 validation gaps

on:
  pull_request:
    types: [synchronize]

permissions:
  contents: write

jobs:
  finalize:
    if: >-
      github.event.pull_request.number == 328 &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.head_ref == 'security/table-unserialize-safe'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: security/table-unserialize-safe
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}
      - run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq luajit
      - name: Correct baseline and add value-count regression
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          program_path = Path('docs/agents/programs/CRYSTALSERVER_COMPARISON_PROGRAM.md')
          program = program_path.read_text()
          wrong = '360d79ebad5802edd0d89e99d0f210ab19b36b60'
          correct = '360d79ebad5802edd4d89e99d0f210ab19b36b60'
          if program.count(wrong) != 1:
              raise SystemExit(f'program SHA typo anchor count: {program.count(wrong)}')
          program_path.write_text(program.replace(wrong, correct))

          test_path = Path('tests/lua/test_tables.lua')
          test = test_path.read_text()
          anchor = '''test("enforces input size", function()
          \tlocal decoded, err = table.unserialize(string.rep(" ", 1024 * 1024 + 1))
          \tassert_equal(decoded, nil)
          \tassert_truthy(type(err) == "string" and err:find("large", 1, true) ~= nil)
          end)
          '''
          addition = '''test("enforces parsed value count", function()
          \tlocal source = "{" .. string.rep("0,", 100001) .. "}"
          \tlocal decoded, err = table.unserialize(source)
          \tassert_equal(decoded, nil)
          \tassert_truthy(type(err) == "string" and err:find("value count", 1, true) ~= nil)
          end)

          '''
          if test.count(anchor) != 1:
              raise SystemExit(f'test anchor count: {test.count(anchor)}')
          if addition not in test:
              test = test.replace(anchor, addition + anchor)
          test_path.write_text(test)
          PY

          luajit tests/lua/test_tables.lua
          if grep -Eq '\bloadstring?\s*\(' data/libs/functions/tables.lua; then
            echo 'dynamic Lua loader remains in tables.lua' >&2
            exit 1
          fi

          workflow='.github/workflows/finalize-cs007-gaps.yml'
          rm -f "$workflow"
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          actual="$(git diff --cached --name-only | sort)"
          expected="$(printf '%s\n' "$workflow" 'docs/agents/programs/CRYSTALSERVER_COMPARISON_PROGRAM.md' 'tests/lua/test_tables.lua' | sort)"
          test "$actual" = "$expected"
          git diff --cached --check
          git commit -m 'test(lua): cover table decoder value limit'
          git push origin HEAD:security/table-unserialize-safe
