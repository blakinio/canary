---
name: Temporary Achievement Helper Source Export

on:
  pull_request:
    paths:
      - ".github/workflows/temp-export-achievement-helper-source.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Upload achievement helper source
        uses: actions/upload-artifact@v4
        with:
          name: achievement-helper-source
          path: data/scripts/lib/register_achievements.lua
          if-no-files-found: error
          retention-days: 1
