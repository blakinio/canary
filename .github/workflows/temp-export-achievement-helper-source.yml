---
name: Temporary Apply Achievement Helper Fix

on:
  pull_request:
    paths:
      - ".github/workflows/temp-export-achievement-helper-source.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout task branch
        uses: actions/checkout@v6
        with:
          ref: fix/achievement-helper-enumeration
          fetch-depth: 0

      - name: Apply bounded helper patch and test
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          registry_path = Path("data/scripts/lib/register_achievements.lua")
          text = registry_path.read_text(encoding="utf-8")
          start_marker = "ACHIEVEMENT_FIRST = 1\n"
          end_marker = "function Player.addAchievementProgress"
          if text.count(start_marker) != 1 or text.count(end_marker) != 1:
              raise SystemExit("achievement helper patch markers are not unique")
          start = text.index(start_marker)
          end = text.index(end_marker, start)
          replacement = '''local achievementIds = {}
          for id in pairs(ACHIEVEMENTS) do
          \tif type(id) == "number" then
          \t\tachievementIds[#achievementIds + 1] = id
          \tend
          end
          table.sort(achievementIds)

          local registeredAchievementIds = {}
          for _, id in ipairs(achievementIds) do
          \tlocal achievTable = ACHIEVEMENTS[id]
          \tif achievTable.name == nil then
          \t\tlogger.error(string.format("[Achievements registration] - Invalid achievement with no name, id: '%s'", id))
          \t\tgoto continue
          \tend

          \tif achievTable.description == nil then
          \t\tlogger.error(string.format("[Achievements registration] - Invalid achievement with no description, id: '%s'", id))
          \t\tgoto continue
          \tend

          \tlocal secret = achievTable.secret or false
          \tlocal grade = achievTable.grade or 0
          \tlocal points = achievTable.points or 0

          \tlogger.trace("[Achievements registration] - Registering achievement '{}' with id '{}'", achievTable.name, id)
          \tGame.registerAchievement(id, achievTable.name, achievTable.description, secret, grade, points)
          \tregisteredAchievementIds[#registeredAchievementIds + 1] = id

          \t::continue::
          end

          ACHIEVEMENT_FIRST = registeredAchievementIds[1] or 0
          ACHIEVEMENT_LAST = registeredAchievementIds[#registeredAchievementIds] or 0

          function Game.isAchievementSecret(achievement)
          \tlocal foundAchievement
          \tif isNumber(achievement) then
          \t\tfoundAchievement = Game.getAchievementInfoById(achievement)
          \telse
          \t\tfoundAchievement = Game.getAchievementInfoByName(achievement)
          \tend

          \tif not foundAchievement then
          \t\tlogger.error("[Game.isAchievementSecret] - Invalid achievement '{}'", achievement)
          \t\treturn false
          \tend

          \treturn foundAchievement.secret
          end

          function Player.getAchievements(self)
          \tlocal unlockedAchievements = {}
          \tfor _, achievementId in ipairs(registeredAchievementIds) do
          \t\tif self:hasAchievement(achievementId) then
          \t\t\tunlockedAchievements[#unlockedAchievements + 1] = achievementId
          \t\tend
          \tend
          \treturn unlockedAchievements
          end

          function Player.addAllAchievements(self, denyMsg)
          \tfor _, achievementId in ipairs(registeredAchievementIds) do
          \t\tself:addAchievement(achievementId, denyMsg)
          \tend
          \treturn true
          end

          function Player.removeAllAchievements(self)
          \tfor _, achievementId in ipairs(registeredAchievementIds) do
          \t\tself:removeAchievement(achievementId)
          \tend
          \treturn true
          end

          function Player.getSecretAchievements(self)
          \tlocal unlockedSecretAchievements = {}
          \tfor _, achievementId in ipairs(registeredAchievementIds) do
          \t\tif self:hasAchievement(achievementId) and ACHIEVEMENTS[achievementId].secret then
          \t\t\tunlockedSecretAchievements[#unlockedSecretAchievements + 1] = achievementId
          \t\tend
          \tend
          \treturn unlockedSecretAchievements
          end

          function Player.getPublicAchievements(self)
          \tlocal unlockedPublicAchievements = {}
          \tfor _, achievementId in ipairs(registeredAchievementIds) do
          \t\tif self:hasAchievement(achievementId) and not ACHIEVEMENTS[achievementId].secret then
          \t\t\tunlockedPublicAchievements[#unlockedPublicAchievements + 1] = achievementId
          \t\tend
          \tend
          \treturn unlockedPublicAchievements
          end

          '''
          registry_path.write_text(text[:start] + replacement + text[end:], encoding="utf-8")

          test_path = Path("tests/lua/test_achievement_helpers.lua")
          test_path.write_text(r'''-- Runtime-independent contract tests for data/scripts/lib/register_achievements.lua
          -- Run: luajit tests/lua/test_achievement_helpers.lua

          local passed, failed, errors = 0, 0, {}

          local function test(name, fn)
          \tlocal ok, err = pcall(fn)
          \tif ok then
          \t\tpassed = passed + 1
          \telse
          \t\tfailed = failed + 1
          \t\ttable.insert(errors, { name = name, err = err })
          \tend
          end

          local function assert_equal(actual, expected, message)
          \tif actual ~= expected then
          \t\terror(message or string.format("expected %s, got %s", tostring(expected), tostring(actual)), 2)
          \tend
          end

          local function assert_array_equal(actual, expected, message)
          \tassert_equal(#actual, #expected, message or "array lengths differ")
          \tfor index = 1, #expected do
          \t\tassert_equal(actual[index], expected[index], (message or "arrays differ") .. " at index " .. index)
          \tend
          end

          local logErrors = {}
          logger = {
          \ttrace = function() end,
          \tdebug = function() end,
          \terror = function(message, ...)
          \t\ttable.insert(logErrors, { message = message, args = { ... } })
          \tend,
          }

          function isNumber(value)
          \treturn type(value) == "number"
          end

          local registeredById, registeredByName = {}, {}
          Game = {}
          function Game.registerAchievement(id, name, description, secret, grade, points)
          \tlocal achievement = {
          \t\tid = id,
          \t\tname = name,
          \t\tdescription = description,
          \t\tsecret = secret,
          \t\tgrade = grade,
          \t\tpoints = points,
          \t}
          \tregisteredById[id] = achievement
          \tregisteredByName[name] = achievement
          end

          function Game.getAchievementInfoById(id)
          \treturn registeredById[id]
          end

          function Game.getAchievementInfoByName(name)
          \treturn registeredByName[name]
          end

          Player = {}
          dofile("data/scripts/lib/register_achievements.lua")

          local achievementIds = {}
          for id in pairs(ACHIEVEMENTS) do
          \tif type(id) == "number" then
          \t\tachievementIds[#achievementIds + 1] = id
          \tend
          end
          table.sort(achievementIds)

          local function makePlayer(unlocked)
          \tlocal player = { unlocked = unlocked or {}, added = {}, removed = {} }
          \tsetmetatable(player, { __index = Player })

          \tfunction player:hasAchievement(id)
          \t\treturn self.unlocked[id] == true
          \tend

          \tfunction player:addAchievement(id, denyMsg)
          \t\tself.added[#self.added + 1] = { id = id, denyMsg = denyMsg }
          \t\treturn true
          \tend

          \tfunction player:removeAchievement(id)
          \t\tself.removed[#self.removed + 1] = id
          \t\treturn true
          \tend

          \treturn player
          end

          test("registers every numeric definition and exposes real bounds", function()
          \tlocal registeredCount = 0
          \tfor _ in pairs(registeredById) do
          \t\tregisteredCount = registeredCount + 1
          \tend
          \tassert_equal(registeredCount, #achievementIds)
          \tassert_equal(ACHIEVEMENT_FIRST, achievementIds[1])
          \tassert_equal(ACHIEVEMENT_LAST, achievementIds[#achievementIds])
          \tassert_equal(registeredById[achievementIds[#achievementIds]].id, achievementIds[#achievementIds])
          end)

          test("enumerates unlocked achievements across sparse gaps in ascending order", function()
          \tlocal middle = achievementIds[math.floor(#achievementIds / 2)]
          \tlocal expected = { achievementIds[1], middle, achievementIds[#achievementIds] }
          \tlocal unlocked = {}
          \tfor _, id in ipairs(expected) do
          \t\tunlocked[id] = true
          \tend
          \tassert_array_equal(makePlayer(unlocked):getAchievements(), expected)
          end)

          test("bulk add and remove visit every registered ID deterministically", function()
          \tlocal player = makePlayer()
          \tplayer:addAllAchievements(false)
          \tplayer:removeAllAchievements()
          \tassert_equal(#player.added, #achievementIds)
          \tassert_equal(#player.removed, #achievementIds)
          \tfor index, id in ipairs(achievementIds) do
          \t\tassert_equal(player.added[index].id, id)
          \t\tassert_equal(player.added[index].denyMsg, false)
          \t\tassert_equal(player.removed[index], id)
          \tend
          end)

          test("public and secret enumeration use registered IDs in ascending order", function()
          \tlocal unlocked, expectedPublic, expectedSecret = {}, {}, {}
          \tfor _, id in ipairs(achievementIds) do
          \t\tunlocked[id] = true
          \t\tif ACHIEVEMENTS[id].secret then
          \t\t\texpectedSecret[#expectedSecret + 1] = id
          \t\telse
          \t\t\texpectedPublic[#expectedPublic + 1] = id
          \t\tend
          \tend
          \tlocal player = makePlayer(unlocked)
          \tassert_array_equal(player:getPublicAchievements(), expectedPublic)
          \tassert_array_equal(player:getSecretAchievements(), expectedSecret)
          end)

          test("secret lookup resolves ID and name metadata", function()
          \tlocal publicId, secretId
          \tfor _, id in ipairs(achievementIds) do
          \t\tif ACHIEVEMENTS[id].secret and not secretId then
          \t\t\tsecretId = id
          \t\telseif not ACHIEVEMENTS[id].secret and not publicId then
          \t\t\tpublicId = id
          \t\tend
          \t\tif publicId and secretId then
          \t\t\tbreak
          \t\tend
          \tend
          \tassert_equal(Game.isAchievementSecret(publicId), false)
          \tassert_equal(Game.isAchievementSecret(ACHIEVEMENTS[publicId].name), false)
          \tassert_equal(Game.isAchievementSecret(secretId), true)
          \tassert_equal(Game.isAchievementSecret(ACHIEVEMENTS[secretId].name), true)
          end)

          test("invalid secret lookup logs supplied identifier and returns false", function()
          \tlocal before = #logErrors
          \tassert_equal(Game.isAchievementSecret(99999), false)
          \tassert_equal(#logErrors, before + 1)
          \tassert_equal(logErrors[#logErrors].args[1], 99999)
          end)

          print(string.format("\n%d passed, %d failed", passed, failed))
          if #errors > 0 then
          \tprint("\nFailed tests:")
          \tfor _, entry in ipairs(errors) do
          \t\tprint(string.format("  FAIL: %s\n        %s", entry.name, entry.err))
          \tend
          \tos.exit(1)
          end
          ''', encoding="utf-8")
          PY

          rm .github/workflows/temp-export-achievement-helper-source.yml

      - name: Commit bounded result
        shell: bash
        run: |
          git config user.name "achievement-helper-bot"
          git config user.email "achievement-helper-bot@users.noreply.github.com"
          git add data/scripts/lib/register_achievements.lua tests/lua/test_achievement_helpers.lua .github/workflows/temp-export-achievement-helper-source.yml
          git diff --cached --check
          git commit -m "fix(achievement): make helper enumeration sparse-safe"
          git push origin HEAD:fix/achievement-helper-enumeration
