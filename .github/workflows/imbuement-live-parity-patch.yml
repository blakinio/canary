name: Imbuement Live Parity Final Patch

on:
  push:
    branches:
      - fix/imbuement-live-parity

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout task branch
        uses: actions/checkout@v4
        with:
          ref: fix/imbuement-live-parity
          fetch-depth: 0

      - name: Apply quest unlocks and preserve runtime plan
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import json
          import re
          import subprocess

          def replace_once(path: str, old: str, new: str) -> None:
              file = Path(path)
              text = file.read_text(encoding='utf-8')
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'{path}: expected one occurrence, found {count}: {old[:100]!r}')
              file.write_text(text.replace(old, new, 1), encoding='utf-8')

          xml = 'data/XML/imbuements.xml'
          replace_once(
              xml,
              '<imbuement name="Vibrancy" base="3" category="19" iconid="79" premium="1" storage="0">',
              '<imbuement name="Vibrancy" base="3" category="19" iconid="79" premium="1" storage="46365">',
          )
          replace_once(
              xml,
              '<imbuement name="Featherweight" base="3" category="17" iconid="76" premium="1" storage="0">',
              '<imbuement name="Featherweight" base="3" category="17" iconid="76" premium="1" storage="45929">',
          )

          storage_validator = Path('tools/ai-agent/imbuement_storage_validation.py')
          text = storage_validator.read_text(encoding='utf-8')
          text = text.replace(
              'CURRENT_FORGOTTEN_KNOWLEDGE_STORAGE_IDS = set(\n    EXPECTED_FORGOTTEN_KNOWLEDGE_GROUPS\n)\n',
              'EXPECTED_QUEST_UNLOCK_GROUPS: dict[int, tuple[str, ...]] = {\n'
              '    45929: ("Featherweight",),\n'
              '    46365: ("Vibrancy",),\n'
              '}\n'
              'EXPECTED_POWERFUL_STORAGE_GROUPS = {\n'
              '    **EXPECTED_FORGOTTEN_KNOWLEDGE_GROUPS,\n'
              '    **EXPECTED_QUEST_UNLOCK_GROUPS,\n'
              '}\n'
              'CURRENT_FORGOTTEN_KNOWLEDGE_STORAGE_IDS = set(\n'
              '    EXPECTED_FORGOTTEN_KNOWLEDGE_GROUPS\n'
              ')\n',
              1,
          )
          text = text.replace(
              'set(actual) | set(EXPECTED_FORGOTTEN_KNOWLEDGE_GROUPS)',
              'set(actual) | set(EXPECTED_POWERFUL_STORAGE_GROUPS)',
              1,
          )
          text = text.replace(
              'expected_families = EXPECTED_FORGOTTEN_KNOWLEDGE_GROUPS.get(storage_id, ())',
              'expected_families = EXPECTED_POWERFUL_STORAGE_GROUPS.get(storage_id, ())',
              1,
          )
          text = text.replace(
              '"Powerful family-to-storage grouping differs from the confirmed "\n                    f"Forgotten Knowledge mapping: {group_mismatches}"',
              '"Powerful family-to-storage grouping differs from the confirmed "\n                    f"Forgotten Knowledge and quest-unlock mapping: {group_mismatches}"',
              1,
          )
          text = text.replace(
              '"actual_forgotten_knowledge_groups": {\n                str(storage_id): list(families)\n                for storage_id, families in actual_groups.items()\n            },',
              '"expected_quest_unlock_groups": {\n                str(storage_id): list(families)\n                for storage_id, families in EXPECTED_QUEST_UNLOCK_GROUPS.items()\n            },\n            "actual_powerful_storage_groups": {\n                str(storage_id): list(families)\n                for storage_id, families in actual_groups.items()\n            },',
              1,
          )
          storage_validator.write_text(text, encoding='utf-8')

          storage_tests = Path('tools/ai-agent/test_imbuement_storage_validation.py')
          text = storage_tests.read_text(encoding='utf-8')
          text = text.replace(
              'for storage_id, names in validation.EXPECTED_FORGOTTEN_KNOWLEDGE_GROUPS.items()',
              'for storage_id, names in validation.EXPECTED_POWERFUL_STORAGE_GROUPS.items()',
              1,
          )
          text = text.replace(
              '    return entries + (\n        FakeEntry("Featherweight", 3, 0),\n        FakeEntry("Vibrancy", 3, 0),\n    )',
              '    return entries',
              1,
          )
          text = text.replace(
              '        LastLoreKilled = 45495,\n',
              '        LastLoreKilled = 45495,\n        LastAchievement = 45929,\n        NightmareTimer = 46365,\n',
              1,
          )
          text = text.replace(
              'def test_validate_accepts_confirmed_mapping_and_retains_zero_storage_warning(',
              'def test_validate_accepts_confirmed_mapping_without_unlock_bypass(',
              1,
          )
          text = text.replace(
              '        self.assertIn("POWERFUL_UNLOCK_BYPASS", by_code)',
              '        self.assertNotIn("POWERFUL_UNLOCK_BYPASS", by_code)',
              1,
          )
          text = text.replace(
              'self.assertEqual(baseline["powerful_with_nonzero_storage"], 22)',
              'self.assertEqual(baseline["powerful_with_nonzero_storage"], 24)',
              2,
          )
          text = text.replace(
              '        self.assertEqual(\n            baseline["powerful_with_zero_storage"], ["Featherweight", "Vibrancy"]\n        )',
              '        self.assertEqual(baseline["powerful_with_zero_storage"], [])',
              1,
          )
          anchor = '''        self.assertEqual(\n            validation.EXPECTED_FORGOTTEN_KNOWLEDGE_GROUPS[45495],\n            ("Epiphany", "Strike"),\n        )\n'''
          addition = anchor + '''        self.assertEqual(\n            validation.EXPECTED_QUEST_UNLOCK_GROUPS,\n            {45929: ("Featherweight",), 46365: ("Vibrancy",)},\n        )\n'''
          if anchor not in text:
              raise SystemExit('storage test anchor not found')
          text = text.replace(anchor, addition, 1)
          storage_tests.write_text(text, encoding='utf-8')

          fixture = 'tests/fixture/core/XML/imbuements.xml'
          replace_once(
              fixture,
              '<imbuement name="Vibrancy" base="3" category="19" iconid="79" premium="1" storage="0">',
              '<imbuement name="Vibrancy" base="3" category="19" iconid="79" premium="1" storage="46365">',
          )

          report_path = Path('docs/ai-agent/IMBUEMENT_VALIDATION_REPORT.md')
          report = report_path.read_text(encoding='utf-8')
          report = report.replace(
              '> **Status:** IMB-001/002/003 repaired in PR #251; IMB-004/005 preserved; IMB-006 evidence pending; final CI pending',
              '> **Status:** IMB-001/002/003/006 repaired in PR #251; IMB-004/005 preserved; final CI pending',
              1,
          )
          report = report.replace(
              'The only remaining material reference discrepancy is IMB-006: Powerful Featherweight and Vibrancy still use `storage=0` because their exact active completion storage/value semantics have not yet been proven from the implemented quest paths.',
              'All six audited discrepancy groups now have evidence-backed repairs. Powerful Featherweight uses the permanent all-three-boss Dangerous Depths completion marker `45929`; Powerful Vibrancy uses the persistent Nightmare Beast completion marker `46365`. Neither marker is written at quest start.',
              1,
          )
          pattern = re.compile(r'### IMB-006 .*?(?=## 6\.)', re.S)
          replacement = '''### IMB-006 — Featherweight and Vibrancy quest unlocks repaired\n\n**Disposition:** `repaired-in-pr-251`\n**Confidence:** high\n\n- Powerful Featherweight uses storage `45929` (`DangerousDepths.Bosses.LastAchievement`). The active action writes it only after all three final boss-achievement markers equal `1`.\n- Powerful Vibrancy uses storage `46365` (`TheDreamCourts.DreamScarGlobal.NightmareTimer`). The active death handler writes this player storage only for The Nightmare Beast; the quest catalogue and Vanys NPC identify that kill as the final main Dream Courts step. The timestamp remains set after the cooldown expires, so the existing `storage != -1` policy preserves the unlock permanently.\n\nThe generic questline storages were deliberately rejected: both are set when the quest starts and would unlock Powerful imbuements too early. No new storage ID or threshold semantics were invented.\n\n'''
          report, count = pattern.subn(replacement, report, count=1)
          if count != 1:
              raise SystemExit('report IMB-006 section not replaced')
          report = report.replace(
              '- Powerful Featherweight and Powerful Vibrancy still use `storage="0"`. The policy intentionally does not hide zero-storage entries, so they remain visible when family-specific filtering is enabled.\n',
              '',
          )
          report = report.replace(
              '1. Prove the exact Dangerous Depths and Dream Courts completion conditions before assigning Featherweight/Vibrancy storages.\n2. Execute the remaining runtime plan in controlled Canary staging.\n3. Audit full equipment eligibility against item metadata.',
              '1. Execute the remaining runtime plan in controlled Canary staging.\n2. Audit full equipment eligibility against item metadata.',
              1,
          )
          report_path.write_text(report, encoding='utf-8')

          main_plan = subprocess.check_output(
              ['git', 'show', 'origin/main:docs/ai-agent/IMBUEMENT_RUNTIME_TEST_PLAN.json'],
              text=True,
          )
          plan = json.loads(main_plan)
          plan['baseline']['nonzero_xml_storage_ids'] = [45489, 45490, 45491, 45492, 45493, 45494, 45495, 45929, 46365]
          plan['baseline']['powerful_with_nonzero_storage'] = 24
          plan['baseline']['powerful_with_zero_storage'] = []
          plan['baseline']['active_quest_unlock_storage_ids'] = [45929, 46365]
          repaired = {
              'IMB-001': ('repaired-in-pr-251', 'Current fixed fees are 7,500/60,000/250,000 gold at 100% success with no protection surcharge.'),
              'IMB-002': ('repaired-in-pr-251', 'Strike uses 5% critical chance and +5%/+15%/+40% critical damage.'),
              'IMB-003': ('repaired-in-pr-251', 'Basic Punch uses item 10281 x25 and higher-tier cumulative chains remain intact.'),
              'IMB-004': ('repaired-in-pr-239', 'Vibrancy scroll IDs 51746 and 51466 are mapped and atomicity-tested.'),
              'IMB-005': ('repaired-by-pr-206', 'Forgotten Knowledge Powerful families use the active 45489..45495 boss storages.'),
              'IMB-006': ('repaired-in-pr-251', 'Powerful Featherweight uses 45929 and Powerful Vibrancy uses 46365, both proven completion markers.'),
          }
          for finding in plan['known_findings']:
              kind, summary = repaired[finding['id']]
              finding['kind'] = kind
              finding['summary'] = summary
          unlock = next(s for s in plan['scenarios'] if s['id'] == 'powerful-unlock-storage')
          unlock['fixtures']['dangerous_depths_completion_storage_id'] = 45929
          unlock['fixtures']['dream_courts_completion_storage_id'] = 46365
          cost = next(s for s in plan['scenarios'] if s['id'] == 'application-cost-and-atomicity')
          cost['matrix'] = [
              {'tier': 'Basic', 'active_fee': 7500, 'active_success_percent': 100, 'active_protection_price': 0},
              {'tier': 'Intricate', 'active_fee': 60000, 'active_success_percent': 100, 'active_protection_price': 0},
              {'tier': 'Powerful', 'active_fee': 250000, 'active_success_percent': 100, 'active_protection_price': 0},
          ]
          cost['assertions'] = [
              'Displayed fee and charged fee match the current fixed-fee model.',
              'Every valid application succeeds after resource validation.',
              'Insufficient gold leaves all resources and slot state unchanged.',
              'Insufficient materials leave all resources and slot state unchanged.',
              'Successful application consumes each material and the fixed gold charge exactly once.',
          ]
          Path('docs/ai-agent/IMBUEMENT_RUNTIME_TEST_PLAN.json').write_text(
              json.dumps(plan, indent=2) + '\n', encoding='utf-8'
          )

          task = Path('docs/agents/tasks/active/CAN-20260713-imbuement-live-parity.md')
          task_text = task.read_text(encoding='utf-8')
          task_text = task_text.replace('status: in_progress', 'status: implementation_complete_pending_ci', 1)
          task_text = task_text.replace('- [ ] Base application fees', '- [x] Base application fees', 1)
          task_text = task_text.replace('- [ ] Basic, Intricate and Powerful Strike', '- [x] Basic, Intricate and Powerful Strike', 1)
          task_text = task_text.replace('- [ ] Basic Punch consumes', '- [x] Basic Punch consumes', 1)
          task_text = task_text.replace('- [ ] Protocol-visible base price', '- [x] Protocol-visible base price', 1)
          task_text = task_text.replace('- [ ] IMB-006 storages are changed', '- [x] IMB-006 storages are changed', 1)
          task_text = task_text.replace('- [ ] Focused deterministic and C++ regression coverage', '- [x] Focused deterministic and C++ regression coverage', 1)
          task_text = task_text.replace('- [ ] Validation report, runtime plan and agent changelog', '- [x] Validation report, runtime plan and agent changelog', 1)
          task_text = task_text.replace('- [ ] No map, items.otb', '- [x] No map, items.otb', 1)
          task_text = task_text.replace(
              '# Remaining work\n\n1. Open a draft PR for discovery.\n2. Complete IMB-006 evidence search.\n3. Implement and validate confirmed repairs.',
              '# Remaining work\n\n1. Remove the temporary patch workflow and confirm the final changed-file boundary.\n2. Inspect final-head focused and repository CI job by job.\n3. Mark ready, merge and archive if all gates pass.',
              1,
          )
          task_text += '''\n\n## 2026-07-13T14:35:00+02:00\n\n- Implemented IMB-001/002/003 and exact deterministic/C++ regressions in `1f5819d045815e6aa548112cacb62727fec5255b`.\n- Proved Featherweight completion storage `45929` from the all-three-boss achievement action.\n- Proved Vibrancy completion storage `46365` from the Nightmare Beast death handler plus final quest/NPC state.\n- Rejected generic questline storages because they are written at quest start and the current policy only checks for an initialized storage.\n- Restored the rich runtime plan instead of retaining the validator-generated reduced JSON.\n- Local commands remain unavailable because `github.com` DNS resolution fails; no local result is claimed.\n'''
          task.write_text(task_text, encoding='utf-8')
          PY

          python -m py_compile \
            tools/ai-agent/imbuement_validation.py \
            tools/ai-agent/imbuement_storage_validation.py \
            tools/ai-agent/test_imbuement_validation.py \
            tools/ai-agent/test_imbuement_storage_validation.py
          python -m unittest discover -s tools/ai-agent -p 'test_imbuement*.py'
          python tools/ai-agent/imbuement_validation.py \
            --repository-root . \
            --output /tmp/IMBUEMENT_VALIDATION.json
          python tools/ai-agent/imbuement_storage_validation.py \
            --repository-root . \
            --output /tmp/IMBUEMENT_STORAGE_VALIDATION.json \
            --strict
          python -m json.tool docs/ai-agent/IMBUEMENT_RUNTIME_TEST_PLAN.json >/dev/null

      - name: Commit final live parity data
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add \
            data/XML/imbuements.xml \
            tools/ai-agent/imbuement_storage_validation.py \
            tools/ai-agent/test_imbuement_storage_validation.py \
            tests/fixture/core/XML/imbuements.xml \
            docs/ai-agent/IMBUEMENT_VALIDATION_REPORT.md \
            docs/ai-agent/IMBUEMENT_RUNTIME_TEST_PLAN.json \
            docs/agents/tasks/active/CAN-20260713-imbuement-live-parity.md
          git commit -m 'fix(imbuement): enforce quest completion unlocks'
          git push origin HEAD:fix/imbuement-live-parity
