name: Imbuement Storage Discovery

on:
  push:
    branches:
      - fix/imbuement-live-parity

permissions:
  contents: write

jobs:
  discover:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout task branch
        uses: actions/checkout@v4
        with:
          ref: fix/imbuement-live-parity
          fetch-depth: 0

      - name: Capture active quest storage references
        shell: bash
        run: |
          {
            echo '# Dangerous Depths symbolic references'
            rg -n --glob '*.lua' 'DangerousDepths|TheCountOfTheCore|TheDukeOfTheDepths|TheBaronFromBelow' data-otservbr-global || true
            echo
            echo '# Dangerous Depths numeric references'
            rg -n --glob '*.lua' '45851|45852|45860|45875|45923|45924|45925|45929' data-otservbr-global || true
            echo
            echo '# Dream Courts symbolic references'
            rg -n --glob '*.lua' 'TheDreamCourts|DreamScar|BossCount|Maxxenius|Alptramun|PlagueRoot|Izcandar|Malofur|Nightmare' data-otservbr-global || true
            echo
            echo '# Dream Courts numeric references'
            rg -n --glob '*.lua' '46301|46347|46348|46349|46350|46351|46352|46353|46354|46355|46368' data-otservbr-global || true
          } > docs/ai-agent/IMBUEMENT_STORAGE_DISCOVERY.tmp

      - name: Commit discovery evidence
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add docs/ai-agent/IMBUEMENT_STORAGE_DISCOVERY.tmp
          git commit -m 'docs(imbuement): capture quest storage discovery'
          git push origin HEAD:fix/imbuement-live-parity
