name: Imbuement Live Parity Diagnostics

on:
  push:
    branches:
      - fix/imbuement-live-parity

permissions:
  contents: write

jobs:
  diagnose:
    if: ${{ !contains(github.event.head_commit.message, 'capture finalizer diagnostic') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout task branch
        uses: actions/checkout@v4
        with:
          ref: fix/imbuement-live-parity
          fetch-depth: 0

      - name: Execute finalizer and capture output
        shell: bash
        run: |
          set +e
          python tools/ai-agent/apply_imbuement_live_parity_patch.py > /tmp/finalizer.log 2>&1
          status=$?
          {
            echo "exit_status=$status"
            cat /tmp/finalizer.log
          } > docs/ai-agent/IMBUEMENT_FINALIZER_DIAGNOSTIC.tmp
          exit 0

      - name: Commit diagnostic
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add docs/ai-agent/IMBUEMENT_FINALIZER_DIAGNOSTIC.tmp
          git commit -m 'docs(imbuement): capture finalizer diagnostic'
          git push origin HEAD:fix/imbuement-live-parity
