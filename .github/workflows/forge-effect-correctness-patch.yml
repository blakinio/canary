name: Apply Forge effect-correctness patch

on:
  pull_request:
    branches:
      - fix/forge-effect-correctness
    paths:
      - docs/ai-agent/.forge-effect-correctness-runner

permissions:
  contents: write

jobs:
  apply-effect-correctness:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout task branch
        uses: actions/checkout@v4
        with:
          ref: fix/forge-effect-correctness
          fetch-depth: 1
          show-progress: false

      - name: Apply exact effect changes
        shell: bash
        run: python3 tools/ai-agent/apply_forge_effect_correctness_patch.py

      - name: Review and commit bounded patch
        shell: bash
        run: |
          git diff --check
          git diff -- src/creatures/players/player.cpp
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/creatures/players/player.cpp
          git commit -m "fix(forge): correct Momentum and Avatar effect gating"
          git push origin HEAD:fix/forge-effect-correctness
