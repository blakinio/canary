name: OAM 031 Program Materialize

on:
  push:
    branches:
      - docs/oam-031-bestiary-reconciliation
    paths:
      - .github/workflows/oam-031-program-materialize.yml

permissions:
  contents: write

jobs:
  materialize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: docs/oam-031-bestiary-reconciliation
      - name: Materialize durable program record
        run: python tools/agents/oam_031_program_materialize.py
      - name: Commit program record
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/agents/programs/OTERYN_ARCHITECTURE_AND_MIGRATION_PROGRAM.md
          git diff --cached --quiet && exit 1
          git commit -m "docs(oam): reconcile OAM-031 durable completion"
          git push origin HEAD:docs/oam-031-bestiary-reconciliation
