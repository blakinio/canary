name: OTBM PR104 Source Snapshot

on:
  push:
    branches:
      - ops/otbm-pr104-snapshot
    paths:
      - .github/workflows/otbm-pr104-snapshot.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout exact source
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Create source archive
        run: git archive --format=zip --output=canary-pr104-source.zip HEAD
      - name: Upload exact source
        uses: actions/upload-artifact@v4
        with:
          name: canary-pr104-source
          path: canary-pr104-source.zip
          retention-days: 1
          if-no-files-found: error
          compression-level: 0
