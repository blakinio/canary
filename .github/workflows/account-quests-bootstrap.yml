---
name: Account Quests Bootstrap

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: account-quests-bootstrap-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/account-quests-production-hardening
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Apply hardening patch
        run: python tools/account-quests/bootstrap_hardening.py
      - name: Preserve bootstrap files outside generated commit
        run: |
          git restore .github/workflows/account-quests-bootstrap.yml
          git restore tools/account-quests/bootstrap_hardening.py
      - name: Prepare generated outputs
        run: |
          git add -A
          git status --short
          git diff --cached --stat
          git diff --cached --binary > /tmp/account-quests-hardening.patch
          mkdir -p /tmp/account-quests-generated
          git diff --cached --name-only -z | while IFS= read -r -d '' file; do
            mkdir -p "/tmp/account-quests-generated/$(dirname "$file")"
            cp "$file" "/tmp/account-quests-generated/$file"
          done
      - name: Upload generated patch
        uses: actions/upload-artifact@v4
        with:
          name: account-quests-hardening-patch
          path: /tmp/account-quests-hardening.patch
          if-no-files-found: error
      - name: Upload generated files
        uses: actions/upload-artifact@v4
        with:
          name: account-quests-hardening-files
          path: /tmp/account-quests-generated
          include-hidden-files: true
          if-no-files-found: error
      - name: Create generated commit object
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPOSITORY: ${{ github.repository }}
        run: |
          python - <<'PY'
          import base64
          import json
          import os
          import subprocess
          import urllib.request

          repository = os.environ["GH_REPOSITORY"]
          token = os.environ["GH_TOKEN"]
          parent = subprocess.check_output(["git", "rev-parse", "HEAD"], text=True).strip()
          files = subprocess.check_output(["git", "diff", "--cached", "--name-only", "-z"]).decode().split("\0")
          files = [path for path in files if path]

          def api(method, path, payload=None):
              data = None if payload is None else json.dumps(payload).encode()
              request = urllib.request.Request(
                  f"https://api.github.com/repos/{repository}{path}",
                  data=data,
                  method=method,
                  headers={
                      "Authorization": f"Bearer {token}",
                      "Accept": "application/vnd.github+json",
                      "X-GitHub-Api-Version": "2022-11-28",
                      "Content-Type": "application/json",
                  },
              )
              with urllib.request.urlopen(request) as response:
                  return json.load(response)

          parent_commit = api("GET", f"/git/commits/{parent}")
          tree_entries = []
          for path in files:
              content = open(path, "rb").read()
              blob = api("POST", "/git/blobs", {
                  "content": base64.b64encode(content).decode(),
                  "encoding": "base64",
              })
              tree_entries.append({"path": path, "mode": "100644", "type": "blob", "sha": blob["sha"]})

          tree = api("POST", "/git/trees", {
              "base_tree": parent_commit["tree"]["sha"],
              "tree": tree_entries,
          })
          commit = api("POST", "/git/commits", {
              "message": "fix(account-quests): complete production hardening",
              "tree": tree["sha"],
              "parents": [parent],
          })
          with open("/tmp/account-quests-generated-commit-sha.txt", "w", encoding="utf-8") as output:
              output.write(commit["sha"] + "\n")
          print(f"Generated commit object: {commit['sha']}")
          PY
      - name: Upload generated commit SHA
        uses: actions/upload-artifact@v4
        with:
          name: account-quests-generated-commit
          path: /tmp/account-quests-generated-commit-sha.txt
          if-no-files-found: error
