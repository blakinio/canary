---
name: Temporary Diagnose Achievement Helper Test

on:
  pull_request:
    paths:
      - ".github/workflows/temp-diagnose-achievement-stylua.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout task branch
        uses: actions/checkout@v6
        with:
          ref: fix/achievement-helper-enumeration
          fetch-depth: 0

      - name: Replace label flow with structured control flow
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("data/scripts/lib/register_achievements.lua")
          text = path.read_text(encoding="utf-8")
          old = '''for _, id in ipairs(achievementIds) do
          \tlocal achievTable = ACHIEVEMENTS[id]
          \tif achievTable.name == nil then
          \t\tlogger.error(string.format("[Achievements registration] - Invalid achievement with no name, id: '%s'", id))
          \t\tgoto continue
          \tend

          \tif achievTable.description == nil then
          \t\tlogger.error(string.format("[Achievements registration] - Invalid achievement with no description, id: '%s'", id))
          \t\tgoto continue
          \tend

          \tlocal secret = achievTable.secret or false
          \tlocal grade = achievTable.grade or 0
          \tlocal points = achievTable.points or 0

          \tlogger.trace("[Achievements registration] - Registering achievement '{}' with id '{}'", achievTable.name, id)
          \tGame.registerAchievement(id, achievTable.name, achievTable.description, secret, grade, points)
          \tregisteredAchievementIds[#registeredAchievementIds + 1] = id

          \t::continue::
          end
          '''
          new = '''for _, id in ipairs(achievementIds) do
          \tlocal achievTable = ACHIEVEMENTS[id]
          \tif achievTable.name == nil then
          \t\tlogger.error(string.format("[Achievements registration] - Invalid achievement with no name, id: '%s'", id))
          \telseif achievTable.description == nil then
          \t\tlogger.error(string.format("[Achievements registration] - Invalid achievement with no description, id: '%s'", id))
          \telse
          \t\tlocal secret = achievTable.secret or false
          \t\tlocal grade = achievTable.grade or 0
          \t\tlocal points = achievTable.points or 0

          \t\tlogger.trace("[Achievements registration] - Registering achievement '{}' with id '{}'", achievTable.name, id)
          \t\tGame.registerAchievement(id, achievTable.name, achievTable.description, secret, grade, points)
          \t\tregisteredAchievementIds[#registeredAchievementIds + 1] = id
          \tend
          end
          '''
          if text.count(old) != 1:
              raise SystemExit("expected achievement registration helper block was not found exactly once")
          path.write_text(text.replace(old, new), encoding="utf-8")
          PY

      - name: Format changed Lua files
        uses: JohnnyMorganz/stylua-action@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          version: latest
          args: data/scripts/lib/register_achievements.lua tests/lua/test_achievement_helpers.lua

      - name: Capture focused Lua test
        id: test
        shell: bash
        run: |
          set +e
          luajit tests/lua/test_achievement_helpers.lua > achievement-helper-test.log 2>&1
          status=$?
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          echo "$status" > achievement-helper-test-exit.txt
          cat achievement-helper-test.log
          exit 0

      - name: Upload test diagnosis
        uses: actions/upload-artifact@v4
        with:
          name: achievement-helper-test-diagnosis
          path: |
            achievement-helper-test.log
            achievement-helper-test-exit.txt
          retention-days: 1

      - name: Stop after failed test
        if: steps.test.outputs.exit_code != '0'
        run: exit 1

      - name: Commit bounded result
        shell: bash
        run: |
          rm .github/workflows/temp-diagnose-achievement-stylua.yml
          git config user.name "achievement-helper-bot"
          git config user.email "achievement-helper-bot@users.noreply.github.com"
          git add data/scripts/lib/register_achievements.lua tests/lua/test_achievement_helpers.lua .github/workflows/temp-diagnose-achievement-stylua.yml
          git diff --cached --check
          git commit -m "fix(achievement): avoid label syntax in helper registration"
          git push origin HEAD:fix/achievement-helper-enumeration
