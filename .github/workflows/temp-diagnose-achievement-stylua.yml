---
name: Temporary Diagnose Achievement StyLua

on:
  pull_request:
    paths:
      - ".github/workflows/temp-diagnose-achievement-stylua.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout task branch
        uses: actions/checkout@v6
        with:
          ref: fix/achievement-helper-enumeration

      - name: Install StyLua and format registry
        id: registry
        continue-on-error: true
        uses: JohnnyMorganz/stylua-action@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          version: latest
          args: data/scripts/lib/register_achievements.lua

      - name: Capture raw registry error
        shell: bash
        run: |
          set +e
          {
            echo "PATH=$PATH"
            command -v stylua || true
            find "$RUNNER_TOOL_CACHE" "$RUNNER_TEMP" -type f -name stylua -perm -111 2>/dev/null | head -20
          } > stylua-location.txt
          STYLUA="$(command -v stylua || true)"
          if [ -z "$STYLUA" ]; then
            STYLUA="$(find "$RUNNER_TOOL_CACHE" "$RUNNER_TEMP" -type f -name stylua -perm -111 2>/dev/null | head -1)"
          fi
          if [ -n "$STYLUA" ]; then
            "$STYLUA" data/scripts/lib/register_achievements.lua > stylua-registry.log 2>&1
            echo $? > stylua-registry-exit.txt
          else
            echo "stylua binary not found" > stylua-registry.log
            echo 127 > stylua-registry-exit.txt
          fi
          git reset --hard HEAD

      - name: Format test only
        id: test
        continue-on-error: true
        uses: JohnnyMorganz/stylua-action@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          version: latest
          args: tests/lua/test_achievement_helpers.lua

      - name: Reset isolated formatting
        run: git reset --hard HEAD

      - name: Format repository
        id: repository
        continue-on-error: true
        uses: JohnnyMorganz/stylua-action@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          version: latest
          args: .

      - name: Record outcomes
        run: |
          printf 'registry=%s\ntest=%s\nrepository=%s\n' \
            '${{ steps.registry.outcome }}' \
            '${{ steps.test.outcome }}' \
            '${{ steps.repository.outcome }}' | tee stylua-outcomes.txt
          git status --short | tee stylua-status.txt
          git diff --stat | tee stylua-diff-stat.txt

      - name: Upload diagnosis
        uses: actions/upload-artifact@v4
        with:
          name: achievement-stylua-diagnosis
          path: |
            stylua-outcomes.txt
            stylua-status.txt
            stylua-diff-stat.txt
            stylua-location.txt
            stylua-registry.log
            stylua-registry-exit.txt
          retention-days: 1
