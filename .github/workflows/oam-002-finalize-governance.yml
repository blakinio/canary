name: OAM-002 Finalize Governance

on:
  push:
    branches:
      - docs/oam-002-target-baseline-pinning
    paths:
      - .github/workflows/oam-002-finalize-governance.yml
      - docs/agents/tasks/active/CAN-20260716-oteryn-target-baseline-pinning.md

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout OAM-002 branch
        uses: actions/checkout@v6
        with:
          ref: docs/oam-002-target-baseline-pinning
          fetch-depth: 2
          persist-credentials: true

      - name: Execute pinned governance patch from parent workflow
        shell: bash
        run: |
          set -euo pipefail
          git show HEAD^:.github/workflows/oam-002-finalize-governance.yml > /tmp/oam-002-finalizer-parent.yml
          python3 - <<'PY'
          from pathlib import Path
          import textwrap

          lines = Path('/tmp/oam-002-finalizer-parent.yml').read_text(encoding='utf-8').splitlines()
          start = next(i for i, line in enumerate(lines) if line.strip() == "python3 - <<'PY'") + 1
          end = next(i for i in range(start, len(lines)) if lines[i].strip() == 'PY')
          script = textwrap.dedent('\n'.join(lines[start:end]))
          exec(compile(script, '<oam-002-governance-finalizer>', 'exec'), {})
          PY

          git diff --check
          git diff -- docs/agents/OTERYN_TARGET_ARCHITECTURE_CONTRACT.md docs/agents/programs/OTERYN_ARCHITECTURE_AND_MIGRATION_PROGRAM.md

          git config user.name "Oteryn OAM Governance"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/agents/OTERYN_TARGET_ARCHITECTURE_CONTRACT.md docs/agents/programs/OTERYN_ARCHITECTURE_AND_MIGRATION_PROGRAM.md
          git commit -m "docs(agents): record completed OAM-002 target baseline"
          git push origin HEAD:docs/oam-002-target-baseline-pinning
