name: Audit CS-007 table unserialize v3

on:
  pull_request:
    types: [synchronize]

permissions:
  contents: write

concurrency:
  group: audit-cs007-table-unserialize-v3
  cancel-in-progress: false

jobs:
  audit:
    if: >-
      github.event.pull_request.number == 328 &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.head_ref == 'security/table-unserialize-safe'
    runs-on: ubuntu-latest
    steps:
      - name: Check out audit branch
        uses: actions/checkout@v4
        with:
          ref: security/table-unserialize-safe
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install LuaJIT
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq luajit

      - name: Scan repository and record current behavior
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/upstream/crystalserver

          cat > /tmp/cs007_probe.lua <<'LUA'
          dofile("data/libs/functions/tables.lua")

          local cases = {
            { name = "plain-string", value = "plain text" },
            { name = "whitespace-string", value = "spaces and\ttabs\nnewlines" },
            { name = "escaped-string", value = "quotes: 'single' and \"double\" and \\ slash" },
            { name = "zero", value = 0 },
            { name = "negative-float", value = -12.5 },
            { name = "exponent-number", value = 1.25e6 },
            { name = "boolean-true", value = true },
            { name = "boolean-false", value = false },
            { name = "mixed-table", value = {
              [1] = "array",
              [3] = false,
              ["name"] = "value with spaces",
              [true] = { nested = "ok", number = -4.5 },
              [7.25] = "numeric-key",
            } },
          }

          local function equal(a, b, seen)
            if type(a) ~= type(b) then return false end
            if type(a) ~= "table" then return a == b end
            seen = seen or {}
            if seen[a] then return seen[a] == b end
            seen[a] = b
            for k, v in pairs(a) do
              if not equal(v, b[k], seen) then return false end
            end
            for k in pairs(b) do
              if a[k] == nil then return false end
            end
            return true
          end

          for i, case in ipairs(cases) do
            local encodeOk, encoded = pcall(table.serialize, case.value)
            if not encodeOk then
              io.write(string.format("ROUNDTRIP %d %s ENCODE_ERROR %q\n", i, case.name, tostring(encoded)))
            else
              local decodeOk, decoded = pcall(table.unserialize, encoded)
              local status = decodeOk and equal(case.value, decoded) and "PASS" or "FAIL"
              io.write(string.format("ROUNDTRIP %d %s %s %q\n", i, case.name, status, encoded))
            end
          end

          _G.__cs007_executed = false
          local exploit = '(function() _G.__cs007_executed = true return { ["executed"] = true } end)()'
          local exploitOk, decoded = pcall(table.unserialize, exploit)
          local executed = exploitOk and _G.__cs007_executed == true and type(decoded) == "table" and decoded.executed == true
          io.write("EXPLOIT_EXECUTED " .. tostring(executed) .. "\n")
          LUA

          luajit /tmp/cs007_probe.lua | tee /tmp/cs007_probe.txt

          python3 - <<'PY'
          import json
          import re
          import subprocess
          from pathlib import Path

          tracked = subprocess.check_output(["git", "ls-files", "-z"]).split(b"\0")
          patterns = {
              "table_serialize": re.compile(r"table\.serialize\s*\("),
              "table_unserialize": re.compile(r"table\.unserialize\s*\("),
              "loadstring": re.compile(r"\bloadstring\s*\("),
              "load": re.compile(r"\bload\s*\("),
          }
          findings = {name: [] for name in patterns}
          scanned_files = 0
          text_files = 0
          for raw in tracked:
              if not raw:
                  continue
              path = Path(raw.decode("utf-8", errors="surrogateescape"))
              scanned_files += 1
              try:
                  data = path.read_bytes()
              except OSError:
                  continue
              if b"\0" in data:
                  continue
              text_files += 1
              lines = data.decode("utf-8", errors="replace").splitlines()
              for lineno, line in enumerate(lines, 1):
                  for name, pattern in patterns.items():
                      if pattern.search(line):
                          start = max(1, lineno - 4)
                          end = min(len(lines), lineno + 4)
                          findings[name].append({
                              "path": str(path),
                              "line": lineno,
                              "text": line.strip(),
                              "context_start": start,
                              "context_end": end,
                              "context": [f"{idx}: {lines[idx-1].rstrip()}" for idx in range(start, end + 1)],
                          })

          probe = Path("/tmp/cs007_probe.txt").read_text().splitlines()
          failed_roundtrips = [line for line in probe if line.startswith("ROUNDTRIP ") and " PASS " not in line]
          report = {
              "format": "canary-crystalserver-cs007-audit-v1",
              "target_repository": "blakinio/canary",
              "target_main": "06f8ba4464d6a18ad48445737444bab5b3a2efcb",
              "comparison_repository": "zimbadev/crystalserver",
              "comparison_commit": "891685169745e46f665069edcc35847f0704aa21",
              "candidate": "CS-007",
              "scanned_tracked_files": scanned_files,
              "scanned_text_files": text_files,
              "findings": findings,
              "probe_output": probe,
              "failed_roundtrips": failed_roundtrips,
              "current_exploit_executed": "EXPLOIT_EXECUTED true" in probe,
              "limitations": [
                  "Static occurrence inventory does not prove runtime reachability.",
                  "Call-site provenance requires manual review of every returned context.",
                  "The probe proves arbitrary Lua execution by the helper, not remote exploitability.",
                  "Round-trip failures may originate in table.serialize and are not automatically part of CS-007.",
              ],
          }
          Path("artifacts/upstream/crystalserver/cs007_table_unserialize_audit.json").write_text(json.dumps(report, indent=2, sort_keys=True) + "\n")

          def section(name, title):
              rows = findings[name]
              out = [f"## {title}", "", f"Occurrences: **{len(rows)}**", ""]
              for row in rows:
                  out.extend([f"### `{row['path']}:{row['line']}`", "", "```text", *row["context"], "```", ""])
              if not rows:
                  out.extend(["_No tracked occurrence found._", ""])
              return out

          md = [
              "# CS-007 `table.unserialize` audit",
              "",
              "- Target: `blakinio/canary` at task baseline `06f8ba4464d6a18ad48445737444bab5b3a2efcb`.",
              "- Donor evidence: `zimbadev/crystalserver` commit `891685169745e46f665069edcc35847f0704aa21`.",
              f"- Tracked files scanned: **{scanned_files}**; text files: **{text_files}**.",
              "- This inventory is deterministic source evidence, not runtime-reachability proof.",
              "",
              "## Executed compatibility/security probe",
              "",
              "```text",
              *probe,
              "```",
              "",
              "The exploit result proves whether the current helper evaluates an arbitrary Lua expression; it does not by itself prove an attacker-controlled production path.",
              "",
              "Round-trip failures are retained as evidence. They may be defects in `table.serialize` rather than `table.unserialize` and must not be silently bundled into CS-007.",
              "",
          ]
          md += section("table_unserialize", "`table.unserialize` definitions and calls")
          md += section("table_serialize", "`table.serialize` definitions and calls")
          md += section("loadstring", "Direct `loadstring` occurrences")
          md += section("load", "Direct `load` occurrences")
          md += [
              "## Donor assessment boundary",
              "",
              "CrystalServer's replacement parser is not adopted by this audit. Its global whitespace removal and handwritten grammar require independent compatibility, malformed-input and resource-bound validation.",
              "",
              "## Required manual follow-up",
              "",
              "1. Separate helper definitions/tests from production call sites.",
              "2. Trace every production input to persistence, network, file or trusted literal origin.",
              "3. Define the exact grammar emitted by current `table.serialize`, including escaped strings and mixed key types.",
              "4. Split any serializer defect from the decoder-security candidate unless one atomic compatibility change is proven necessary.",
              "5. Choose a bounded decoder only after the compatibility corpus is complete.",
              "",
          ]
          Path("artifacts/upstream/crystalserver/CS007_TABLE_UNSERIALIZE_AUDIT.md").write_text("\n".join(line.rstrip() for line in md).rstrip() + "\n")
          PY

          workflows=(
            '.github/workflows/audit-cs007-table-unserialize.yml'
            '.github/workflows/audit-cs007-table-unserialize-v2.yml'
            '.github/workflows/audit-cs007-table-unserialize-v3.yml'
          )
          rm -f "${workflows[@]}"
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -f artifacts/upstream/crystalserver/CS007_TABLE_UNSERIALIZE_AUDIT.md artifacts/upstream/crystalserver/cs007_table_unserialize_audit.json
          git add -A "${workflows[@]}"
          actual="$(git diff --cached --name-only | sort)"
          expected="$(printf '%s\n' "${workflows[@]}" \
            'artifacts/upstream/crystalserver/CS007_TABLE_UNSERIALIZE_AUDIT.md' \
            'artifacts/upstream/crystalserver/cs007_table_unserialize_audit.json' | sort)"
          test "$actual" = "$expected"
          git diff --cached --check
          git commit -m 'audit(lua): inventory table unserialize boundary'
          git push origin HEAD:security/table-unserialize-safe
