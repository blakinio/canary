name: Archive CS-006 lifecycle

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

concurrency:
  group: archive-cs006-lifecycle
  cancel-in-progress: false

jobs:
  archive:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.head_ref == 'docs/archive-cs006-fs-mkdir'
    runs-on: ubuntu-latest
    steps:
      - name: Check out cleanup branch
        uses: actions/checkout@v4
        with:
          ref: docs/archive-cs006-fs-mkdir
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Archive task and close program record
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          merge = "70f6930647d818edfdf0a30b745aabe8d4fdaa29"
          feature_head = "4a3c42113319550ca24956acb449501416cbf9a3"

          program_path = Path("docs/agents/programs/CRYSTALSERVER_COMPARISON_PROGRAM.md")
          program = program_path.read_text()
          replacements = {
              "updated: 2026-07-14T00:42:00+02:00": "updated: 2026-07-14T12:30:00+02:00",
              'last_verified_commit: "b06079f9bc75f0c108720e2674438a2f539c8631"': f'last_verified_commit: "{merge}"',
              "| `CAN-20260714-fs-mkdir-shell-injection` / [#310](https://github.com/blakinio/canary/pull/317) | `CS-006` | active | Replace Lua shell-based directory creation with native `std::filesystem` operations and focused Lua/C++ regressions. |": "| _None._ | — | — | No CrystalServer comparison implementation task is active after CS-006 cleanup. |",
              "| `CS-006` | `891685169745e46f665069edcc35847f0704aa21` | `VALID_FIX_MISSING` | high | `FS.mkdir` shell construction | Active in task `CAN-20260714-fs-mkdir-shell-injection` / PR #317; preserve API behavior while removing all shell execution. |": f"| `CS-006` | `891685169745e46f665069edcc35847f0704aa21` | `VALID_FIX_MISSING` | high | `FS.mkdir` shell construction | Completed through task `CAN-20260714-fs-mkdir-shell-injection`, PR #326, merge `{merge}`; preserve shell-free wrappers and focused regressions. |",
              "- `CS-004` — required null and bounds validation already exists.\n": "- `CS-004` — required null and bounds validation already exists.\n- `CS-006` — implemented with native `std::filesystem` bindings and regression-covered through PR #326.\n",
              "- Which inputs reach `FS.mkdir` and `table.unserialize`, and are any attacker-controlled?": "- Which inputs reach `table.unserialize`, and are any attacker-controlled?",
          }
          for old, new in replacements.items():
              if program.count(old) != 1:
                  raise SystemExit(f"program anchor count for {old!r}: {program.count(old)}")
              program = program.replace(old, new)
          completed_anchor = "| `CAN-20260713-conditionlight-zero-level` / [#297](https://github.com/blakinio/canary/pull/297) | Normalized zero-level `ConditionLight` state at start/deserialization boundaries and added three focused C++ regressions | `b06079f9bc75f0c108720e2674438a2f539c8631` | Preserve the two-boundary invariant and regression tests; no further CS-001 work is open. |\n"
          completed_row = f"| `CAN-20260714-fs-mkdir-shell-injection` / [#326](https://github.com/blakinio/canary/pull/326) | Replaced shell-backed `FS.mkdir`/`FS.mkdir_p` with native `std::filesystem` bindings and added standalone Lua plus real-binding C++ security regressions | `{merge}` | Preserve compatibility wrappers, error returns and the no-shell invariant; CS-007 remains independent. |\n"
          if program.count(completed_anchor) != 1:
              raise SystemExit("completed-work anchor mismatch")
          program = program.replace(completed_anchor, completed_anchor + completed_row)
          program_path.write_text(program)

          changelog_path = Path("docs/agents/CHANGELOG.md")
          changelog = changelog_path.read_text()
          changelog_anchor = "## Unreleased\n\n"
          changelog_entry = "- PR #326 removes command-shell execution from `FS.mkdir` and `FS.mkdir_p`: compatibility wrappers now call native `FileSystem.createDirectory`/`createDirectories` bindings backed by `std::filesystem` and `std::error_code`; standalone Lua and real-binding C++ regressions cover existing paths, failures and literal shell metacharacters without marker creation.\n"
          if changelog.count(changelog_anchor) != 1:
              raise SystemExit("changelog anchor mismatch")
          if changelog_entry not in changelog:
              changelog = changelog.replace(changelog_anchor, changelog_anchor + changelog_entry)
          changelog_path.write_text(changelog)

          catalog_path = Path("docs/agents/MODULE_CATALOG.md")
          catalog = catalog_path.read_text()
          catalog_anchor = "| Forge history ID resolution | merged (#110) | Resolves history item types by ID with name fallback | Forge sources/integration test | Reuse ID-based lookup for custom/duplicate names. |\n"
          catalog_row = "| Lua filesystem directory helpers | merged (#326) | Shell-free `FileSystem.createDirectory`/`createDirectories` bindings plus compatibility `FS.mkdir`/`FS.mkdir_p` wrappers with boolean/error returns | `src/lua/functions/core/game/global_functions.{hpp,cpp}`, `data/libs/functions/fs.lua`, standalone Lua and C++ binding tests, `docs/lua-api/lua_api.json` | Reuse these methods for Lua directory creation; never reconstruct shell commands or replace the boundary with a character denylist. |\n"
          if catalog.count(catalog_anchor) != 1:
              raise SystemExit("catalog anchor mismatch")
          if catalog_row not in catalog:
              catalog = catalog.replace(catalog_anchor, catalog_anchor + catalog_row)
          catalog_path.write_text(catalog)

          active = Path("docs/agents/tasks/active/CAN-20260714-fs-mkdir-shell-injection.md")
          if not active.exists():
              raise SystemExit("active task missing")
          archive = Path("docs/agents/tasks/archive/CAN-20260714-fs-mkdir-shell-injection.md")
          archive.write_text(f'''---
          task_id: CAN-20260714-fs-mkdir-shell-injection
          program_id: CAN-PROGRAM-CRYSTALSERVER-COMPARISON
          coordination_id: CS-006
          status: completed
          agent: "GPT-5.6 Thinking"
          branch: security/fs-mkdir-shell-free-final
          base_branch: main
          created: 2026-07-14T08:00:00+02:00
          updated: 2026-07-14T12:30:00+02:00
          completed: 2026-07-14T12:20:00+02:00
          last_verified_commit: "{merge}"
          risk: high
          related_issue: ""
          related_pr: "#326"
          depends_on:
            - "CAN-PROGRAM-CRYSTALSERVER-COMPARISON Stage 1 / PR #291"
          blocks: []
          owned_paths:
            exclusive:
              - data/libs/functions/fs.lua
              - src/lua/functions/core/game/global_functions.cpp
              - src/lua/functions/core/game/global_functions.hpp
              - tests/lua/test_fs.lua
              - tests/unit/lua/filesystem_functions_test.cpp
              - tests/unit/lua/CMakeLists.txt
              - docs/lua-api/lua_api.json
              - artifacts/upstream/crystalserver/CS006_FS_MKDIR_AUDIT.md
              - artifacts/upstream/crystalserver/cs006_fs_mkdir_audit.json
              - docs/agents/tasks/archive/CAN-20260714-fs-mkdir-shell-injection.md
            shared:
              - docs/agents/programs/CRYSTALSERVER_COMPARISON_PROGRAM.md
              - docs/agents/CHANGELOG.md
              - docs/agents/MODULE_CATALOG.md
            read_only:
              - AGENTS.md
              - docs/agents/README.md
              - docs/agents/BUILD_TEST_MATRIX.md
              - docs/agents/CROSS_REPO_CONTRACTS.md
          modules_touched:
            - Lua filesystem helper boundary
          reuses:
            - existing `GlobalFunctions` Lua registration surface
            - engine-standard `std::filesystem` operations
            - existing standalone Lua and `canary_ut` infrastructure
          public_interfaces:
            - "FS.mkdir(path) -> success[, errorMessage]"
            - "FS.mkdir_p(path) -> success[, errorMessage]"
            - "FileSystem.createDirectory(path) -> success[, errorMessage]"
            - "FileSystem.createDirectories(path) -> success[, errorMessage]"
          cross_repo_tasks: []
          ---

          # Completion state

          CS-006 is complete and merged.

          - Feature PR: #326.
          - Final feature head: `{feature_head}`.
          - Squash merge: `{merge}`.
          - Historical PRs #310 and #317: closed without merge; do not reopen.
          - Final implementation scope: exactly eleven runtime, test, API, program/task and audit-evidence paths.
          - Cleanup branch: `docs/archive-cs006-fs-mkdir`.
          - Rollback: revert `{merge}`; no migration, database, map, item, asset, protocol or client cleanup is required.

          # Delivered behavior

          - `FS.mkdir` remains single-level and `FS.mkdir_p` remains recursive.
          - Both wrappers delegate to native `FileSystem.createDirectory`/`createDirectories` methods.
          - Native methods use `std::filesystem` with `std::error_code`; no shell command is built or executed.
          - Existing-directory success and boolean/error return behavior are preserved.
          - Empty recursive paths remain no-op success.
          - Non-string input, existing files and filesystem errors remain explicit failures.
          - The implementation does not claim default-client remote RCE because standard character names exclude shell syntax; it removes the unsafe general helper boundary for custom/database/script-derived paths.
          - CS-007 `table.unserialize` remains independent and unresolved by this work.

          # Evidence and validation

          - Deterministic audit scanned 6,857 tracked files and recorded definitions, call sites and path provenance in the two committed CS-006 reports.
          - The CrystalServer denylist-plus-shell patch was evidence only and was not copied.
          - Standalone Lua regression fails on any `os.execute` call.
          - C++ regression invokes the real Lua binding and verifies directory creation, existing paths, files, empty input, literal shell metacharacters and absence of marker creation.
          - Final head `{feature_head}` passed Agent Task Ownership run 705, Achievement Validation run 244, autofix run 1208 and full CI run 1811 (`29324115804`).
          - Fast Checks, formatter, Reviewdog, yamllint, Lua API validators, standalone Lua, Linux release/debug, Windows CMake/Solution, macOS, Docker, Canary smoke, schema import and Linux debug `Run Tests` all passed.
          - Final review found no reviews, comments or unresolved threads.
          - Green CI proves only the executed repository checks; no local or production-runtime result is claimed.

          # Acceptance criteria

          - [x] Shell execution removed rather than filtered.
          - [x] Public compatibility wrappers preserved.
          - [x] Lua and real-binding C++ regressions merged.
          - [x] Lua API catalogue updated.
          - [x] Exact final scope reviewed.
          - [x] Full exact-head CI passed.
          - [x] PR #326 squash-merged.
          - [x] Historical PRs closed without merge.
          - [x] Task moved from `tasks/active` to `tasks/archive` in a separate lifecycle PR.

          # Handoff

          CS-006 requires no further implementation. Preserve the native filesystem boundary and both regression layers. Do not restore shell execution or substitute a denylist. Select any later CrystalServer candidate only through a fresh bounded task and current ownership/contract review.

          # Completion

          - Final status: completed
          - Feature PR: #326
          - Feature merge commit: `{merge}`
          - Cleanup PR: pending
          - Archived at: `docs/agents/tasks/archive/CAN-20260714-fs-mkdir-shell-injection.md`
          '''.replace("          ", ""))
          active.unlink()
          PY

          workflow='.github/workflows/archive-cs006-cleanup.yml'
          rm -f "$workflow"
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          actual="$(git diff --cached --name-only | sort)"
          expected="$(printf '%s\n' \
            "$workflow" \
            'docs/agents/CHANGELOG.md' \
            'docs/agents/MODULE_CATALOG.md' \
            'docs/agents/programs/CRYSTALSERVER_COMPARISON_PROGRAM.md' \
            'docs/agents/tasks/active/CAN-20260714-fs-mkdir-shell-injection.md' \
            'docs/agents/tasks/archive/CAN-20260714-fs-mkdir-shell-injection.md' | sort)"
          test "$actual" = "$expected"
          git diff --cached --check
          git commit -m 'docs(agents): archive CS-006 filesystem task'
          git push origin HEAD:docs/archive-cs006-fs-mkdir
