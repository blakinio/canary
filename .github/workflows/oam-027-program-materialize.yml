name: OAM 027 Program Materialize

on:
  push:
    branches:
      - docs/oam-027-houses-reconciliation
    paths:
      - .github/workflows/oam-027-program-materialize.yml

permissions:
  contents: write

jobs:
  materialize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: docs/oam-027-houses-reconciliation
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Apply exact OAM-027 program reconciliation
        run: python tools/agents/oam_027_program_materialize.py
      - name: Commit materialized program record
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/agents/programs/OTERYN_ARCHITECTURE_AND_MIGRATION_PROGRAM.md
          git diff --cached --check
          git commit -m "docs(oam): reconcile OAM-027 durable completion"
          git push origin HEAD:docs/oam-027-houses-reconciliation
