---
name: Account Quests Docs Bootstrap

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: account-quests-docs-bootstrap-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/account-quests-production-hardening
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Add db.queryAffectedRows API documentation
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          path = Path("docs/lua-api/lua_api.json")
          data = json.loads(path.read_text(encoding="utf-8"))
          methods = data["classes"]["db"]
          methods[:] = [method for method in methods if method.get("name") != "queryAffectedRows"]
          query_index = next(index for index, method in enumerate(methods) if method.get("name") == "query")
          methods.insert(query_index + 1, {
              "name": "queryAffectedRows",
              "params": ["query: string"],
              "return": "number|false",
              "source": "src/lua/functions/core/libs/db_functions.cpp",
          })
          path.write_text(json.dumps(data, indent=2, ensure_ascii=False) + "\n", encoding="utf-8")
          PY
      - name: Create generated documentation commit object
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPOSITORY: ${{ github.repository }}
        run: |
          python - <<'PY'
          import base64
          import json
          import os
          import subprocess
          import urllib.request

          repository = os.environ["GH_REPOSITORY"]
          token = os.environ["GH_TOKEN"]
          parent = subprocess.check_output(["git", "rev-parse", "HEAD"], text=True).strip()

          def api(method, path, payload=None):
              data = None if payload is None else json.dumps(payload).encode()
              request = urllib.request.Request(
                  f"https://api.github.com/repos/{repository}{path}",
                  data=data,
                  method=method,
                  headers={
                      "Authorization": f"Bearer {token}",
                      "Accept": "application/vnd.github+json",
                      "X-GitHub-Api-Version": "2022-11-28",
                      "Content-Type": "application/json",
                  },
              )
              with urllib.request.urlopen(request) as response:
                  return json.load(response)

          parent_commit = api("GET", f"/git/commits/{parent}")
          content = open("docs/lua-api/lua_api.json", "rb").read()
          blob = api("POST", "/git/blobs", {
              "content": base64.b64encode(content).decode(),
              "encoding": "base64",
          })
          tree = api("POST", "/git/trees", {
              "base_tree": parent_commit["tree"]["sha"],
              "tree": [{
                  "path": "docs/lua-api/lua_api.json",
                  "mode": "100644",
                  "type": "blob",
                  "sha": blob["sha"],
              }],
          })
          commit = api("POST", "/git/commits", {
              "message": "docs(lua-api): document db.queryAffectedRows",
              "tree": tree["sha"],
              "parents": [parent],
          })
          with open("/tmp/account-quests-docs-commit-sha.txt", "w", encoding="utf-8") as output:
              output.write(commit["sha"] + "\n")
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: account-quests-docs-commit
          path: /tmp/account-quests-docs-commit-sha.txt
          if-no-files-found: error
