name: OTBM Geometry Audit

on:
  push:
    branches:
      - main
      - "feat/**"
      - "fix/**"
      - "ai/**"
    paths:
      - "tools/ai-agent/otbm_geometry_audit*.py"
      - "tools/ai-agent/test_otbm_geometry_audit.py"
      - "tools/ai-agent/otbm_world_index.py"
      - "tools/ai-agent/otbm_reachability*.py"
      - "tools/ai-agent/otbm_appearances.py"
      - "tools/ai-agent/otbm_item_audit_scan.cpp"
      - "docs/ai-agent/OTBM_GEOMETRY_AUDIT*.json"
      - "docs/ai-agent/OTBM_GEOMETRY_RULES.schema.json"
      - ".github/workflows/otbm-geometry-audit.yml"
  pull_request:
    paths:
      - "tools/ai-agent/otbm_geometry_audit*.py"
      - "tools/ai-agent/test_otbm_geometry_audit.py"
      - "tools/ai-agent/otbm_world_index.py"
      - "tools/ai-agent/otbm_reachability*.py"
      - "tools/ai-agent/otbm_appearances.py"
      - "tools/ai-agent/otbm_item_audit_scan.cpp"
      - "docs/ai-agent/OTBM_GEOMETRY_AUDIT*.json"
      - "docs/ai-agent/OTBM_GEOMETRY_RULES.schema.json"
      - ".github/workflows/otbm-geometry-audit.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate bounded geometry evidence
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run focused Phase 7 tests
        run: |
          PYTHONPATH=tools/ai-agent \
            python -m unittest -v tools/ai-agent/test_otbm_geometry_audit.py

      - name: Compile Python modules
        run: |
          python -m py_compile \
            tools/ai-agent/otbm_geometry_audit.py \
            tools/ai-agent/otbm_geometry_audit_types.py \
            tools/ai-agent/otbm_geometry_audit_analysis.py \
            tools/ai-agent/otbm_geometry_audit_render.py \
            tools/ai-agent/otbm_geometry_audit_tool.py \
            tools/ai-agent/test_otbm_geometry_audit.py

      - name: Validate schema syntax
        run: |
          python -m json.tool docs/ai-agent/OTBM_GEOMETRY_AUDIT.schema.json > /dev/null
          python -m json.tool docs/ai-agent/OTBM_GEOMETRY_RULES.schema.json > /dev/null

      - name: Build representative report and rules
        run: |
          mkdir -p artifacts
          PYTHONPATH=tools/ai-agent python - <<'PY'
          import json
          from pathlib import Path
          from test_otbm_geometry_audit import GeometryAuditTests, clean_tiles

          GeometryAuditTests.setUpClass()
          case = GeometryAuditTests(methodName="test_01_clean_connected_region")
          try:
              case.setUp()
              case.build(clean_tiles())
              report = case.analyze()
              Path("artifacts/OTBM_GEOMETRY_AUDIT.json").write_text(
                  json.dumps(report, indent=2, sort_keys=True) + "\n",
                  encoding="utf-8",
              )
              rules = {
                  "format": "canary-otbm-geometry-rules-v1",
                  "schemaVersion": 1,
                  "adjacencyRules": [
                      {
                          "id": "representative-wall-east",
                          "category": "wall",
                          "sourceItemIds": [400],
                          "direction": "east",
                          "requiredNeighborItemIds": [401],
                          "severity": "warning",
                          "confidence": "high",
                          "message": "Representative reviewed adjacency",
                      }
                  ],
              }
              Path("artifacts/OTBM_GEOMETRY_RULES.json").write_text(
                  json.dumps(rules, indent=2, sort_keys=True) + "\n",
                  encoding="utf-8",
              )
          finally:
              case.tearDown()
              GeometryAuditTests.tearDownClass()
          PY

      - name: Validate representative contracts
        run: |
          python -m pip install --disable-pip-version-check jsonschema
          python - <<'PY'
          import json
          from pathlib import Path
          import jsonschema

          audit_schema = json.loads(Path("docs/ai-agent/OTBM_GEOMETRY_AUDIT.schema.json").read_text(encoding="utf-8"))
          rules_schema = json.loads(Path("docs/ai-agent/OTBM_GEOMETRY_RULES.schema.json").read_text(encoding="utf-8"))
          report = json.loads(Path("artifacts/OTBM_GEOMETRY_AUDIT.json").read_text(encoding="utf-8"))
          rules = json.loads(Path("artifacts/OTBM_GEOMETRY_RULES.json").read_text(encoding="utf-8"))
          jsonschema.validate(report, audit_schema)
          jsonschema.validate(rules, rules_schema)
          assert report["format"] == "canary-otbm-geometry-audit-v1"
          assert report["policy"]["otbmParsedIndependently"] is False
          assert report["policy"]["phase3ClassifierReused"] is True
          assert report["policy"]["protectionZoneMask"] == 1
          assert report["policy"]["mapModified"] is False
          assert report["policy"]["aiImageryUsed"] is False
          assert report["complete"] is True
          PY

      - name: Verify forbidden generated inputs are absent
        run: |
          if find artifacts -type f \( -name '*.otbm' -o -name '*.widx' -o -name '*.png' -o -name 'appearances.dat' \) | grep -q .; then
            echo "Forbidden generated map/index/asset/render entered artifact output" >&2
            exit 1
          fi

      - name: Assemble local Phase 7 toolkit
        run: |
          mkdir -p artifacts/toolkit
          cp tools/ai-agent/otbm_geometry_audit*.py artifacts/toolkit/
          cp tools/ai-agent/otbm_world_index.py artifacts/toolkit/
          cp tools/ai-agent/otbm_reachability_types.py artifacts/toolkit/
          cp tools/ai-agent/otbm_reachability_transition.py artifacts/toolkit/
          cp tools/ai-agent/otbm_appearances.py artifacts/toolkit/
          cp docs/ai-agent/OTBM_GEOMETRY_AUDIT.md artifacts/toolkit/
          cp docs/ai-agent/OTBM_GEOMETRY_AUDIT.schema.json artifacts/toolkit/
          cp docs/ai-agent/OTBM_GEOMETRY_RULES.schema.json artifacts/toolkit/

      - name: Upload report and toolkit
        uses: actions/upload-artifact@v4
        with:
          name: otbm-geometry-audit
          path: artifacts
          if-no-files-found: error
          retention-days: 14
