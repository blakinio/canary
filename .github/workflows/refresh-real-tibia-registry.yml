name: Refresh Real Tibia Registry Branch

on:
  push:
    branches:
      - feat/real-tibia-module-registry
    paths:
      - .github/workflows/refresh-real-tibia-registry.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-real-tibia-registry-branch
  cancel-in-progress: false

jobs:
  refresh:
    if: github.repository == 'blakinio/canary'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout exact branch head
        uses: actions/checkout@v6
        with:
          ref: feat/real-tibia-module-registry
          fetch-depth: 0
          persist-credentials: true

      - name: Rebuild branch as one current-main commit
        shell: bash
        run: |
          set -euo pipefail

          branch='feat/real-tibia-module-registry'
          old_head="$(git rev-parse HEAD)"
          test "$old_head" = "${GITHUB_SHA}"

          git fetch --no-tags origin main
          merge_base="$(git merge-base "$old_head" origin/main)"
          git diff --name-only -z "$merge_base" "$old_head" > /tmp/registry-files.zlist

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git reset --hard origin/main

          while IFS= read -r -d '' path; do
            if git cat-file -e "$old_head:$path" 2>/dev/null; then
              git checkout "$old_head" -- "$path"
            else
              git rm -f --ignore-unmatch -- "$path"
            fi
          done < /tmp/registry-files.zlist

          git add -A
          git diff --cached --check
          git commit -m 'feat(agents): refresh Real Tibia module registry on current main'
          git push \
            --force-with-lease="refs/heads/${branch}:${old_head}" \
            origin "HEAD:refs/heads/${branch}"
