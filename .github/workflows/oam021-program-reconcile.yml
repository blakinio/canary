name: OAM-021 durable program reconciliation materializer

on:
  push:
    branches:
      - docs/oam-021-program-reconciliation

permissions:
  contents: write

jobs:
  reconcile:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: docs/oam-021-program-reconciliation
          fetch-depth: 0

      - name: Reconcile OAM-021 durable program state and remove materializer
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          path = Path('docs/agents/programs/OTERYN_ARCHITECTURE_AND_MIGRATION_PROGRAM.md')
          text = path.read_text()

          replacements = [
              (
                  'updated: 2026-07-19T22:48:11+02:00\nlast_verified_commit: "a3896b67e94990712e00e877666f2bd54dceb22a"',
                  'updated: 2026-07-19T23:59:00+02:00\nlast_verified_commit: "2c448205d864f6388b8be932ecbb1a9e6dcaffe0"',
              ),
              (
                  '| OAM-020 | `exaltation-forge → ADAPT` | target `d59207d05ab6dd9450b05d0a6b4d9122fda60489`; feature `2b6ae86539640dfc52323e9d5abbde31d6610c5f`; lifecycle `a3896b67e94990712e00e877666f2bd54dceb22a` |',
                  '| OAM-020 | `exaltation-forge → ADAPT` | target `d59207d05ab6dd9450b05d0a6b4d9122fda60489`; feature `2b6ae86539640dfc52323e9d5abbde31d6610c5f`; lifecycle `a3896b67e94990712e00e877666f2bd54dceb22a` |\n| OAM-021 | `market → ADAPT` | target `b90e287a40413102c87e8c7fa3d5c01ad401cb6d`; feature `76273c0cb7c2e297c8896a8e7fb6809649fa2870`; lifecycle `2c448205d864f6388b8be932ecbb1a9e6dcaffe0` |',
              ),
              (
                  '''```text\nCanary reconciliation base: a3896b67e94990712e00e877666f2bd54dceb22a\nOtheryn target head after OAM-020: d59207d05ab6dd9450b05d0a6b4d9122fda60489\nmaintained OTClient: 2a1b93bcdf6d4317ceeb2254b1e89429453a8e7f\nOAM-001..OAM-020: feature/lifecycle complete\nOAM-020 task: archived\nOAM-021: NOT STARTED\n```''',
                  '''```text\nCanary reconciliation base: 2c448205d864f6388b8be932ecbb1a9e6dcaffe0\nOtheryn target head after OAM-021: b90e287a40413102c87e8c7fa3d5c01ad401cb6d\nmaintained OTClient: 2a1b93bcdf6d4317ceeb2254b1e89429453a8e7f\nOAM-001..OAM-021: feature/lifecycle complete\nOAM-021 task: archived\nOAM-022: NOT STARTED\n```''',
              ),
              (
                  '| OAM-001..OAM-020 | completed | preserve durable evidence |\n| OAM-021+ | planned, not active | only after this reconciliation merges: perform fresh live-state/open-PR/ownership and exact target/upstream/legacy preflight, then select one dependency-valid canonical package |',
                  '| OAM-001..OAM-021 | completed | preserve durable evidence |\n| OAM-022+ | planned, not active | only after this reconciliation merges: perform fresh live-state/open-PR/ownership and exact target/upstream/legacy preflight, then select one dependency-valid canonical package |',
              ),
              (
                  '- OAM-020 does not claim exhaustive Forge parity, physical-client Forge E2E closure, unresolved F-014 through F-019 server/client result parity, evidence-blocked F-009/F-010 rule parity, or generic cross-domain transaction/persistence redesign.',
                  '- OAM-020 does not claim exhaustive Forge parity, physical-client Forge E2E closure, unresolved F-014 through F-019 server/client result parity, evidence-blocked F-009/F-010 rule parity, or generic cross-domain transaction/persistence redesign.\n- OAM-021 does not claim crash-safe exactly-once Market create/cancel/accept/expiry, cross-process or multiwriter Market safety, remote-player mutation routing, generic multichannel/economic-ledger/leader-election redesign, exhaustive Real Tibia Market parity, maintained-client changes, or physical-client Market E2E closure.',
              ),
              (
                  'Merge this program-only OAM-020 completion reconciliation after exact-head Ownership/CI/review gates. Only then may a fresh OAM-021 preflight begin. OAM-021 is NOT STARTED by this record.',
                  'Merge this program-only OAM-021 completion reconciliation after exact-head Ownership/CI/review gates. Only then may a fresh OAM-022 preflight begin. OAM-022 is NOT STARTED by this record.',
              ),
          ]

          for old, new in replacements:
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'expected exactly one replacement anchor, found {count}: {old[:120]!r}')
              text = text.replace(old, new, 1)

          anchor = '# Current state\n'
          if text.count(anchor) != 1:
              raise SystemExit(f'unexpected Current state anchor count: {text.count(anchor)}')
          if '# OAM-021 durable completion' in text:
              raise SystemExit('OAM-021 durable completion already present')

          durable = '''# OAM-021 durable completion\n\nFinal disposition:\n\n```text\nmarket ADAPT\n```\n\nTask-start baselines were Canary `183d7224cb5de57585294d72631f37783b93dc89`, Otheryn `d59207d05ab6dd9450b05d0a6b4d9122fda60489`, fresh upstream `71a0f92b4da3f550b292fa7536a0e35c2769f1ae`, and maintained OTClient `2a1b93bcdf6d4317ceeb2254b1e89429453a8e7f`. Canonical `market` depends on completed `player-persistence` and `protocol`; completed `exaltation-forge` is an interaction boundary. Fresh ownership review found no target/client OAM-021 writer and no overlapping Canary runtime writer.\n\nThe task-start Otheryn and fresh upstream Market core were content-identical in the reviewed `src/io/iomarket.cpp` and Market-owned `src/game/game.cpp` paths, but unconditional whole-module `REUSE` was rejected. Legacy Canary's selected Market deltas are coupled to multichannel `EconomicLedgerStore` and leader-election work and do not form a complete generic exactly-once design. Open shared-state/economy security evidence additionally proves a cross-process partial-fill race and a remote-owner stale-save hazard in the multichannel deployment. Those findings are important constraints for future multiwriter Market work, but they do not justify silently importing the separately owned cluster architecture into the clean single-dispatcher target. Generic crash/restart atomicity between offer/history persistence and item/balance effects remains an explicit known gap.\n\nOtheryn PR #45 final head `f13d4d2d0626c99dd2318ef088ce155f67b0b5ae` changed exactly five intended target paths and no materializer path. The bounded server-only adaptation centralizes deterministic 16-bit offer-counter derivation, fails closed on invalid timestamp/duration lookup windows, strictly parses persisted tier values without parse-then-`uint8_t` truncation, and adds focused deterministic proof. The maintained OTClient wire contract remained unchanged, so no client write was required. Autofix.ci #144 run `29704971999`, CI #167 run `29704972077`, and Required #151 run `29704972006` all passed on the exact final target head. Linux debug CTest completed `396/396`, and `Oam021MarketAdaptTest` passed `3/3`. Test-log artifact `8447725005` has digest `sha256:f6f6b67fda044f1d8b88600a87234f4cb6559ae3e3d9270ddd2a98041948debb`. Target comments/reviews/threads were empty, target-main drift was none, and PR #45 merged by expected-head squash as `b90e287a40413102c87e8c7fa3d5c01ad401cb6d`.\n\nCanary governance PR #607 final head `d2290f6072a8fd9e90f43a164a8426076ff6c718` changed exactly the OAM-021 report and active-task record. It passed Agent Task Ownership #2743 run `29705475496` and exact-head `ci:final-gate` CI #3892 run `29705479591`. Fast Checks, Lua Tests and aggregate Required passed; the final-gate build-scope/immediate-parent reuse policy deliberately skipped Linux/macOS/Windows/Docker rebuild jobs for the two-document governance diff, so OAM-021 does not misrepresent that governance run as a second heavy target matrix. Comments, reviews and review threads were empty, Canary `main` had no drift from the task-start Canary base, and PR #607 merged by expected-head squash as `76273c0cb7c2e297c8896a8e7fb6809649fa2870`.\n\nAuthoritative lifecycle PR #610 final head `acd76122590584acb4f71db5786ff43e415f596a` changed exactly the active-delete/archive-add lifecycle paths. It passed Agent Task Ownership #2745 run `29705593288`, draft CI #3893 run `29705593339`, and ready-state CI #3894 run `29705635036`. Comments/reviews/threads were empty and Canary `main` had no drift from the governance merge before lifecycle merge. PR #610 merged by expected-head squash as `2c448205d864f6388b8be932ecbb1a9e6dcaffe0`.\n\nOAM-021 does not import or claim generic multichannel Redis/session ownership, `economic_ledger` recovery, leader election, crash-safe exactly-once Market operations, cross-process/multiwriter Market safety, remote-player mutation routing, generic bank/account/guild economy redesign, exhaustive Real Tibia Market parity, NPC shops, store products, direct player trade, maps, OTBM, `items.otb`, world assets, schema, deployment, maintained-OTClient changes, or physical-client Market E2E closure.\n\n'''
          text = text.replace(anchor, durable + anchor, 1)
          path.write_text(text)
          PY

          rm .github/workflows/oam021-program-reconcile.yml
          git diff --check
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add docs/agents/programs/OTERYN_ARCHITECTURE_AND_MIGRATION_PROGRAM.md .github/workflows/oam021-program-reconcile.yml
          git commit -m "docs(oam): reconcile OAM-021 durable completion"
          git push origin HEAD:docs/oam-021-program-reconciliation
