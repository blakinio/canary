name: Real Tibia Module Registry

on:
  push:
    branches:
      - main
      - "feat/**"
      - "fix/**"
      - "docs/**"
      - "ci/**"
    paths:
      - "docs/agents/real-tibia/**"
      - "tools/agents/real_tibia_registry.py"
      - "tools/agents/real_tibia_registry_lib.py"
      - "tools/agents/test_real_tibia_registry.py"
      - ".github/workflows/real-tibia-registry.yml"
  pull_request:
    paths:
      - "docs/agents/real-tibia/**"
      - "tools/agents/real_tibia_registry.py"
      - "tools/agents/real_tibia_registry_lib.py"
      - "tools/agents/test_real_tibia_registry.py"
      - ".github/workflows/real-tibia-registry.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate registry and generated indexes
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout exact head
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install schema validator
        run: python -m pip install --disable-pip-version-check jsonschema

      - name: Compile registry tooling
        run: |
          python -m py_compile \
            tools/agents/real_tibia_registry.py \
            tools/agents/real_tibia_registry_lib.py \
            tools/agents/test_real_tibia_registry.py

      - name: Run focused tests
        run: python -m unittest -v tools/agents/test_real_tibia_registry.py

      - name: Validate registry contracts
        run: python tools/agents/real_tibia_registry.py validate

      - name: Verify generated indexes are current
        run: python tools/agents/real_tibia_registry.py generate --check

      - name: Exercise discovery commands
        run: |
          python tools/agents/real_tibia_registry.py module wheel-of-destiny
          python tools/agents/real_tibia_registry.py lookup-path src/server/network/protocol/protocolgame.cpp
          python tools/agents/real_tibia_registry.py stale --as-of 2026-08-15
