---
name: Security Validation

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/security-validation.yml"
      - ".github/workflows/reusable-build-linux.yml"
      - ".github/scripts/smoke_test_canary.py"
      - "tools/security/**"
      - "tests/security/**"
      - "tools/e2e/run_agent_load_runtime.py"
      - "docs/security/**"
      - "docs/agents/programs/SECURITY_VALIDATION_PROGRAM.md"
      - "docs/agents/decisions/ADR-20260716-security-validation-platform-boundary.md"
      - "data/libs/functions/fs.lua"
      - "data/libs/functions/tables.lua"
  push:
    branches: [main]
    paths:
      - ".github/workflows/security-validation.yml"
      - ".github/workflows/reusable-build-linux.yml"
      - ".github/scripts/smoke_test_canary.py"
      - "tools/security/**"
      - "tests/security/**"
      - "tools/e2e/run_agent_load_runtime.py"
      - "data/libs/functions/fs.lua"
      - "data/libs/functions/tables.lua"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-validation-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate security scenarios
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Checkout exact head
        uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile and test security platform
        run: |
          set -euo pipefail
          python -m py_compile \
            tools/security/security_validation.py \
            tools/security/runtime_adapter.py \
            tools/security/malformed_packet_runtime.py \
            tests/security/test_security_validation.py \
            tests/security/test_runtime_adapter.py \
            tests/security/test_malformed_packet_runtime.py
          python -m unittest discover -v -s tests/security -p 'test_*.py'
      - name: Validate security scenario registry
        run: python tools/security/security_validation.py validate
      - name: Validate runtime adapter registry
        run: python tools/security/runtime_adapter.py validate
      - name: Resolve authorized runtime delegation
        run: >-
          python tools/security/runtime_adapter.py resolve
          --adapter canary-universal-e2e
          --authorized-repository blakinio/canary
          --report artifacts/security-validation/runtime-delegation.json
      - name: Run registered security scenarios
        run: >-
          python tools/security/security_validation.py run-all
          --authorized-repository blakinio/canary
          --report-dir artifacts/security-validation
      - name: Upload security validation evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-validation
          path: artifacts/security-validation/
          if-no-files-found: warn
          retention-days: 14

  build-canary:
    name: Build exact Canary head
    needs: [validate]
    if: needs.validate.result == 'success'
    permissions:
      contents: write
      packages: write
    uses: ./.github/workflows/reusable-build-linux.yml
    with:
      buildtypes: '["linux-release"]'
      run_canary_smoke: false
      run_global_smoke: false

  malformed-status-parser:
    name: Malformed status parser runtime
    needs: [validate, build-canary]
    if: needs.validate.result == 'success' && needs.build-canary.result == 'success'
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read
      actions: read
    env:
      ARTIFACT_DIR: ${{ github.workspace }}/artifacts/security-malformed-packets
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: "${{ github.run_id }}"
          MYSQL_DATABASE: canary_security_runtime
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -p${{ github.run_id }}"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=18
    steps:
      - name: Checkout exact test head
        uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Download exact-head Canary binary
        uses: actions/download-artifact@v4
        with:
          name: canary-linux-release
          path: canary-bin
      - name: Install runtime dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y mysql-client
      - name: Resolve exact Canary executable
        run: |
          set -euo pipefail
          CANARY_PATH="$(find canary-bin -type f -name canary -perm -111 | head -n 1)"
          if [[ -z "${CANARY_PATH}" ]]; then
            CANARY_PATH="$(find canary-bin -type f -name canary | head -n 1)"
          fi
          test -n "${CANARY_PATH}"
          chmod +x "${CANARY_PATH}"
          echo "CANARY_BIN=${GITHUB_WORKSPACE}/${CANARY_PATH}" >> "${GITHUB_ENV}"
      - name: Run bounded malformed packet plan
        run: |
          set -euo pipefail
          mkdir -p "${ARTIFACT_DIR}"
          python tools/security/malformed_packet_runtime.py \
            --binary-path "${CANARY_BIN}" \
            --plan tests/security/runtime_scenarios/canary-status-parser.json \
            --authorized-repository blakinio/canary \
            --artifact-dir "${ARTIFACT_DIR}" \
            --db-port 3306 \
            --db-password "${{ github.run_id }}" \
            --db-name canary_security_runtime \
            --login-port 7471 \
            --game-port 7472 \
            --status-port 7473
      - name: Upload malformed packet evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-malformed-status-parser
          path: artifacts/security-malformed-packets/
          if-no-files-found: warn
          retention-days: 14
