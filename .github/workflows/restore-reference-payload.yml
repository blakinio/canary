name: Restore OTBM Reference Source

on:
  push:
    branches:
      - feat/otbm-tibiamaps-compare
    paths:
      - .github/restore-reference/otbm_reference.py.gz.b64

permissions:
  contents: write

jobs:
  restore:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/otbm-tibiamaps-compare
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Restore and verify exact source
        shell: bash
        run: |
          base64 --decode .github/restore-reference/otbm_reference.py.gz.b64 | gzip --decompress > tools/ai-agent/otbm_reference.py
          test "$(git hash-object tools/ai-agent/otbm_reference.py)" = "9b7fc6e27504e62bda3ae766495709f95dea6f1c"
          python -m unittest tools/ai-agent/test_otbm_reference.py -v
      - name: Commit tested source and remove helpers
        shell: bash
        run: |
          git rm .github/workflows/restore-reference-payload.yml
          git rm -f .github/workflows/restore-otbm-reference.yml
          git rm .github/restore-reference/otbm_reference.py.gz.b64
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tools/ai-agent/otbm_reference.py
          git commit -m "fix(ai-agent): restore exact OTBM reference implementation"
          git push origin HEAD:feat/otbm-tibiamaps-compare
