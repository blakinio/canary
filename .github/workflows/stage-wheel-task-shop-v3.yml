name: Stage Wheel Task Shop implementation v3

on:
  pull_request:
    paths:
      - ".github/workflows/stage-wheel-task-shop-v3.yml"

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Check out staging source
        uses: actions/checkout@v4
        with:
          ref: automation/wheel-task-shop-stage-pr
          fetch-depth: 0

      - name: Extract KV cache patch
        run: |
          python - <<'PY'
          from pathlib import Path
          import textwrap
          workflow = Path('.github/workflows/stage-wheel-task-shop-v4.yml').read_text(encoding='utf-8').splitlines()
          start = next(i for i, line in enumerate(workflow) if line.strip() == "python - <<'PY'") + 1
          end = next(i for i in range(start, len(workflow)) if workflow[i].strip() == 'PY')
          Path('/tmp/fix_wheel_task_shop_cache.py').write_text(textwrap.dedent('\n'.join(workflow[start:end])) + '\n', encoding='utf-8')
          PY

      - name: Check out real Wheel branch
        uses: actions/checkout@v4
        with:
          ref: feat/wheel-15-25-runtime-completion
          fetch-depth: 0

      - name: Apply cache fix
        run: python /tmp/fix_wheel_task_shop_cache.py

      - name: Validate focused fix
        run: |
          git diff --check
          PYTHONPATH=tools/ai-agent python -m unittest -v tools/ai-agent/test_wheel_task_shop_validation.py
          python tools/check_lua_api_binding_docs.py

      - name: Commit to real Wheel branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            data/modules/scripts/taskboard/taskboard.lua \
            docs/agents/tasks/active/CAN-20260713-wheel-15-25-runtime-completion.md \
            docs/ai-agent/OTS_AI_WHEEL_OF_DESTINY_VALIDATION.md \
            docs/lua-api/lua_api.d.lua \
            docs/lua-api/lua_api.json \
            src/creatures/players/components/wheel/player_wheel.cpp \
            src/creatures/players/components/wheel/player_wheel.hpp \
            src/lua/functions/creatures/player/player_functions.cpp \
            src/lua/functions/creatures/player/player_functions.hpp \
            tests/unit/players/wheel_validation_test.cpp \
            tools/ai-agent/test_wheel_task_shop_validation.py
          git commit -m "fix(wheel): cache Hunting Task Shop points"
          git push origin HEAD:feat/wheel-15-25-runtime-completion
