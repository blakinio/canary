name: Temporary OTBM QA Programme Closure Helper

on:
  push:
    branches:
      - docs/otbm-qa-program-closure-20260723
    paths:
      - .github/workflows/otbm-qa-program-closure-helper.yml
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/otbm-qa-program-closure-helper.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: docs/otbm-qa-program-closure-20260723
          fetch-depth: 0
      - name: Apply bounded programme closure reconciliation
        run: |
          python .github/scripts/temporary_otbm_qa_program_closure_patch.py
          python - <<'PY'
          from pathlib import Path
          path = Path("docs/ai-agent/OTBM_WORLD_QUALITY_REPAIR_ROADMAP.md")
          text = path.read_text(encoding="utf-8")
          text = text.replace("> Status: complete / OTBM-QA-001..018 delivered and lifecycle-closed  \n", "> Status: complete / OTBM-QA-001..018 delivered and lifecycle-closed\n", 1)
          path.write_text(text, encoding="utf-8")
          PY
      - name: Commit bounded closure result
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/otbm-qa-program-closure-helper.yml .github/scripts/temporary_otbm_qa_program_closure_patch.py
          git add docs/ai-agent/OTBM_WORLD_QUALITY_REPAIR_ROADMAP.md docs/agents/MODULE_CATALOG.md docs/agents/CHANGELOG.md
          git diff --cached --check
          git commit -m "docs(otbm): reconcile completed QA programme"
          git push origin HEAD:docs/otbm-qa-program-closure-20260723
