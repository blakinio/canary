name: Temporary OTBM QA 006-007 Governance Helper

on:
  push:
    branches:
      - docs/otbm-qa-006-007-governance-20260723
    paths:
      - .github/workflows/otbm-qa-006-007-governance-helper.yml
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/otbm-qa-006-007-governance-helper.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: docs/otbm-qa-006-007-governance-20260723
          fetch-depth: 0
      - name: Apply exact shared-doc additions
        shell: python
        run: |
          from pathlib import Path

          catalog = Path("docs/agents/MODULE_CATALOG.md")
          text = catalog.read_text(encoding="utf-8")
          rows = [
              "| OTBM Region and Quest Certification | merged (#759) | Deterministic bounded `canary-otbm-region-quest-certification-v1` C0-C7 certification over explicitly reviewed `canary-otbm-certification-targets-v1` selections and exact current `canary-otbm-coverage-dashboard-v1` evidence | `tools/ai-agent/otbm_region_quest_certification.py`, CLI, focused tests, `docs/ai-agent/OTBM_REGION_QUEST_CERTIFICATION.md`, manifest/report schemas | Reuse QA-005 factual dimensions only; require contiguous evidence and current-map provenance, cap region/landmark-route at C5 and quest/mechanic-set at C7, collapse stale/mixed/not-evaluated current provenance to C0, and never rerun validators, routes, Physical E2E or candidate validation. |",
              "| OTBM Continuous Assurance Gate | merged (#759) | Fail-closed `canary-otbm-continuous-assurance-v1` composition of exact QA-002 regression selection, before/after QA-001 World Health, before/after QA-006 certification and explicit `canary-otbm-continuous-assurance-execution-v1` selected-validation results | `tools/ai-agent/otbm_continuous_assurance.py`, CLI, focused tests, `docs/ai-agent/OTBM_CONTINUOUS_ASSURANCE.md`, execution/report schemas | Orchestration only: selected static and represented Physical E2E result sets must match exactly and pass; uncertain/manual selection, World Health regressions and certification disappearance/regression/staleness fail closed. Never rerun validators/E2E, suppress unrelated suites or authorize deployment. |",
          ]
          if not all(row in text for row in rows):
              lines = text.splitlines()
              anchor_index = next((i for i, line in enumerate(lines) if line.startswith("| OTBM Coverage Dashboard | active (#688) |")), None)
              if anchor_index is None:
                  raise SystemExit("MODULE_CATALOG QA-005 anchor not found")
              lines[anchor_index + 1:anchor_index + 1] = [row for row in rows if row not in text]
              catalog.write_text("\n".join(lines) + "\n", encoding="utf-8")

          changelog = Path("docs/agents/CHANGELOG.md")
          change_text = changelog.read_text(encoding="utf-8")
          bullets = [
              "- Adds `canary-otbm-certification-targets-v1` and `canary-otbm-region-quest-certification-v1` as deterministic bounded C0-C7 certification over exact QA-005 Coverage Dashboard dimensions. Certification is contiguous, current-map provenance is mandatory, region/landmark-route targets are capped at C5, quest/mechanic-set targets may reach C7, and stale/mixed/not-evaluated current provenance collapses formal certification to C0. The layer does not parse OTBM, rerun validators/routes/Physical E2E/candidate validation, emit an opaque score or certify unrelated world scope.",
              "- Adds `canary-otbm-continuous-assurance-execution-v1` and `canary-otbm-continuous-assurance-v1` as a fail-closed read-only gate over exact QA-002 regression selection, before/after QA-001 World Health, before/after QA-006 certification and explicit selected-validation execution evidence. Selected static and represented Physical E2E result sets must match exactly and pass; uncertain/manual selection, positive World Health problem deltas and certification disappearance/regression/staleness block the gate. The layer does not rerun validators or E2E, suppress unrelated non-OTBM suites or authorize deployment.",
          ]
          if not all(bullet in change_text for bullet in bullets):
              marker = "## Unreleased\n\n"
              if marker not in change_text:
                  raise SystemExit("CHANGELOG Unreleased marker not found")
              additions = "\n".join(bullet for bullet in bullets if bullet not in change_text) + "\n"
              changelog.write_text(change_text.replace(marker, marker + additions, 1), encoding="utf-8")
      - name: Commit bounded governance result
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/otbm-qa-006-007-governance-helper.yml
          git add docs/agents/MODULE_CATALOG.md docs/agents/CHANGELOG.md
          git diff --cached --check
          git commit -m "docs(agents): register OTBM QA-006 and QA-007"
          git push origin HEAD:docs/otbm-qa-006-007-governance-20260723
