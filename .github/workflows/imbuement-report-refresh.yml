---
name: Imbuement Report Refresh

on:
  push:
    branches:
      - fix/imbuement-direct-access-guard
    paths:
      - .github/workflows/imbuement-report-refresh.yml

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/imbuement-direct-access-guard
      - name: Refresh exact report baseline
        shell: python
        run: |
          from pathlib import Path
          path = Path("docs/ai-agent/IMBUEMENT_VALIDATION_REPORT.md")
          text = path.read_text(encoding="utf-8")
          replacements = {
              "> **Status:** IMB-001/002/003/006 repaired in PR #251; IMB-004/005 preserved; final CI pending": "> **Status:** IMB-001..006 live parity merged; direct-ID server authorization repaired in PR #282 pending final CI",
              "- `src/creatures/players/imbuements/imbuement_storage_policy.hpp`;": "- `src/creatures/players/imbuements/imbuement_storage_policy.hpp`;\n- `src/creatures/players/imbuements/imbuement_access_policy.hpp`;",
              "| Distinct nonzero Powerful storage IDs | 7 |": "| Distinct nonzero Powerful storage IDs | 9 |",
              "| Powerful families using nonzero storage | 22 |": "| Powerful families using nonzero storage | 24 |",
              "| Powerful families using `storage=0` | 2 |": "| Powerful families using `storage=0` | 0 |",
              "- live before/after shrine visibility for all seven boss groups;": "- live before/after shrine visibility for all Powerful unlock groups;",
          }
          for old, new in replacements.items():
              if old not in text:
                  raise SystemExit(f"missing report anchor: {old}")
              text = text.replace(old, new, 1)
          text = text.replace("\n\n\n## Direct-ID dry-test finding", "\n\n## Direct-ID dry-test finding")
          path.write_text(text, encoding="utf-8")
      - name: Commit report refresh
        run: |
          rm .github/workflows/imbuement-report-refresh.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/ai-agent/IMBUEMENT_VALIDATION_REPORT.md .github/workflows/imbuement-report-refresh.yml
          git commit -m "docs(imbuement): refresh dry-test validation report"
          git push origin HEAD:fix/imbuement-direct-access-guard
