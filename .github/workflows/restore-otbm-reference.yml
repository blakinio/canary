name: Restore OTBM Reference Implementation

on:
  push:
    branches:
      - feat/otbm-tibiamaps-compare
    paths:
      - .github/workflows/restore-otbm-reference.yml

permissions:
  contents: write

jobs:
  restore:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/otbm-tibiamaps-compare
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Restore exact source
        shell: bash
        env:
          PAYLOAD: 
        run: |
          python - <<'PY'
          import base64, gzip, os
          from pathlib import Path
          data = gzip.decompress(base64.b64decode(os.environ['PAYLOAD']))
          Path('tools/ai-agent/otbm_reference.py').write_bytes(data)
          PY
          test "$(git hash-object tools/ai-agent/otbm_reference.py)" = "9b7fc6e27504e62bda3ae766495709f95dea6f1c"
      - name: Run focused tests
        run: python -m unittest tools/ai-agent/test_otbm_reference.py -v
      - name: Commit exact source
        run: |
          git rm .github/workflows/restore-otbm-reference.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tools/ai-agent/otbm_reference.py
          git commit -m "fix(ai-agent): restore exact OTBM reference implementation"
          git push origin HEAD:feat/otbm-tibiamaps-compare
