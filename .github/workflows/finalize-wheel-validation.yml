name: Finalize Wheel validation document

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/finalize-wheel-validation.yml

permissions:
  contents: write

jobs:
  finalize-document:
    runs-on: ubuntu-latest
    steps:
      - name: Check out staging branch
        uses: actions/checkout@v4
        with:
          ref: validation/wheel-finalize-stage-v2
          fetch-depth: 0

      - name: Update final validation status
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          path = Path("docs/ai-agent/OTS_AI_WHEEL_OF_DESTINY_VALIDATION.md")
          text = path.read_text()

          replacements = {
              "> **Status:** active validation": "> **Status:** validation phase complete; confirmed fixes in PR #216; missing systems and runtime proofs explicitly tracked",
              "> **Working branch:** `validation/wheel-of-destiny-review-v2`": "> **Working branch:** `validation/wheel-of-destiny-review-v3`",
              "| Promotion points from levels | partial | formula now handles levels 1–50 without unsigned wrap; unit coverage added | CI and runtime login test |": "| Promotion points from levels | partial | formula handles levels 1–50 without unsigned wrap; unit coverage and PR #216 CI passed | runtime login test |",
              "| Grade IV permanent points | partial | accounting consolidated into `getExtraPoints()` and load order moved before allocation validation | CI, protocol capture, Grade IV round trip |": "| Grade IV permanent points | partial | accounting consolidated into `getExtraPoints()`; load order fixed; PR #216 CI passed | protocol capture and Grade IV round trip |",
              "| Unused-points accounting | partial | spent points are summed in `uint32_t`; overspent state returns zero and allocation validator rejects it | unit test added; CI pending |": "| Unused-points accounting | confirmed | spent points use `uint32_t`; overspent state returns zero; allocation validator rejects it; focused test and PR #216 CI passed | runtime malformed-state test remains defense-in-depth |",
              "- Applied the SHA-256-verified patch to the clean review branch and removed every temporary patch/export workflow before opening PR #202.": "- Applied the SHA-256-verified patch to the clean review branch and removed every temporary patch/export workflow before opening the clean review PR.",
          }

          for old, new in replacements.items():
              if old not in text:
                  raise SystemExit(f"required marker missing: {old}")
              text = text.replace(old, new)

          text = text.replace("→ correction implemented, CI pending", "→ correction implemented; PR #216 CI passed")
          text = text.replace("→ partial correction implemented, CI pending", "→ partial correction implemented; PR #216 CI passed")

          change_marker = "- Recorded missing current spells, stances, and major passive/Revelation reworks instead of mapping them onto obsolete mechanics.\n"
          if change_marker not in text:
              raise SystemExit("change-log marker missing")
          text = text.replace(
              change_marker,
              change_marker + "- Clean PR #216 completed the repository CI build matrix, dedicated Wheel validation, and AI codebase checks successfully.\n",
              1,
          )

          start = "## 8. Immediate next tasks\n"
          end = "\n---\n\n## 9. Handoff rule"
          if start not in text or end not in text:
              raise SystemExit("conclusion section markers missing")
          prefix, remainder = text.split(start, 1)
          _, suffix = remainder.split(end, 1)
          conclusion = """## 8. Validation conclusion

          The evidence-based validation phase is complete for the currently implemented Wheel subsystem. PR #216 contains the confirmed, non-speculative corrections and passed the repository CI build matrix plus dedicated Wheel validation.

          The Wheel is **not fully feature-complete for Tibia 15.25**. The following are explicit implementation gaps rather than unresolved audit ambiguity:

          1. the new vocation stance framework and replacement spells/augments absent from Canary;
          2. Blessing of the Grove critical-healing support;
          3. Strong Ice Wave expanded tile layout pending authoritative geometry;
          4. remaining major 15.25 passive/Revelation reworks listed in WOD-029;
          5. Hunting Task Shop promotion points, blocked by the empty Taskboard shop subsystem;
          6. end-to-end protocol, DB/KV round-trip, failure-injection, and gameplay scenario tests.

          These gaps must not be represented as compatible until their runtime behavior and client protocol are implemented and tested. They are suitable for separate focused PRs because they require new gameplay systems or authoritative data, not small corrections to the existing Wheel implementation.

          ---

          ## 9. Handoff rule"""
          text = prefix + conclusion + suffix
          path.write_text(text)
          PY
          git diff --check

      - name: Remove staging workflow and commit
        run: |
          set -euo pipefail
          rm -f .github/workflows/finalize-wheel-validation.yml
          git diff --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "docs(ai-agent): finalize Wheel validation status"
          git push origin HEAD:validation/wheel-finalize-stage-v2
