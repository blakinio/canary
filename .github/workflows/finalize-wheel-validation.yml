name: Finalize Wheel validation status

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/finalize-wheel-validation.yml

permissions:
  contents: write

jobs:
  apply-doc-patch:
    runs-on: ubuntu-latest
    steps:
      - name: Check out staging branch
        uses: actions/checkout@v4
        with:
          ref: validation/wheel-finalize-stage
          fetch-depth: 0

      - name: Reconstruct and verify document patch
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh api "repos/${GITHUB_REPOSITORY}/git/blobs/d3bd67142199a5279fe5beeedea64ec4d81fd22c" --jq .content \
            | tr -d '\n' \
            | base64 --decode > /tmp/wheel-final-doc.patch.gz.b64
          base64 --decode /tmp/wheel-final-doc.patch.gz.b64 | gzip --decompress > /tmp/wheel-final-doc.patch
          echo "014aac70fbd17d5bb42627161902b4120fe6cb5b837d9ad57b0c94c3c71ba6e4  /tmp/wheel-final-doc.patch" | sha256sum --check --strict
          git apply --check /tmp/wheel-final-doc.patch

      - name: Apply patch and remove staging workflow
        run: |
          set -euo pipefail
          git apply /tmp/wheel-final-doc.patch
          rm -f .github/workflows/finalize-wheel-validation.yml
          git diff --check

      - name: Commit final validation status
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "docs(ai-agent): finalize Wheel validation status"
          git push origin HEAD:validation/wheel-finalize-stage
