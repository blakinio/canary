name: Apply Forge history correctness patch

on:
  pull_request:
    branches:
      - fix/forge-history-correctness
    paths:
      - docs/ai-agent/.apply-forge-history-correctness

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout history branch
        uses: actions/checkout@v4
        with:
          ref: fix/forge-history-correctness
          fetch-depth: 1
          show-progress: false

      - name: Apply bounded patch
        run: python3 tools/ai-agent/apply_forge_history_correctness.py

      - name: Validate and commit
        shell: bash
        run: |
          git diff --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/creatures/players/player.cpp tests/integration/game/forge_it.cpp
          git commit -m "fix(forge): record correct history actions and amounts"
          git push origin HEAD:fix/forge-history-correctness
