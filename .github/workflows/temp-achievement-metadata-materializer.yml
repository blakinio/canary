---
name: Temporary Achievement Metadata Materializer

on:
  pull_request:
    paths:
      - ".github/workflows/temp-achievement-metadata-materializer.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  materialize:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout task branch
        uses: actions/checkout@v6
        with:
          ref: fix/achievement-metadata-parity

      - name: Apply bounded registry and test changes
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace_once(path: str, old: str, new: str) -> None:
              target = Path(path)
              text = target.read_text(encoding="utf-8")
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"{path}: expected one marker, found {count}: {old!r}")
              target.write_text(text.replace(old, new), encoding="utf-8")

          replace_once(
              "data/scripts/lib/register_achievements.lua",
              '[406] = { name = "The More the Merrier", grade = 1, points = 0, secret = true,',
              '[406] = { name = "The More the Merrier", grade = 0, points = 0, secret = true,',
          )
          replace_once(
              "data/scripts/lib/register_achievements.lua",
              '[513] = { name = "Soul Mender", grade = 4, points = 10, description =',
              '[513] = { name = "Soul Mender", grade = 4, points = 10, secret = true, description =',
          )

          test_path = Path("tools/ai-agent/test_achievement_validation.py")
          text = test_path.read_text(encoding="utf-8")
          marker = "    def test_persistence_evidence_is_line_grounded(self) -> None:\n"
          addition = (
              "    def test_confirmed_live_non_point_metadata_matches_reference(self) -> None:\n"
              "        root = Path(__file__).resolve().parents[2]\n"
              "        registry_path = root / \"data/scripts/lib/register_achievements.lua\"\n"
              "        definitions, _ = parse_registry_text(registry_path.read_text(encoding=\"utf-8\"))\n"
              "        by_id = {item.id: item for item in definitions}\n"
              "\n"
              "        self.assertEqual(0, by_id[406].grade)\n"
              "        self.assertEqual(0, by_id[406].points)\n"
              "        self.assertTrue(by_id[406].secret)\n"
              "        self.assertEqual(4, by_id[513].grade)\n"
              "        self.assertEqual(10, by_id[513].points)\n"
              "        self.assertTrue(by_id[513].secret)\n"
              "\n"
          )
          if text.count(marker) != 1:
              raise SystemExit("test insertion marker not found exactly once")
          test_path.write_text(text.replace(marker, addition + marker), encoding="utf-8")
          PY

      - name: Run focused validation and preserve log
        shell: bash
        run: |
          mkdir -p materialized/data/scripts/lib materialized/tools/ai-agent materialized/artifacts artifacts
          status=0
          : > materialized/artifacts/validation.log
          python -m py_compile tools/ai-agent/achievement_validation.py tools/ai-agent/test_achievement_validation.py >> materialized/artifacts/validation.log 2>&1 || status=$?
          python -m unittest discover -s tools/ai-agent -p "test_achievement_validation.py" -v >> materialized/artifacts/validation.log 2>&1 || status=$?
          python tools/ai-agent/achievement_validation.py \
            --repository-root . \
            --reference-baseline docs/ai-agent/ACHIEVEMENT_REFERENCE_BASELINE.json \
            --reference-catalog docs/ai-agent/ACHIEVEMENT_REFERENCE_CATALOG.json \
            --reviewed-evidence docs/ai-agent/ACHIEVEMENT_REVIEWED_EVIDENCE.json \
            --output artifacts/ACHIEVEMENT_AUDIT.json \
            --markdown artifacts/ACHIEVEMENT_AUDIT.md \
            --allow-findings >> materialized/artifacts/validation.log 2>&1 || status=$?
          python -m json.tool artifacts/ACHIEVEMENT_AUDIT.json > /dev/null 2>> materialized/artifacts/validation.log || status=$?
          git diff --check >> materialized/artifacts/validation.log 2>&1 || status=$?
          echo "$status" > materialized/artifacts/validation.status
          cp data/scripts/lib/register_achievements.lua materialized/data/scripts/lib/
          cp tools/ai-agent/test_achievement_validation.py materialized/tools/ai-agent/
          cp artifacts/ACHIEVEMENT_AUDIT.json artifacts/ACHIEVEMENT_AUDIT.md materialized/artifacts/

      - name: Upload materialized files and diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: achievement-metadata-materialized
          path: materialized
          retention-days: 1
          if-no-files-found: error
