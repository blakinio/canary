name: Apply FS mkdir shell-free implementation

on:
  pull_request:
    branches: [main]
    types: [synchronize]

permissions:
  contents: write

jobs:
  apply:
    if: github.repository == 'blakinio/canary' && github.event.pull_request.head.repo.full_name == 'blakinio/canary' && github.head_ref == 'security/fs-mkdir-shell-free'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact task branch
        uses: actions/checkout@v4
        with:
          ref: security/fs-mkdir-shell-free
          fetch-depth: 0
          persist-credentials: true
      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - name: Apply exact-anchor implementation
        run: python3 tools/ai-agent/apply_fs_mkdir_shell_free.py
      - name: Run focused Lua regression
        run: |
          sudo apt-get update
          sudo apt-get install -y luajit
          luajit tests/lua/test_fs.lua
      - name: Validate security and formatting boundaries
        run: |
          ! grep -n 'os.execute' data/libs/functions/fs.lua
          grep -n 'FileSystem.createDirectory' data/libs/functions/fs.lua
          grep -n 'FileSystem.createDirectories' data/libs/functions/fs.lua
          git diff --check
      - name: Remove temporary runner and stage bounded diff
        run: |
          rm -f tools/ai-agent/apply_fs_mkdir_shell_free.py
          rm -f .github/workflows/apply-fs-mkdir-shell-free.yml
          git add -A
          mapfile -t changed < <(git diff --cached --name-only)
          printf '%s\n' "${changed[@]}"
          allowed='^(data/libs/functions/fs\.lua|src/lua/functions/core/game/global_functions\.(cpp|hpp)|tests/lua/test_fs\.lua|tests/unit/lua/filesystem_functions_test\.cpp|tests/unit/lua/CMakeLists\.txt|docs/agents/tasks/active/CAN-20260714-fs-mkdir-shell-injection\.md|docs/agents/programs/CRYSTALSERVER_COMPARISON_PROGRAM\.md|docs/agents/CHANGELOG\.md|docs/agents/MODULE_CATALOG\.md|tools/ai-agent/apply_fs_mkdir_shell_free\.py|\.github/workflows/apply-fs-mkdir-shell-free\.yml)$'
          for path in "${changed[@]}"; do
            [[ "$path" =~ $allowed ]] || { echo "Unexpected path: $path" >&2; exit 1; }
          done
          test ! -e tools/ai-agent/apply_fs_mkdir_shell_free.py
          test ! -e .github/workflows/apply-fs-mkdir-shell-free.yml
          git diff --cached --check
      - name: Commit implementation and tests
        run: |
          git commit -m "security(lua): remove shell execution from FS mkdir"
          git push origin HEAD:security/fs-mkdir-shell-free
