name: Apply Transport Refactor

on:
  pull_request:
    paths:
      - '.github/workflows/apply-transport-refactor.yml'
      - '.github/patches/transport.part-*'

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Apply reviewed patch
        shell: bash
        run: |
          set -euo pipefail
          cat .github/patches/transport.part-* > /tmp/transport.patch
          git apply --check /tmp/transport.patch
          git apply /tmp/transport.patch
          rm -f .github/patches/transport.part-* .github/workflows/apply-transport-refactor.yml
          rmdir .github/patches 2>/dev/null || true
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'refactor(protocol): make transport profiles authoritative'
          git push origin HEAD:${{ github.head_ref }}
