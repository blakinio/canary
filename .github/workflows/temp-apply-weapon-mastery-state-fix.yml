---
name: Temporary Apply Weapon Mastery State Fix

on:
  pull_request:
    paths:
      - ".github/workflows/temp-apply-weapon-mastery-state-fix.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout task branch
        uses: actions/checkout@v6
        with:
          ref: fix/weapon-proficiency-mastery-state
          fetch-depth: 0

      - name: Apply bounded runtime and audit changes
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace_once(path: str, old: str, new: str) -> None:
              target = Path(path)
              text = target.read_text(encoding="utf-8")
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"marker in {path!r} found {count} times, expected once")
              target.write_text(text.replace(old, new), encoding="utf-8")

          replace_once(
              "src/creatures/players/components/weapon_proficiency.hpp",
              '''\tbool saveAll() const;
          \t[[nodiscard]] std::vector<uint16_t> getTrackedWeaponIds() const;

          \tstatic WeaponProficiencyData deserialize''',
              '''\tbool saveAll() const;
          \t[[nodiscard]] std::vector<uint16_t> getTrackedWeaponIds() const;
          \t[[nodiscard]] size_t getMasteredWeaponCount() const;

          \tstatic WeaponProficiencyData deserialize''',
          )
          replace_once(
              "src/creatures/players/components/weapon_proficiency.hpp",
              '''private:
          \tstatic constexpr uint8_t TRACKED_SKILL_COUNT''',
              '''private:
          #ifdef BUILD_TESTS
          \tfriend class WeaponProficiencyTest;
          #endif

          \t[[nodiscard]] static WeaponProficiencyData createInitialState(uint32_t experience, uint32_t maxExperience);
          \tstatic constexpr uint8_t TRACKED_SKILL_COUNT''',
          )

          replace_once(
              "src/creatures/players/components/weapon_proficiency.cpp",
              '''WeaponProficiency::WeaponProficiency(Player &player) :
          \tm_player(player) { }

          bool WeaponProficiency::isValidWeaponId''',
              '''WeaponProficiency::WeaponProficiency(Player &player) :
          \tm_player(player) { }

          WeaponProficiencyData WeaponProficiency::createInitialState(uint32_t experience, uint32_t maxExperience) {
          \tWeaponProficiencyData state;
          \tstate.experience = std::min(experience, maxExperience);
          \tstate.mastered = maxExperience > 0 && state.experience >= maxExperience;
          \treturn state;
          }

          bool WeaponProficiency::isValidWeaponId''',
          )
          replace_once(
              "src/creatures/players/components/weapon_proficiency.cpp",
              '''\t(void)std::ranges::sort(weaponIds);
          \treturn weaponIds;
          }

          WeaponProficiencyData WeaponProficiency::deserialize''',
              '''\t(void)std::ranges::sort(weaponIds);
          \treturn weaponIds;
          }

          size_t WeaponProficiency::getMasteredWeaponCount() const {
          \treturn static_cast<size_t>(std::ranges::count_if(proficiency, [](const auto &entry) {
          \t\treturn entry.second.mastered;
          \t}));
          }

          WeaponProficiencyData WeaponProficiency::deserialize''',
          )
          replace_once(
              "src/creatures/players/components/weapon_proficiency.cpp",
              '''\tif (!proficiency.contains(weaponId)) {
          \t\tconst auto [_, inserted] = proficiency.try_emplace(weaponId, std::min(experience, maxExperience));
          \t\tif (!inserted) {''',
              '''\tif (!proficiency.contains(weaponId)) {
          \t\tconst auto [_, inserted] = proficiency.try_emplace(weaponId, createInitialState(experience, maxExperience));
          \t\tif (!inserted) {''',
          )

          replace_once(
              "tests/unit/players/components/CMakeLists.txt",
              '''target_sources(
              canary_ut
              PRIVATE player_storage_test.cpp
          )
          ''',
              '''target_sources(
              canary_ut
              PRIVATE player_storage_test.cpp weapon_proficiency_test.cpp
          )
          ''',
          )

          replace_once(
              "tools/ai-agent/weapon_proficiency_achievement_audit.py",
              '''    initial_creation_caps_experience = "try_emplace(weaponId, std::min(experience, maxExperience))" in add_experience
              initial_creation_body = extract_function_body(add_experience, "if (!proficiency.contains(weaponId))")
              initial_creation_sets_mastered = "mastered = true" in initial_creation_body
          ''',
              '''    initial_creation_caps_experience = any(
                  marker in add_experience
                  for marker in (
                      "try_emplace(weaponId, std::min(experience, maxExperience))",
                      "try_emplace(weaponId, createInitialState(experience, maxExperience))",
                  )
              )
              initial_creation_body = extract_function_body(add_experience, "if (!proficiency.contains(weaponId))")
              initial_state_body = extract_function_body(cpp_text, "WeaponProficiencyData WeaponProficiency::createInitialState")
              initial_creation_uses_state_factory = "createInitialState(experience, maxExperience)" in initial_creation_body
              initial_state_derives_mastered = bool(
                  re.search(
                      r"mastered\\s*=\\s*maxExperience\\s*>\\s*0\\s*&&\\s*state\\.experience\\s*>=\\s*maxExperience",
                      initial_state_body,
                  )
              )
              initial_creation_sets_mastered = "mastered = true" in initial_creation_body or (
                  initial_creation_uses_state_factory and initial_state_derives_mastered
              )
          ''',
          )

          test_path = Path("tools/ai-agent/test_weapon_proficiency_achievement_audit.py")
          test_text = test_path.read_text(encoding="utf-8")
          test_replacements = (
              (
                  '        self.assertFalse(report["runtimeEvidence"]["initialCreationSetsMastered"])\n',
                  '        self.assertTrue(report["runtimeEvidence"]["initialCreationSetsMastered"])\n',
              ),
              (
                  '        self.assertTrue(report["runtimeEvidence"]["initialCreationCapsExperience"])\n'
                  '        self.assertTrue(report["runtimeEvidence"]["loadCallsNormalizeStoredState"])\n',
                  '        self.assertTrue(report["runtimeEvidence"]["initialCreationCapsExperience"])\n'
                  '        self.assertTrue(report["runtimeEvidence"]["loadCallsNormalizeStoredState"])\n'
                  '        self.assertTrue(report["runtimeEvidence"]["masteredCountApiPresent"])\n',
              ),
              (
                  '        self.assertIn("initial-mastery-flag-not-set", codes)\n'
                  '        self.assertIn("target-award-path-missing", codes)\n',
                  '        self.assertNotIn("initial-mastery-flag-not-set", codes)\n'
                  '        self.assertNotIn("mastered-count-api-missing", codes)\n'
                  '        self.assertIn("target-award-path-missing", codes)\n',
              ),
          )
          for old, new in test_replacements:
              count = test_text.count(old)
              if count != 1:
                  raise SystemExit(f"audit-test marker found {count} times, expected once: {old!r}")
              test_text = test_text.replace(old, new)
          test_path.write_text(test_text, encoding="utf-8")

          report = Path("docs/ai-agent/WEAPON_PROFICIENCY_ACHIEVEMENT_REPORT.md")
          report_text = report.read_text(encoding="utf-8")
          marker = "# Weapon Proficiency achievements 564–567 — evidence report\n\n"
          update = '''# Weapon Proficiency achievements 564–567 — evidence report

          > **Runtime remediation update:** PR #212 corrects the first-entry mastery state and adds the const `WeaponProficiency::getMasteredWeaponCount()` query. Achievement awards 564–566, historical backfill and ID 567 remain intentionally outside that PR.

          '''
          if report_text.count(marker) != 1:
              raise SystemExit("report title marker not found exactly once")
          report.write_text(report_text.replace(marker, update), encoding="utf-8")

          catalog = Path("docs/agents/MODULE_CATALOG.md")
          catalog_text = catalog.read_text(encoding="utf-8")
          old_row = '| Weapon Proficiency achievement audit | active (#195) | Read-only evidence for mastery achievements 564–567, runtime transition/backfill paths and hashed asset/server secret-build validation | `tools/ai-agent/weapon_proficiency_*`, focused tests/workflow, report, runtime plan and metadata-only baseline | Reuse before adding mastery hooks or ID 567. Require exact item identity plus a valid active proficiency definition; never commit the source asset archive. |'
          new_row = '| Weapon Proficiency achievement audit and mastery-state API | audit merged (#195); runtime fix active (#212) | Read-only evidence for achievements 564–567 plus the const `WeaponProficiency::getMasteredWeaponCount()` query and correct first-entry mastery state | `tools/ai-agent/weapon_proficiency_*`, `src/creatures/players/components/weapon_proficiency.*`, focused Python/C++ tests and reports | Reuse the count API for later threshold/secret conditions. Award hooks, backfill and ID 567 remain separate; never commit the source asset archive. |'
          if catalog_text.count(old_row) != 1:
              raise SystemExit("module catalogue row not found exactly once")
          catalog.write_text(catalog_text.replace(old_row, new_row), encoding="utf-8")

          task = Path("docs/agents/tasks/active/CAN-20260712-weapon-proficiency-mastery-state.md")
          task_text = task.read_text(encoding="utf-8")
          task_text = task_text.replace('status: active', 'status: ready-for-review', 1)
          task_text = task_text.replace('related_pr: ""', 'related_pr: "#212"', 1)
          for line in (
              '  - docs/agents/ACTIVE_WORK.md\n',
              '  - docs/agents/CHANGELOG.md\n',
          ):
              task_text = task_text.replace(line, '')
          task_text = task_text.replace(
              '  - docs/ai-agent/WEAPON_PROFICIENCY_MASTERY_STATE_FIX.md\n',
              '  - docs/ai-agent/WEAPON_PROFICIENCY_MASTERY_STATE_FIX.md\n'
              '  - docs/ai-agent/WEAPON_PROFICIENCY_ACHIEVEMENT_REPORT.md\n'
              '  - tools/ai-agent/weapon_proficiency_achievement_audit.py\n'
              '  - tools/ai-agent/test_weapon_proficiency_achievement_audit.py\n'
              '  - docs/agents/MODULE_CATALOG.md\n',
              1,
          )
          for item in (
              'A first XP gain reaching or exceeding maximum stores capped XP and `mastered=true` before return.',
              'A first below-maximum gain remains unmastered.',
              'Existing-entry mastery behavior remains unchanged.',
              '`getMasteredWeaponCount()` counts only stored entries with normalized `mastered=true`.',
              'Count is independent of unordered-map iteration order.',
              'Public API is const, read-only and documented.',
              'Focused C++ unit tests cover initial mastered/unmastered state and mixed mastered counts.',
              'No achievement award, registry definition, backfill policy or ID 567 condition is added.',
              'No player KV key/schema, items, proficiencies, map, assets, database or production configuration change.',
          ):
              task_text = task_text.replace(f'- [ ] {item}', f'- [x] {item}', 1)
          task_text = task_text.replace(
              '## 2026-07-12T21:20:00Z\n',
              '## 2026-07-13T07:00:00Z\n\n'
              '- Changed: implemented the initial-state factory, const mastered count, focused C++ tests and synchronized the audit detector.\n'
              '- Learned: the component CMake target uses `target_sources`; the stale temporary workflow marker was corrected before execution.\n'
              '- Result: runtime scope is complete; current-head CI and exact diff review remain.\n\n'
              '## 2026-07-12T21:20:00Z\n',
              1,
          )
          task_text = task_text.replace('- Final status: active', '- Final status: ready-for-review', 1)
          task_text = task_text.replace('- PR:\n', '- PR: #212\n', 1)
          task.write_text(task_text, encoding="utf-8")
          PY

      - name: Add focused C++ tests and fix note
        run: |
          cat > tests/unit/players/components/weapon_proficiency_test.cpp <<'CPP'
          /**
           * Canary - A free and open-source MMORPG server emulator
           * Copyright (©) 2019–present OpenTibiaBR
           * Repository: https://github.com/opentibiabr/canary
           * License: https://github.com/opentibiabr/canary/blob/main/LICENSE
           * Contributors: https://github.com/opentibiabr/canary/graphs/contributors
           * Website: https://docs.opentibiabr.com/
           */

          #include "creatures/players/player.hpp"
          #include "creatures/players/components/weapon_proficiency.hpp"

          #include "lib/logging/in_memory_logger.hpp"

          class WeaponProficiencyTest : public ::testing::Test {
          protected:
          	static void SetUpTestSuite() {
          		InMemoryLogger::install(injector);
          		DI::setTestContainer(&injector);
          	}

          	static WeaponProficiencyData createInitialState(uint32_t experience, uint32_t maxExperience) {
          		return WeaponProficiency::createInitialState(experience, maxExperience);
          	}

          	static void setMasteredState(WeaponProficiency &component, uint16_t weaponId, bool mastered) {
          		WeaponProficiencyData state;
          		state.mastered = mastered;
          		component.proficiency.insert_or_assign(weaponId, std::move(state));
          	}

          private:
          	inline static di::extension::injector<> injector {};
          };

          TEST_F(WeaponProficiencyTest, InitialStateBelowMaximumIsNotMastered) {
          	const auto state = createInitialState(99, 100);

          	EXPECT_EQ(99u, state.experience);
          	EXPECT_FALSE(state.mastered);
          }

          TEST_F(WeaponProficiencyTest, InitialStateAtMaximumIsMastered) {
          	const auto state = createInitialState(100, 100);

          	EXPECT_EQ(100u, state.experience);
          	EXPECT_TRUE(state.mastered);
          }

          TEST_F(WeaponProficiencyTest, InitialStateAboveMaximumIsCappedAndMastered) {
          	const auto state = createInitialState(150, 100);

          	EXPECT_EQ(100u, state.experience);
          	EXPECT_TRUE(state.mastered);
          }

          TEST_F(WeaponProficiencyTest, ZeroMaximumNeverProducesMastery) {
          	const auto state = createInitialState(100, 0);

          	EXPECT_EQ(0u, state.experience);
          	EXPECT_FALSE(state.mastered);
          }

          TEST_F(WeaponProficiencyTest, MasteredWeaponCountIncludesOnlyMasteredEntries) {
          	auto player = std::make_shared<Player>();
          	auto &component = player->weaponProficiency();

          	setMasteredState(component, 300, true);
          	setMasteredState(component, 100, false);
          	setMasteredState(component, 200, true);

          	const auto &constComponent = component;
          	EXPECT_EQ(std::size_t { 2 }, constComponent.getMasteredWeaponCount());
          }

          TEST_F(WeaponProficiencyTest, EmptyStateHasNoMasteredWeapons) {
          	auto player = std::make_shared<Player>();
          	const auto &component = player->weaponProficiency();

          	EXPECT_EQ(std::size_t { 0 }, component.getMasteredWeaponCount());
          }
          CPP

          cat > docs/ai-agent/WEAPON_PROFICIENCY_MASTERY_STATE_FIX.md <<'MD'
          # Weapon Proficiency initial mastery-state repair

          PR #212 fixes one bounded runtime defect confirmed by audit #195.

          ## Behavior

          - a first XP gain is capped at the weapon's maximum experience;
          - the new state is immediately marked mastered when the capped XP reaches that maximum;
          - `WeaponProficiency::getMasteredWeaponCount() const` returns the number of normalized stored states with `mastered=true`;
          - existing-entry mastery, serialization and load normalization remain unchanged.

          ## Regression coverage

          Focused C++ tests cover below, exact and above-maximum initial state, zero maximum, empty state and mixed mastered/unmastered counts. The read-only audit detector is synchronized so it no longer reports the repaired initial-state/count findings.

          ## Exclusions

          No achievement award, IDs 564–567 registry definition, historical backfill, secret-set condition, KV schema, item/proficiency data, map, asset, database or production configuration change is included.
          MD

      - name: Format and run focused audit tests
        run: |
          clang-format -i \
            src/creatures/players/components/weapon_proficiency.hpp \
            src/creatures/players/components/weapon_proficiency.cpp \
            tests/unit/players/components/weapon_proficiency_test.cpp
          python -m py_compile \
            tools/ai-agent/weapon_proficiency_achievement_audit.py \
            tools/ai-agent/test_weapon_proficiency_achievement_audit.py
          python -m unittest discover -s tools/ai-agent -p "test_weapon_proficiency_achievement_audit.py" -v
          python -m unittest discover -s tools/ai-agent -p "test_weapon_proficiency_forbidden_build_validation.py" -v
          python -m json.tool docs/ai-agent/WEAPON_PROFICIENCY_ACHIEVEMENT_RUNTIME_PLAN.json > /dev/null

      - name: Commit bounded result
        run: |
          rm .github/workflows/temp-apply-weapon-mastery-state-fix.yml
          git config user.name "weapon-mastery-bot"
          git config user.email "weapon-mastery-bot@users.noreply.github.com"
          git add \
            src/creatures/players/components/weapon_proficiency.hpp \
            src/creatures/players/components/weapon_proficiency.cpp \
            tests/unit/players/components/weapon_proficiency_test.cpp \
            tests/unit/players/components/CMakeLists.txt \
            tools/ai-agent/weapon_proficiency_achievement_audit.py \
            tools/ai-agent/test_weapon_proficiency_achievement_audit.py \
            docs/ai-agent/WEAPON_PROFICIENCY_ACHIEVEMENT_REPORT.md \
            docs/ai-agent/WEAPON_PROFICIENCY_MASTERY_STATE_FIX.md \
            docs/agents/MODULE_CATALOG.md \
            docs/agents/tasks/active/CAN-20260712-weapon-proficiency-mastery-state.md \
            .github/workflows/temp-apply-weapon-mastery-state-fix.yml
          git diff --cached --check
          git commit -m "fix(weapon-proficiency): normalize initial mastery state"
          git push origin HEAD:fix/weapon-proficiency-mastery-state
