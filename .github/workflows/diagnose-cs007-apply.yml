name: Diagnose CS-007 apply failure

on:
  pull_request:
    types: [synchronize]

permissions:
  contents: write

jobs:
  diagnose:
    if: >-
      github.event.pull_request.number == 328 &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.head_ref == 'security/table-unserialize-safe'
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: security/table-unserialize-safe
          fetch-depth: 1
          show-progress: false
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install LuaJIT
        run: |
          sudo apt-get update -qq >/dev/null
          sudo apt-get install -y -qq luajit >/dev/null

      - name: Capture exact failure tail
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          source = Path('.github/workflows/apply-cs007-safe-decoder.yml').read_text().splitlines()
          marker = '      - name: Add failing regression, implement parser, and validate'
          start = source.index(marker)
          run_index = next(i for i in range(start + 1, len(source)) if source[i] == '        run: |')
          script_lines = []
          for line in source[run_index + 1:]:
              if line and not line.startswith('          '):
                  break
              script_lines.append(line[10:] if line.startswith('          ') else '')
          Path('/tmp/apply_cs007.sh').write_text('\n'.join(script_lines) + '\n')
          PY

          set +e
          bash -x /tmp/apply_cs007.sh > /tmp/cs007-apply.log 2>&1
          status=$?
          set -e
          if [ "$status" -eq 0 ]; then
            echo 'diagnostic rerun unexpectedly succeeded; refusing failure artifact' >&2
            exit 1
          fi

          mkdir -p artifacts/upstream/crystalserver
          {
            echo "exit_status=$status"
            tail -n 120 /tmp/cs007-apply.log
          } > artifacts/upstream/crystalserver/CS007_APPLY_FAILURE.log

          rm -f \
            .github/workflows/apply-cs007-safe-decoder-v2.yml \
            .github/workflows/apply-cs007-safe-decoder-v3.yml \
            .github/workflows/diagnose-cs007-apply.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -f artifacts/upstream/crystalserver/CS007_APPLY_FAILURE.log
          git add -A .github/workflows
          git diff --cached --check
          git commit -m 'chore(ci): capture CS-007 apply failure'
          git push origin HEAD:security/table-unserialize-safe
