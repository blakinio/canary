name: Apply verified Equipment Upgrade fixes

on:
  push:
    branches:
      - validation/equipment-upgrade
    paths:
      - .github/workflows/equipment-upgrade-validation-patch.yml

permissions:
  contents: write

jobs:
  apply-verified-fixes:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout validation branch
        uses: actions/checkout@v4
        with:
          ref: validation/equipment-upgrade
          fetch-depth: 0

      - name: Apply evidence-backed Forge fixes
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          def replace_once(path: str, old: str, new: str) -> None:
              file_path = Path(path)
              text = file_path.read_text(encoding="utf-8")
              count = text.count(old)
              if count != 1:
                  raise RuntimeError(f"{path}: expected one occurrence, found {count}: {old!r}")
              file_path.write_text(text.replace(old, new), encoding="utf-8")

          replace_once(
              "config.lua.dist",
              "forgeMaxDust = 225",
              "forgeMaxDust = 325",
          )
          replace_once(
              "src/config/configmanager.cpp",
              'loadIntConfig(L, FORGE_FIENDISH_CREATURES_LIMIT, "forgeFiendishLimit", 3);',
              'loadIntConfig(L, FORGE_FIENDISH_CREATURES_LIMIT, "forgeFiendishLimit", 4);',
          )
          replace_once(
              "src/config/configmanager.cpp",
              'loadIntConfig(L, FORGE_MAX_DUST, "forgeMaxDust", 225);',
              'loadIntConfig(L, FORGE_MAX_DUST, "forgeMaxDust", 325);',
          )

          replace_once(
              "src/creatures/players/player.cpp",
              '#include "game/functions/forge_transfer_policy.hpp"\n',
              '#include "game/functions/forge_fusion_policy.hpp"\n#include "game/functions/forge_transfer_policy.hpp"\n',
          )

          fusion_anchor = '''\tconst auto &secondForgingItem = getForgeItemFromId(secondItemId, tier, firstForgingItem);
\tif (!secondForgingItem) {
\t\tg_logger().error("[Log 2] Player with name {} failed to fuse item with id {}", getName(), secondItemId);
\t\tsendForgeError(RETURNVALUE_CONTACTADMINISTRATOR);
\t\treturn;
\t}
'''
          fusion_replacement = fusion_anchor + '''
\tauto normalizeForgeSlot = [](uint32_t slotPosition) {
\t\treturn (slotPosition & SLOTP_TWO_HAND) != 0 ? static_cast<uint32_t>(SLOTP_HAND) : slotPosition;
\t};
\tconst bool sameForgeSlot = normalizeForgeSlot(firstForgingItem->getSlotPosition()) == normalizeForgeSlot(secondForgingItem->getSlotPosition());
\tif (!ForgeFusionPolicy::isValid(
\t\t\tfirstItemId,
\t\t\tsecondItemId,
\t\t\tfirstForgingItem->getClassification(),
\t\t\tsecondForgingItem->getClassification(),
\t\t\tsameForgeSlot,
\t\t\tconvergence)) {
\t\tg_logger().warn(
\t\t\t"[{}] Rejected invalid fusion for player {}: first item {}, second item {}, first class {}, second class {}, tier {}, same slot {}, convergence {}",
\t\t\t__FUNCTION__,
\t\t\tgetName(),
\t\t\tfirstItemId,
\t\t\tsecondItemId,
\t\t\tfirstForgingItem->getClassification(),
\t\t\tsecondForgingItem->getClassification(),
\t\t\ttier,
\t\t\tsameForgeSlot,
\t\t\tconvergence
\t\t);
\t\tsendForgeError(RETURNVALUE_NOTPOSSIBLE);
\t\treturn;
\t}
'''
          replace_once("src/creatures/players/player.cpp", fusion_anchor, fusion_replacement)

          replace_once(
              "src/creatures/players/player.cpp",
              '''\tif (!ForgeTransferPolicy::isValidDonorTier(donorItem->getTier(), convergence) || !ForgeTransferPolicy::hasMatchingClassification(donorClassification, receiveClassification)) {''',
              '''\tif (!ForgeTransferPolicy::isValidTransfer(donorClassification, receiveClassification, donorItem->getTier(), convergence)) {''',
          )

          Path("src/game/functions/forge_fusion_policy.hpp").write_text(
              '''/**
 * Canary - A free and open-source MMORPG server emulator
 * Copyright (©) 2019–present OpenTibiaBR <opentibiabr@outlook.com>
 * Repository: https://github.com/opentibiabr/canary
 * License: https://github.com/opentibiabr/canary/blob/main/LICENSE
 * Contributors: https://github.com/opentibiabr/canary/graphs/contributors
 * Website: https://docs.opentibiabr.com/
 */

#pragma once

#include <cstdint>

namespace ForgeFusionPolicy {
\t[[nodiscard]] constexpr bool isValid(
\t\tuint16_t firstItemId,
\t\tuint16_t secondItemId,
\t\tuint8_t firstClassification,
\t\tuint8_t secondClassification,
\t\tbool sameSlot,
\t\tbool convergence
\t) {
\t\tif (firstItemId == 0 || secondItemId == 0 || firstClassification == 0 || secondClassification == 0) {
\t\t\treturn false;
\t\t}

\t\tif (!convergence) {
\t\t\treturn firstItemId == secondItemId && firstClassification == secondClassification;
\t\t}

\t\treturn firstItemId != secondItemId
\t\t\t&& firstClassification == 4
\t\t\t&& secondClassification == 4
\t\t\t&& sameSlot;
\t}
} // namespace ForgeFusionPolicy
''',
              encoding="utf-8",
          )

          Path("src/game/functions/forge_transfer_policy.hpp").write_text(
              '''/**
 * Canary - A free and open-source MMORPG server emulator
 * Copyright (©) 2019–present OpenTibiaBR <opentibiabr@outlook.com>
 * Repository: https://github.com/opentibiabr/canary
 * License: https://github.com/opentibiabr/canary/blob/main/LICENSE
 * Contributors: https://github.com/opentibiabr/canary/graphs/contributors
 * Website: https://docs.opentibiabr.com/
 */

#pragma once

#include <cstdint>

namespace ForgeTransferPolicy {
\t[[nodiscard]] constexpr bool hasMatchingClassification(uint8_t donorClassification, uint8_t receiveClassification) {
\t\treturn donorClassification > 0 && donorClassification == receiveClassification;
\t}

\t[[nodiscard]] constexpr bool isValidDonorTier(uint8_t donorTier, bool convergence) {
\t\treturn convergence ? donorTier >= 1 : donorTier >= 2;
\t}

\t[[nodiscard]] constexpr bool isValidClassification(uint8_t donorClassification, uint8_t receiveClassification, bool convergence) {
\t\treturn hasMatchingClassification(donorClassification, receiveClassification)
\t\t\t&& (!convergence || donorClassification == 4);
\t}

\t[[nodiscard]] constexpr bool isValidTransfer(uint8_t donorClassification, uint8_t receiveClassification, uint8_t donorTier, bool convergence) {
\t\treturn isValidDonorTier(donorTier, convergence)
\t\t\t&& isValidClassification(donorClassification, receiveClassification, convergence);
\t}

\t[[nodiscard]] constexpr uint8_t resourceTier(uint8_t donorTier) {
\t\treturn donorTier;
\t}

\t[[nodiscard]] constexpr uint8_t resultTier(uint8_t donorTier, bool convergence) {
\t\treturn convergence ? donorTier : static_cast<uint8_t>(donorTier - 1);
\t}
} // namespace ForgeTransferPolicy
''',
              encoding="utf-8",
          )

          replace_once(
              "tests/unit/players/forge_test.cpp",
              '#include "creatures/players/player.hpp"\n#include "game/functions/forge_transfer_policy.hpp"\n',
              '#include "creatures/players/player.hpp"\n#include "game/functions/forge_fusion_policy.hpp"\n#include "game/functions/forge_transfer_policy.hpp"\n',
          )

          test_append = '''

TEST(ForgeTransferPolicyTest, RestrictsConvergenceTransferToClassFour) {
\tEXPECT_TRUE(ForgeTransferPolicy::isValidTransfer(4, 4, 1, true));
\tEXPECT_FALSE(ForgeTransferPolicy::isValidTransfer(3, 3, 1, true));
\tEXPECT_FALSE(ForgeTransferPolicy::isValidTransfer(4, 3, 1, true));
\tEXPECT_TRUE(ForgeTransferPolicy::isValidTransfer(3, 3, 2, false));
}

TEST(ForgeFusionPolicyTest, RegularFusionRequiresIdenticalForgeItems) {
\tEXPECT_TRUE(ForgeFusionPolicy::isValid(100, 100, 3, 3, true, false));
\tEXPECT_FALSE(ForgeFusionPolicy::isValid(100, 101, 3, 3, true, false));
\tEXPECT_FALSE(ForgeFusionPolicy::isValid(100, 100, 0, 0, true, false));
}

TEST(ForgeFusionPolicyTest, ConvergenceFusionRequiresDifferentClassFourItemsInSameSlot) {
\tEXPECT_TRUE(ForgeFusionPolicy::isValid(100, 101, 4, 4, true, true));
\tEXPECT_FALSE(ForgeFusionPolicy::isValid(100, 100, 4, 4, true, true));
\tEXPECT_FALSE(ForgeFusionPolicy::isValid(100, 101, 3, 3, true, true));
\tEXPECT_FALSE(ForgeFusionPolicy::isValid(100, 101, 4, 4, false, true));
}
'''
          tests_path = Path("tests/unit/players/forge_test.cpp")
          tests_path.write_text(tests_path.read_text(encoding="utf-8").rstrip() + test_append + "\n", encoding="utf-8")

          doc_path = Path("docs/ai-agent/OTS_AI_EQUIPMENT_UPGRADE_VALIDATION.md")
          doc = doc_path.read_text(encoding="utf-8")
          doc = doc.replace(
              "> **Current phase:** inventory and evidence collection",
              "> **Current phase:** static/semantic validation and evidence-backed remediation",
          )
          doc = doc.replace(
              "| Eligibility | Forge equipment cannot be imbued during the process | not started |",
              "| Eligibility | Forge equipment cannot be imbued during the process | confirmed statically: UI and server lookup reject imbued items |",
          )
          doc = doc.replace(
              "| Dust capacity | Starts at 100; upgrade cost is current limit minus 75; maximum 325 | not started |",
              "| Dust capacity | Starts at 100; upgrade cost is current limit minus 75; maximum 325 | mismatch fixed: configured/fallback maximum 225 -> 325; runtime test pending |",
          )
          doc = doc.replace(
              "| Dust conversion | 60 Dust creates 3 Slivers | not started |",
              "| Dust conversion | 60 Dust creates 3 Slivers | confirmed statically; runtime test pending |",
          )
          doc = doc.replace(
              "| Core conversion | 50 Slivers creates 1 Exalted Core | not started |",
              "| Core conversion | 50 Slivers creates 1 Exalted Core | confirmed statically; failure-path test pending |",
          )
          doc = doc.replace(
              "| Fusion | Two identical items of equal tier; base success 50%; optional core raises to 65% | not started |",
              "| Fusion | Two identical items of equal tier; base success 50%; optional core raises to 65% | server eligibility mismatch fixed; probability path confirmed statically; outcome tests pending |",
          )
          doc = doc.replace(
              "| Convergence Fusion | Class 4 only; different items in same body slot and equal tier; guaranteed; no bonus | not started |",
              "| Convergence Fusion | Class 4 only; different items in same body slot and equal tier; guaranteed; no bonus | server eligibility mismatch fixed; resource/outcome tests pending |",
          )
          doc = doc.replace(
              "| Convergence Transfer | Class 4 only; no tier loss; may cross body slots; source destroyed | not started |",
              "| Convergence Transfer | Class 4 only; no tier loss; may cross body slots; source destroyed | class restriction mismatch fixed; full integration test pending |",
          )
          doc = doc.replace(
              "No production code was changed in this step.\n",
              "No production code was changed in this step.\n\n### 2026-07-12 — first semantic findings and fixes\n\n- Opened draft PR #171 for the validation stream.\n- Confirmed `forge_dust_level` starts at 100 in the database schema.\n- Confirmed the Dust-limit upgrade formula is `current limit - 75`.\n- Confirmed Dust-to-Slivers is 60 Dust for 3 Slivers and Slivers-to-Core is 50 Slivers for 1 Core.\n- Confirmed imbued equipment is filtered both from the Forge window and from the server-side item lookup.\n- Confirmed the runtime pricing table matches the documented regular/convergence Fusion and Transfer tables.\n- Found and fixed stale maximum Dust values: `config.lua.dist` and the `ConfigManager` fallback used 225 instead of 325.\n- Aligned the fallback Fiendish world limit with the configured/documented limit of 4 (fallback was 3).\n- Found a server-authority gap: regular Fusion accepted different item IDs when a crafted packet bypassed the client list.\n- Found a server-authority gap: Convergence Fusion and Convergence Transfer could be requested for upgrade classes 1-3.\n- Added pure policy helpers and unit tests for regular Fusion identity, Convergence Fusion class/slot/identity rules, and Convergence Transfer class-4 enforcement.\n- Added server-side rejection before any Forge inventory/resource mutation.\n\nFiles changed in this remediation:\n\n- `config.lua.dist`;\n- `src/config/configmanager.cpp`;\n- `src/creatures/players/player.cpp`;\n- `src/game/functions/forge_fusion_policy.hpp`;\n- `src/game/functions/forge_transfer_policy.hpp`;\n- `tests/unit/players/forge_test.cpp`;\n- this validation document.\n\nEvidence level after this step: static/semantic **B-C** for the listed rules; regression **F** is pending CI execution and runtime/gameplay **D-E** remain open.\n",
          )
          doc = doc.replace(
              "1. inventory every Forge-related source/config/test file;\n2. reconstruct the exact cost/probability/classification tables used at runtime;\n3. compare Fusion and both Convergence flows first, because normal Transfer already has focused baseline coverage;\n4. inspect mutation ordering and rollback guarantees;\n5. add failing tests before behavioural fixes;\n6. continue with influenced/fiendish creatures and item effects;\n7. perform runtime and protocol validation after static/semantic issues are resolved.",
              "1. run the focused Forge unit/integration suites and inspect CI;\n2. add integration coverage proving malformed Fusion/Convergence packets do not mutate items, Dust, cores or gold;\n3. validate all eight Fusion bonus outcomes and their history/result packets;\n4. inspect mutation ordering and rollback guarantees for late failures;\n5. validate influenced/fiendish scaling, premium restrictions, lifecycle and rewards;\n6. validate Onslaught, Ruse, Momentum, Transcendence and Amplification formulas;\n7. perform runtime and protocol gameplay validation after static/semantic issues are resolved.",
          )
          doc = doc.replace(
              "No claim of full Equipment Upgrade parity has been made yet. The current work is at evidence-inventory stage.",
              "No claim of full Equipment Upgrade parity has been made yet. Static server-authority fixes are present, but CI, runtime/gameplay validation, bonus outcomes, monster behaviour and effect formulas remain open.",
          )
          doc_path.write_text(doc, encoding="utf-8")
          PY

      - name: Commit verified fixes
        shell: bash
        run: |
          rm .github/workflows/equipment-upgrade-validation-patch.yml
          git config user.name "OpenAI OTS validation agent"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "fix(forge): enforce Equipment Upgrade eligibility"
          git push origin HEAD:validation/equipment-upgrade
