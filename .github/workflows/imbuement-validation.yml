---
name: Imbuement Validation

on:
  push:
    branches:
      - "fix/imbuement-live-parity"
  pull_request:
    paths:
      - ".github/workflows/imbuement-validation.yml"
      - "tools/ai-agent/apply_imbuement_live_parity_patch.py"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diagnose-live-parity:
    name: Diagnose live parity patch
    if: >-
      (github.event_name == 'push' && github.ref_name == 'fix/imbuement-live-parity') ||
      (github.event_name == 'pull_request' && github.head_ref == 'fix/imbuement-live-parity')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: fix/imbuement-live-parity
          fetch-depth: 0

      - name: Capture finalizer output
        shell: bash
        run: |
          set +e
          python tools/ai-agent/apply_imbuement_live_parity_patch.py > /tmp/finalizer.log 2>&1
          status=$?
          {
            echo "exit_status=$status"
            cat /tmp/finalizer.log
          } > /tmp/IMBUEMENT_FINALIZER_DIAGNOSTIC.txt
          exit 0

      - name: Upload finalizer diagnostic
        uses: actions/upload-artifact@v4
        with:
          name: imbuement-finalizer-diagnostic
          path: /tmp/IMBUEMENT_FINALIZER_DIAGNOSTIC.txt
          if-no-files-found: error
          retention-days: 2
