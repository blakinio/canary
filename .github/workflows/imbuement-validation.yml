---
name: Imbuement Validation

on:
  push:
    branches:
      - "fix/imbuement-live-parity"
  pull_request:
    paths:
      - ".github/workflows/imbuement-validation.yml"
      - "data/XML/imbuements.xml"
      - "tools/ai-agent/imbuement*_validation.py"
      - "tools/ai-agent/test_imbuement*_validation.py"
      - "docs/ai-agent/IMBUEMENT_VALIDATION_REPORT.md"
      - "docs/ai-agent/IMBUEMENT_RUNTIME_TEST_PLAN.json"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diagnose-focused-tests:
    name: Diagnose focused Imbuement tests
    if: >-
      (github.event_name == 'push' && github.ref_name == 'fix/imbuement-live-parity') ||
      (github.event_name == 'pull_request' && github.head_ref == 'fix/imbuement-live-parity')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: fix/imbuement-live-parity
          fetch-depth: 0

      - name: Correct temporary helper anchor
        shell: python
        run: |
          from pathlib import Path
          import re

          path = Path("tools/ai-agent/apply_imbuement_live_parity_patch.py")
          text = path.read_text(encoding="utf-8")
          pattern = re.compile(
              r'    old_actual = .*?    path\.write_text\(text\.replace\(old_actual, new_actual, 1\), encoding="utf-8"\)\n',
              re.S,
          )
          replacement = '''    marker = '        "actual_forgotten_knowledge_groups": {'
              if marker not in text:
                  raise RuntimeError("storage validator baseline marker missing")
              quest_block = ''' + '"""' + '''        "expected_quest_unlock_groups": {
              str(storage_id): list(families)
              for storage_id, families in EXPECTED_QUEST_UNLOCK_GROUPS.items()
          },
          ''' + '"""' + '''
              text = text.replace(
                  marker,
                  quest_block + '        "actual_powerful_storage_groups": {',
                  1,
              )
              path.write_text(text, encoding="utf-8")
          '''
          text, count = pattern.subn(replacement, text, count=1)
          if count != 1:
              raise SystemExit("temporary helper baseline section not found")
          path.write_text(text, encoding="utf-8")

      - name: Apply patch and capture focused validation
        shell: bash
        run: |
          set +e
          {
            echo '=== apply patch ==='
            python tools/ai-agent/apply_imbuement_live_parity_patch.py
            echo "apply_status=$?"
            echo '=== py_compile ==='
            python -m py_compile \
              tools/ai-agent/imbuement_validation.py \
              tools/ai-agent/imbuement_storage_validation.py \
              tools/ai-agent/test_imbuement_validation.py \
              tools/ai-agent/test_imbuement_storage_validation.py
            echo "compile_status=$?"
            echo '=== unittest ==='
            python -m unittest discover -s tools/ai-agent -p 'test_imbuement*.py' -v
            echo "unittest_status=$?"
            echo '=== registry audit ==='
            python tools/ai-agent/imbuement_validation.py --repository-root . --output /tmp/IMBUEMENT_VALIDATION.json
            echo "registry_status=$?"
            cat /tmp/IMBUEMENT_VALIDATION.json 2>/dev/null || true
            echo '=== storage audit ==='
            python tools/ai-agent/imbuement_storage_validation.py --repository-root . --output /tmp/IMBUEMENT_STORAGE_VALIDATION.json --strict
            echo "storage_status=$?"
            cat /tmp/IMBUEMENT_STORAGE_VALIDATION.json 2>/dev/null || true
            echo '=== runtime plan JSON ==='
            python -m json.tool docs/ai-agent/IMBUEMENT_RUNTIME_TEST_PLAN.json >/dev/null
            echo "json_status=$?"
          } > /tmp/IMBUEMENT_FOCUSED_DIAGNOSTIC.txt 2>&1
          exit 0

      - name: Upload focused diagnostic
        uses: actions/upload-artifact@v4
        with:
          name: imbuement-focused-diagnostic
          path: /tmp/IMBUEMENT_FOCUSED_DIAGNOSTIC.txt
          if-no-files-found: error
          retention-days: 2
