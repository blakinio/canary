---
name: Imbuement Validation

on:
  push:
    branches:
      - "fix/imbuement-live-parity"
  pull_request:
    paths:
      - ".github/workflows/imbuement-validation.yml"
      - "tools/ai-agent/apply_imbuement_live_parity_patch.py"
      - "docs/ai-agent/IMBUEMENT_FINALIZER_DIAGNOSTIC.tmp"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  diagnose-live-parity:
    name: Diagnose live parity patch
    if: >-
      (github.event_name == 'push' && github.ref_name == 'fix/imbuement-live-parity') ||
      (github.event_name == 'pull_request' && github.head_ref == 'fix/imbuement-live-parity')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: fix/imbuement-live-parity
          fetch-depth: 0

      - name: Detect whether diagnostic is required
        id: gate
        run: |
          if test -f docs/ai-agent/IMBUEMENT_FINALIZER_DIAGNOSTIC.tmp; then
            echo 'needed=false' >> "$GITHUB_OUTPUT"
          else
            echo 'needed=true' >> "$GITHUB_OUTPUT"
          fi

      - name: Capture finalizer output
        if: steps.gate.outputs.needed == 'true'
        shell: bash
        run: |
          set +e
          python tools/ai-agent/apply_imbuement_live_parity_patch.py > /tmp/finalizer.log 2>&1
          status=$?
          {
            echo "exit_status=$status"
            cat /tmp/finalizer.log
          } > docs/ai-agent/IMBUEMENT_FINALIZER_DIAGNOSTIC.tmp
          exit 0

      - name: Commit diagnostic
        if: steps.gate.outputs.needed == 'true'
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add docs/ai-agent/IMBUEMENT_FINALIZER_DIAGNOSTIC.tmp
          git commit -m 'docs(imbuement): capture active finalizer failure'
          git push origin HEAD:fix/imbuement-live-parity
