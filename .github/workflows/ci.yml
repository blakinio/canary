---
name: CI

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "tests/**"
      - "data/**"
      - "data-canary/**"
      - "data-otservbr-global/**"
      - "cmake/**"
      - "docker/**"
      - "docs/lua-api/**"
      - "docs/systems/**"
      - "tools/**"
      - "vcproj/**"
      - "vcpkg.json"
      - "CMakeLists.txt"
      - "CMakePresets.json"
      - ".github/scripts/**"
      - ".github/workflows/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect Build Scope
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      pull-requests: read
    outputs:
      # Pull requests build only when the cumulative PR scope requires it and
      # the newest single-commit delta cannot reuse successful immediate-parent
      # CI evidence. workflow_dispatch, main pushes, and ci:final-gate retain
      # full validation.
      reuse_parent: ${{ steps.incremental.outputs.reuse_parent || 'false' }}
      final_gate: ${{ steps.final_gate.outputs.active || 'false' }}
      linux: ${{ github.event_name == 'workflow_dispatch' || github.event_name == 'push' || steps.final_gate.outputs.active == 'true' || (steps.incremental.outputs.reuse_parent != 'true' && steps.filter.outputs.linux == 'true') }}
      full_matrix: ${{ github.event_name == 'workflow_dispatch' || github.event_name == 'push' || steps.final_gate.outputs.active == 'true' || (steps.incremental.outputs.reuse_parent != 'true' && steps.filter.outputs.engine == 'true') }}
      run_canary_smoke: ${{ github.event_name == 'workflow_dispatch' || github.event_name == 'push' || steps.final_gate.outputs.active == 'true' || (steps.incremental.outputs.reuse_parent != 'true' && (steps.filter.outputs.engine == 'true' || steps.filter.outputs.shared_datapack == 'true' || steps.filter.outputs.canary_datapack == 'true')) }}
      run_global_smoke: ${{ github.event_name == 'workflow_dispatch' || github.event_name == 'push' || steps.final_gate.outputs.active == 'true' || (steps.incremental.outputs.reuse_parent != 'true' && (steps.filter.outputs.engine == 'true' || steps.filter.outputs.shared_datapack == 'true' || steps.filter.outputs.global_datapack == 'true')) }}
      docker: ${{ (github.event_name == 'workflow_dispatch' || steps.final_gate.outputs.active == 'true') && 'true' || (steps.incremental.outputs.reuse_parent != 'true' && steps.filter.outputs.docker) }}
      docker_quickstart: ${{ (github.event_name == 'workflow_dispatch' || steps.final_gate.outputs.active == 'true') && 'true' || (steps.incremental.outputs.reuse_parent != 'true' && steps.filter.outputs.docker_quickstart) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}

      - name: Detect final gate label
        id: final_gate
        if: github.event_name == 'pull_request'
        run: echo "active=${{ contains(github.event.pull_request.labels.*.name, 'ci:final-gate') }}" >> "$GITHUB_OUTPUT"

      - name: Evaluate immediate-parent CI reuse
        id: incremental
        if: github.event_name == 'pull_request'
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: >-
          python tools/agents/ci_incremental_validation.py
          --profile ci
          --workflow-name CI
          --event-name "${{ github.event_name }}"
          --event-action "${{ github.event.action }}"

      - name: Detect changed paths
        id: filter
        if: github.event_name != 'workflow_dispatch'
        uses: dorny/paths-filter@v4
        with:
          filters: |
            linux:
              - "src/**"
              - "tests/**"
              - "data/**"
              - "data-canary/**"
              - "data-otservbr-global/**"
              - "cmake/**"
              - "docker/**"
              - "docs/lua-api/**"
              - "docs/systems/**"
              - "tools/**"
              - "vcproj/**"
              - "vcpkg.json"
              - "CMakeLists.txt"
              - "CMakePresets.json"
              - ".github/scripts/**"
              - ".github/workflows/**"
            engine:
              - "src/**"
              - "tests/**"
              - "cmake/**"
              - "vcproj/**"
              - "vcpkg.json"
              - "CMakeLists.txt"
              - "CMakePresets.json"
              - ".github/workflows/ci.yml"
              - ".github/workflows/reusable-build-linux.yml"
              - ".github/workflows/reusable-build-windows.yml"
              - ".github/workflows/reusable-build-macos.yml"
              - ".github/scripts/**"
            shared_datapack:
              - "data/**"
            canary_datapack:
              - "data-canary/**"
            global_datapack:
              - "data-otservbr-global/**"
            docker:
              - "docker/**"
              - "src/**"
              - "cmake/**"
              - "vcpkg.json"
              - "CMakeLists.txt"
              - "CMakePresets.json"
              - ".github/workflows/ci.yml"
              - ".github/workflows/reusable-build-docker.yml"
              - ".github/workflows/reusable-docker-quickstart-smoke.yml"
              - ".github/scripts/**"
            docker_quickstart:
              - "docker/docker-compose.yml"
              - "docker/.env.dist"
              - "docker/quickstart/**"
              - "docker/data/01-test_account.sql"
              - "docker/data/02-test_account_players.sql"
              - ".github/scripts/docker-quickstart-smoke.sh"
              - ".github/workflows/ci.yml"
              - ".github/workflows/reusable-docker-quickstart-smoke.yml"

      - name: Summarize incremental decision
        if: github.event_name == 'pull_request'
        run: |
          echo "reuse_parent=${{ steps.incremental.outputs.reuse_parent || 'false' }}"
          echo "final_gate=${{ steps.final_gate.outputs.active || 'false' }}"
          echo "reason=${{ steps.incremental.outputs.reason }}"

  # --- Fast Checks ---

  checks:
    name: Fast Checks
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' || github.event.pull_request.draft == false
    permissions:
      contents: write
      checks: write
    uses: ./.github/workflows/reusable-checks.yml
    secrets: inherit

  tests-lua:
    name: Lua Tests
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' || github.event.pull_request.draft == false
    permissions:
      contents: read
    uses: ./.github/workflows/reusable-tests-lua.yml
    secrets: inherit

  # --- Heavy Builds ---

  build-linux:
    name: Build - Linux
    needs: [changes, checks, tests-lua]
    if: needs.changes.outputs.linux == 'true' && needs.checks.result == 'success' && needs.tests-lua.result == 'success' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch' || github.event.pull_request.draft == false)
    permissions:
      contents: write
      packages: write
    uses: ./.github/workflows/reusable-build-linux.yml
    with:
      buildtypes: ${{ needs.changes.outputs.full_matrix == 'true' && '["linux-release","linux-debug"]' || '["linux-release"]' }}
      run_canary_smoke: ${{ needs.changes.outputs.run_canary_smoke == 'true' }}
      run_global_smoke: ${{ needs.changes.outputs.run_global_smoke == 'true' }}
    secrets: inherit

  build-windows:
    name: Build - Windows
    needs: [changes, checks, tests-lua]
    if: needs.changes.outputs.full_matrix == 'true' && needs.checks.result == 'success' && needs.tests-lua.result == 'success' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch' || github.event.pull_request.draft == false)
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/reusable-build-windows.yml
    with:
      run_canary_smoke: ${{ needs.changes.outputs.run_canary_smoke == 'true' }}
    secrets: inherit

  build-macos:
    name: Build - macOS
    needs: [changes, checks, tests-lua]
    if: needs.changes.outputs.full_matrix == 'true' && needs.checks.result == 'success' && needs.tests-lua.result == 'success' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch' || github.event.pull_request.draft == false)
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/reusable-build-macos.yml
    with:
      run_canary_smoke: ${{ needs.changes.outputs.run_canary_smoke == 'true' }}
    secrets: inherit

  build-docker:
    name: Build - Docker
    needs: [changes, checks, tests-lua]
    if: needs.changes.outputs.docker == 'true' && needs.checks.result == 'success' && needs.tests-lua.result == 'success' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch' || !github.event.pull_request.draft)
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/reusable-build-docker.yml
    secrets: inherit

  docker-quickstart-smoke:
    name: Docker Quickstart Smoke
    needs: [changes, checks, tests-lua, build-docker]
    if: (needs.changes.outputs.docker == 'true' || needs.changes.outputs.docker_quickstart == 'true') && needs.checks.result == 'success' && needs.tests-lua.result == 'success' && needs.build-docker.result == 'success' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch' || !github.event.pull_request.draft)
    permissions:
      contents: read
    uses: ./.github/workflows/reusable-docker-quickstart-smoke.yml

  required:
    name: Required
    if: always()
    needs:
      - changes
      - checks
      - tests-lua
      - build-linux
      - build-windows
      - build-macos
      - build-docker
      - docker-quickstart-smoke
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Evaluate required jobs
        env:
          IS_DRAFT: ${{ github.event_name == 'pull_request' && github.event.pull_request.draft && 'true' || 'false' }}
          NEEDS_JSON: ${{ toJSON(needs) }}
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import os
          import sys

          jobs = json.loads(os.environ["NEEDS_JSON"])
          rejected = {}
          is_draft = os.environ["IS_DRAFT"] == "true"

          if jobs["changes"].get("result") != "success":
              rejected["changes"] = (
                  f"expected success, got {jobs['changes'].get('result')}"
              )

          for name in ("checks", "tests-lua"):
              result = jobs[name].get("result")
              allowed = {"success", "skipped"} if is_draft else {"success"}
              if result not in allowed:
                  rejected[name] = f"expected {sorted(allowed)}, got {result}"

          scopes = jobs["changes"].get("outputs", {})
          for scope in ("linux", "full_matrix", "docker", "docker_quickstart"):
              if scopes.get(scope) not in {"true", "false"}:
                  rejected[f"scope:{scope}"] = (
                      f"expected true or false, got {scopes.get(scope)!r}"
                  )

          required_builds = {
              "build-linux": scopes.get("linux") == "true",
              "build-windows": scopes.get("full_matrix") == "true",
              "build-macos": scopes.get("full_matrix") == "true",
              "build-docker": scopes.get("docker") == "true",
              "docker-quickstart-smoke": (
                  scopes.get("docker") == "true"
                  or scopes.get("docker_quickstart") == "true"
              ),
          }

          for name, required in required_builds.items():
              result = jobs[name].get("result")
              if result not in {"success", "skipped"}:
                  rejected[name] = f"unexpected conclusion {result}"
              elif not is_draft and required and result != "success":
                  rejected[name] = (
                      f"selected scope requires success, got {result}"
                  )

          print("Required job results:")
          for name in sorted(jobs):
              print(f"- {name}: {jobs[name].get('result')}")

          print("Detected scopes:")
          for scope in sorted(scopes):
              print(f"- {scope}: {scopes.get(scope)}")

          if rejected:
              for name, reason in sorted(rejected.items()):
                  print(
                      "::error title=Required CI job did not pass::"
                      f"{name}: {reason}"
                  )
              sys.exit(1)
          PY