name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  reconcile-oam034:
    if: github.event.pull_request.head.ref == 'docs/oam-034-creature-definitions-reconciliation'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout reconciliation head
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Apply reconciliation and restore workflow state
        shell: bash
        run: |
          python .github/scripts/oam034_program_reconcile.py
          git fetch origin main
          git checkout origin/main -- .github/workflows/ci.yml
          rm -f .github/workflows/oam034-program-reconciliation-helper.yml
          rm -f .github/scripts/oam034_program_reconcile.py
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/agents/programs/OTERYN_ARCHITECTURE_AND_MIGRATION_PROGRAM.md .github/workflows/ci.yml .github/workflows/oam034-program-reconciliation-helper.yml .github/scripts/oam034_program_reconcile.py
          git diff --cached --check
          git commit -m "docs(oam): reconcile OAM-034 durable completion"
          git push origin HEAD:"${GITHUB_HEAD_REF}"
