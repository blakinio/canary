name: Apply issue 3609 fix

on:
  push:
    branches: [fix/issue-3609-house-podium-duplication]

permissions:
  contents: write

jobs:
  apply-fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/issue-3609-house-podium-duplication
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Apply focused fix
        shell: python
        run: |
          from pathlib import Path

          path = Path('src/map/house/house.cpp')
          text = path.read_text(encoding='utf-8')
          old = '''\tconst auto &newItem = g_game().wrapItem(item, houseTile->getHouse());
\tif (newItem->isRemoved() && !newItem->getParent()) {
\t\tg_logger().warn("[{}] item removed during wrapping - check ground type - player name: {} item id: {} position: {}", __FUNCTION__, player->getName(), item->getID(), houseTile->getPosition().toString());
\t\treturn;
\t}

\tmoveItemList.push_back(newItem);
'''
          new = '''\tconst auto &parent = item->getParent();
\tif (parent) {
\t\tparent->removeThing(item, item->getItemCount());
\t}

\tconst auto &newItem = g_game().wrapItem(item, houseTile->getHouse());
\tif (!newItem || (newItem->isRemoved() && !newItem->getParent())) {
\t\tg_logger().warn("[{}] item removed during wrapping - check ground type - player: {} item id: {} position: {}", __FUNCTION__, player->getName(), item->getID(), houseTile->getPosition().toString());
\t\treturn;
\t}

\tmoveItemList.push_back(newItem);
'''
          if old not in text:
              raise SystemExit('Expected handleWrapableItem block not found')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
      - name: Remove helper workflow and commit
        run: |
          rm .github/workflows/apply-issue-3609-fix.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/map/house/house.cpp .github/workflows/apply-issue-3609-fix.yml
          git commit -m "fix: prevent wrapped house item duplication"
          git push origin HEAD:fix/issue-3609-house-podium-duplication
