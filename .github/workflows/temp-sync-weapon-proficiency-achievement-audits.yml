---
name: Temporary Sync Weapon Proficiency Achievement Audits

on:
  pull_request:
    paths:
      - ".github/workflows/temp-sync-weapon-proficiency-achievement-audits.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: fix/weapon-proficiency-achievement-thresholds
          fetch-depth: 0

      - name: Synchronize validators and reviewed evidence
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          def replace_once(path: str, old: str, new: str) -> None:
              target = Path(path)
              text = target.read_text(encoding="utf-8")
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"marker in {path!r} found {count} times, expected once")
              target.write_text(text.replace(old, new), encoding="utf-8")

          validator = "tools/ai-agent/weapon_proficiency_achievement_audit.py"
          replace_once(
              validator,
              '''            "m_playerAchievement.add(",\n''',
              '''            "m_playerAchievement.add(",\n            "m_player.achiev().add(",\n''',
          )
          replace_once(
              validator,
              '''    mastered_count_api = bool(re.search(r"getMastered|countMastered|masteredWeapon", hpp_text, re.IGNORECASE))\n    player_achievement_add_available = "bool add(uint16_t id" in player_achievement_text\n''',
              '''    mastery_achievement_body = extract_function_body(cpp_text, "std::vector<uint16_t> WeaponProficiency::getMasteryAchievementIds")\n    mastery_achievement_ids = {\n        int(achievement_id)\n        for achievement_id in re.findall(r"\\{\\s*\\d+\\s*,\\s*(56[4-6])\\s*\\}", mastery_achievement_body)\n    }\n    mastered_count_api = bool(re.search(r"getMastered|countMastered|masteredWeapon", hpp_text, re.IGNORECASE))\n    player_achievement_add_available = "bool add(uint16_t id" in player_achievement_text\n''',
          )
          replace_once(
              validator,
              '''        if not awards:\n            findings.append(\n''',
              '''        if not awards and achievement_id not in mastery_achievement_ids:\n            findings.append(\n''',
          )
          replace_once(
              validator,
              '''            1 for achievement_id in (564, 565, 566) if static_award_matches[TARGETS[achievement_id]["name"]]\n''',
              '''            1\n            for achievement_id in (564, 565, 566)\n            if static_award_matches[TARGETS[achievement_id]["name"]] or achievement_id in mastery_achievement_ids\n''',
          )
          replace_once(
              validator,
              '''            "playerAchievementAddAvailable": player_achievement_add_available,\n''',
              '''            "playerAchievementAddAvailable": player_achievement_add_available,\n            "masteryAchievementIds": sorted(mastery_achievement_ids),\n''',
          )

          test_path = Path("tools/ai-agent/test_weapon_proficiency_achievement_audit.py")
          test_text = test_path.read_text(encoding="utf-8")
          test_text = test_text.replace(
              '        self.assertFalse(report["runtimeEvidence"]["achievementHookPresent"])\n',
              '        self.assertTrue(report["runtimeEvidence"]["achievementHookPresent"])\n'
              '        self.assertEqual(report["runtimeEvidence"]["masteryAchievementIds"], [564, 565, 566])\n'
              '        self.assertEqual(report["summary"]["targetAwardPathCount"], 3)\n',
          )
          test_text = test_text.replace(
              '        self.assertIn("mastery-achievement-hook-missing", codes)\n'
              '        self.assertNotIn("initial-mastery-flag-not-set", codes)\n'
              '        self.assertNotIn("mastered-count-api-missing", codes)\n'
              '        self.assertIn("target-award-path-missing", codes)\n',
              '        self.assertNotIn("mastery-achievement-hook-missing", codes)\n'
              '        self.assertNotIn("initial-mastery-flag-not-set", codes)\n'
              '        self.assertNotIn("mastered-count-api-missing", codes)\n'
              '        self.assertNotIn("target-award-path-missing", codes)\n',
          )
          test_path.write_text(test_text, encoding="utf-8")

          evidence_path = Path("docs/ai-agent/ACHIEVEMENT_REVIEWED_EVIDENCE.json")
          payload = json.loads(evidence_path.read_text(encoding="utf-8"))
          payload["reviewedAt"] = "2026-07-13"
          payload["scope"] = "Reviewed Weapon Proficiency evidence including threshold awards/backfill for 564-566 and the still-separate secret achievement 567."
          for entry in payload["entries"]:
              if entry["id"] in (564, 565, 566):
                  entry["status"] = "partially-confirmed"
                  entry["reason"] = "The definition, exact mastered-weapon threshold, live mastery-transition award hook and login-time existing-player reconciliation are implemented and unit-covered. Full runtime/E2E remains unproven."
                  entry["evidence"] = [
                      {"path": "src/creatures/players/components/weapon_proficiency.cpp", "line": 347, "kind": "threshold-map"},
                      {"path": "src/creatures/players/components/weapon_proficiency.cpp", "line": 359, "kind": "canonical-award-api"},
                      {"path": "src/creatures/players/components/weapon_proficiency.cpp", "line": 294, "kind": "existing-player-reconciliation"},
                      {"path": "tests/unit/players/components/weapon_proficiency_test.cpp", "line": 85, "kind": "threshold-unit-test"},
                  ]
                  entry["persistenceBackfill"] = "implemented-login-reconciliation"
                  entry["newPlayerAttainability"] = "partially-confirmed"
                  entry["existingPlayerAttainability"] = "partially-confirmed"
                  entry["runtimeE2EProven"] = False
                  entry["testStatus"] = "unit-covered"
          evidence_path.write_text(json.dumps(payload, indent=2) + "\n", encoding="utf-8")

          report = Path("docs/ai-agent/WEAPON_PROFICIENCY_ACHIEVEMENT_REPORT.md")
          text = report.read_text(encoding="utf-8")
          marker = "# Weapon Proficiency achievements 564–567 — evidence report\n\n"
          update = "# Weapon Proficiency achievements 564–567 — evidence report\n\n> **Threshold implementation update:** PR #272 adds idempotent awards for IDs 564–566 at 1/10/50 mastered weapons and login-time reconciliation for existing players. ID 567 remains separate. Full runtime/E2E remains unproven.\n\n"
          if text.count(marker) != 1:
              raise SystemExit("report heading marker missing")
          report.write_text(text.replace(marker, update), encoding="utf-8")
          PY

      - name: Validate synchronized audits
        run: |
          python -m py_compile tools/ai-agent/weapon_proficiency_achievement_audit.py
          python -m unittest discover -s tools/ai-agent -p "test_weapon_proficiency_achievement_audit.py" -v
          python -m unittest discover -s tools/ai-agent -p "test_achievement_validation.py" -v
          python -m json.tool docs/ai-agent/ACHIEVEMENT_REVIEWED_EVIDENCE.json > /dev/null
          python tools/ai-agent/weapon_proficiency_achievement_audit.py --repository-root . --output /tmp/wp.json --allow-findings
          python - <<'PY'
          import json
          report = json.load(open('/tmp/wp.json'))
          assert report['runtimeEvidence']['achievementHookPresent'] is True
          assert report['runtimeEvidence']['masteryAchievementIds'] == [564, 565, 566]
          assert report['summary']['targetAwardPathCount'] == 3
          codes = {item['code'] for item in report['findings']}
          assert 'mastery-achievement-hook-missing' not in codes
          assert 'target-award-path-missing' not in codes
          PY
          git diff --check

      - name: Commit synchronized evidence
        run: |
          rm .github/workflows/temp-sync-weapon-proficiency-achievement-audits.yml
          git config user.name "weapon-achievement-bot"
          git config user.email "weapon-achievement-bot@users.noreply.github.com"
          git add \
            tools/ai-agent/weapon_proficiency_achievement_audit.py \
            tools/ai-agent/test_weapon_proficiency_achievement_audit.py \
            docs/ai-agent/ACHIEVEMENT_REVIEWED_EVIDENCE.json \
            docs/ai-agent/WEAPON_PROFICIENCY_ACHIEVEMENT_REPORT.md \
            .github/workflows/temp-sync-weapon-proficiency-achievement-audits.yml
          git diff --cached --check
          git commit -m "test(achievements): validate Weapon Proficiency award paths"
          git push origin HEAD:fix/weapon-proficiency-achievement-thresholds
