name: Sync Forge transaction branch with main

on:
  pull_request:
    branches:
      - fix/forge-transaction-safety
    paths:
      - docs/ai-agent/.sync-forge-transaction-main

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout transaction branch
        uses: actions/checkout@v4
        with:
          ref: fix/forge-transaction-safety
          fetch-depth: 0
          show-progress: false

      - name: Merge current main with bounded conflict policy
        shell: bash
        run: |
          git fetch origin main
          set +e
          git merge --no-commit --no-ff origin/main
          status=$?
          set -e
          if [ "$status" -ne 0 ]; then
            conflicts=$(git diff --name-only --diff-filter=U | sort)
            expected=$(printf '%s\n' \
              'src/creatures/players/player.cpp' \
              'tests/unit/players/CMakeLists.txt' | sort)
            if [ "$conflicts" != "$expected" ]; then
              echo "Unexpected conflicts:"
              printf '%s\n' "$conflicts"
              exit 1
            fi
            git checkout --ours src/creatures/players/player.cpp
            git checkout --theirs tests/unit/players/CMakeLists.txt
            python3 tools/ai-agent/sync_forge_transaction_with_main.py
            git add src/creatures/players/player.cpp tests/unit/players/CMakeLists.txt
          fi
          if git diff --name-only --diff-filter=U | grep -q .; then
            echo "Unresolved conflicts remain"
            exit 1
          fi
          git diff --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore(forge): sync transaction safety with current main"
          git push origin HEAD:fix/forge-transaction-safety
