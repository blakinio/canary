---
name: Agent Task Lifecycle

on:
  pull_request_target:
    types:
      - closed

permissions:
  actions: write
  contents: write
  pull-requests: write

jobs:
  archive-merged-task:
    name: Archive merged task through cleanup PR
    if: >-
      github.event.pull_request.merged == true &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout trusted default branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Archive exact matching active task
        run: >-
          python tools/agents/task_lifecycle.py archive-pr
          --pr-number "${{ github.event.pull_request.number }}"
          --merge-commit "${{ github.event.pull_request.merge_commit_sha }}"
          --merged-at "${{ github.event.pull_request.merged_at }}"
          --feature-head "${{ github.event.pull_request.head.sha }}"
          --write

      - name: Detect lifecycle changes
        id: lifecycle
        shell: bash
        run: |
          if git diff --quiet -- docs/agents/tasks; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create lifecycle branch and commit
        if: steps.lifecycle.outputs.changed == 'true'
        id: commit
        shell: bash
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          branch="automation/archive-agent-task-pr-${PR_NUMBER}-${GITHUB_RUN_ID}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$branch"
          git add docs/agents/tasks
          git commit -m "docs(agents): archive merged PR #${PR_NUMBER} task"
          git push origin "HEAD:${branch}"
          echo "branch=$branch" >> "$GITHUB_OUTPUT"

      - name: Open cleanup PR
        if: steps.lifecycle.outputs.changed == 'true'
        id: cleanup_pr
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          FEATURE_TITLE: ${{ github.event.pull_request.title }}
          LIFECYCLE_BRANCH: ${{ steps.commit.outputs.branch }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          body_file="$(mktemp)"
          cat > "$body_file" <<EOF
          ## Automated agent-task lifecycle cleanup

          Archives the active task record associated with merged PR #${PR_NUMBER}.

          - Source PR: #${PR_NUMBER} — ${FEATURE_TITLE}
          - Generated from trusted \`${DEFAULT_BRANCH}\` after merge.
          - The workflow did not checkout or execute the feature PR head.
          - Scope is limited to the exact active task record whose parsed \`related_pr\` equals ${PR_NUMBER}.
          - Required workflows are explicitly dispatched on this exact cleanup branch because PRs created with the repository automation token do not reliably trigger usable recursive PR checks.
          - Normal CI, branch protection and auto-merge remain in force.
          EOF

          pr_url="$(gh pr create \
            --repo "$GITHUB_REPOSITORY" \
            --base "$DEFAULT_BRANCH" \
            --head "$LIFECYCLE_BRANCH" \
            --title "docs(agents): archive merged PR #${PR_NUMBER} task" \
            --body-file "$body_file")"
          echo "url=$pr_url" >> "$GITHUB_OUTPUT"

      - name: Dispatch required cleanup checks
        if: steps.lifecycle.outputs.changed == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          LIFECYCLE_BRANCH: ${{ steps.commit.outputs.branch }}
        run: |
          gh workflow run agent-task-ownership.yml \
            --repo "$GITHUB_REPOSITORY" \
            --ref "$LIFECYCLE_BRANCH"
          gh workflow run ci.yml \
            --repo "$GITHUB_REPOSITORY" \
            --ref "$LIFECYCLE_BRANCH"

      - name: Enable cleanup auto-merge
        if: steps.lifecycle.outputs.changed == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          CLEANUP_PR_URL: ${{ steps.cleanup_pr.outputs.url }}
        run: |
          gh pr merge "$CLEANUP_PR_URL" \
            --repo "$GITHUB_REPOSITORY" \
            --auto \
            --squash \
            --delete-branch
