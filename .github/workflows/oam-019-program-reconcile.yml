name: OAM-019 Program Reconcile Materializer

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  materialize:
    if: github.event.pull_request.head.ref == 'docs/oam-019-program-reconciliation'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact PR head
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Materialize durable OAM-019 program state
        run: python tools/oam_019_program_reconcile.py

      - name: Remove temporary materializer
        run: |
          rm tools/oam_019_program_reconcile.py
          rm .github/workflows/oam-019-program-reconcile.yml

      - name: Verify final one-file scope
        run: |
          set -euo pipefail
          git fetch origin main
          git add -A
          changed="$(git diff --cached --name-only origin/main)"
          test "$changed" = "docs/agents/programs/OTERYN_ARCHITECTURE_AND_MIGRATION_PROGRAM.md"
          test -z "$(git status --porcelain --untracked-files=all | grep '^??' || true)"

      - name: Commit clean program reconciliation
        env:
          BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git commit -m "docs(oam): reconcile durable OAM-019 completion"
          git push origin "HEAD:${BRANCH}"
