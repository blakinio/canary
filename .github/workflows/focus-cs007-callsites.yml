name: Focus CS-007 production call sites

on:
  pull_request:
    types: [synchronize]

permissions:
  contents: write

concurrency:
  group: focus-cs007-production-callsites
  cancel-in-progress: false

jobs:
  focus:
    if: >-
      github.event.pull_request.number == 328 &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.head_ref == 'security/table-unserialize-safe'
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: security/table-unserialize-safe
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Add focused call-site inventory
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import re
          import subprocess
          from pathlib import Path

          json_path = Path("artifacts/upstream/crystalserver/cs007_table_unserialize_audit.json")
          md_path = Path("artifacts/upstream/crystalserver/CS007_TABLE_UNSERIALIZE_AUDIT.md")
          report = json.loads(json_path.read_text())

          identifiers = {
              "table.unserialize": re.compile(r"table\.unserialize\s*\("),
              "table.serialize": re.compile(r"table\.serialize\s*\("),
              "unserializeTable": re.compile(r"(?<![\w.])unserializeTable\s*\("),
              "serializeTable": re.compile(r"(?<![\w.])serializeTable\s*\("),
              "return-load": re.compile(r"\bload(?:string)?\s*\(\s*[\"']return\s+[\"']\s*\.\."),
          }
          excluded_prefixes = (
              ".github/workflows/audit-cs007",
              ".github/workflows/focus-cs007",
              "artifacts/upstream/crystalserver/CS007_",
              "artifacts/upstream/crystalserver/cs007_",
          )
          focused = {name: [] for name in identifiers}
          tracked = subprocess.check_output(["git", "ls-files", "-z"]).split(b"\0")
          for raw in tracked:
              if not raw:
                  continue
              path = raw.decode("utf-8", errors="surrogateescape")
              if path.startswith(excluded_prefixes):
                  continue
              file_path = Path(path)
              try:
                  data = file_path.read_bytes()
              except OSError:
                  continue
              if b"\0" in data:
                  continue
              lines = data.decode("utf-8", errors="replace").splitlines()
              for lineno, line in enumerate(lines, 1):
                  for name, pattern in identifiers.items():
                      if pattern.search(line):
                          start = max(1, lineno - 3)
                          end = min(len(lines), lineno + 3)
                          focused[name].append({
                              "path": path,
                              "line": lineno,
                              "text": line.strip(),
                              "context": [f"{idx}: {lines[idx - 1].rstrip()}" for idx in range(start, end + 1)],
                          })

          report["focused_identifier_inventory"] = focused
          report["focused_inventory_exclusions"] = list(excluded_prefixes)
          json_path.write_text(json.dumps(report, indent=2, sort_keys=True) + "\n")

          md = md_path.read_text().rstrip()
          marker = "\n## Focused production identifier inventory\n"
          if marker in md:
              md = md.split(marker, 1)[0].rstrip()
          lines = [md, "", "## Focused production identifier inventory", ""]
          lines.append("Audit workflow files and the CS-007 reports themselves are excluded. Task/documentation references remain visible and are classified separately from runtime code.")
          lines.append("")
          for name, rows in focused.items():
              lines.extend([f"### `{name}`", "", f"Occurrences: **{len(rows)}**", ""])
              for row in rows:
                  lines.extend([f"- `{row['path']}:{row['line']}` — `{row['text']}`"])
              if not rows:
                  lines.append("- _None._")
              lines.append("")
          lines.extend([
              "### Initial classification",
              "",
              "- A definition is not a runtime call site.",
              "- Documentation/task references do not establish runtime reachability.",
              "- `table.unserialize` and `unserializeTable` are separate public helpers and require separate provenance decisions even though both evaluate Lua source.",
              "",
          ])
          md_path.write_text("\n".join(line.rstrip() for line in lines).rstrip() + "\n")
          PY

          workflow='.github/workflows/focus-cs007-callsites.yml'
          rm -f "$workflow"
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -f artifacts/upstream/crystalserver/CS007_TABLE_UNSERIALIZE_AUDIT.md artifacts/upstream/crystalserver/cs007_table_unserialize_audit.json
          git add -A "$workflow"
          actual="$(git diff --cached --name-only | sort)"
          expected="$(printf '%s\n' "$workflow" \
            'artifacts/upstream/crystalserver/CS007_TABLE_UNSERIALIZE_AUDIT.md' \
            'artifacts/upstream/crystalserver/cs007_table_unserialize_audit.json' | sort)"
          test "$actual" = "$expected"
          git diff --cached --check
          git commit -m 'audit(lua): classify table decoder call sites'
          git push origin HEAD:security/table-unserialize-safe
