---
name: TCR-004 Catalog Self Update

on:
  push:
    branches:
      - feat/tcr-004-proficiency-reference-index
    paths:
      - ".github/workflows/tcr004-catalog-self-update.yml"

permissions:
  contents: write

jobs:
  update-catalog:
    if: github.repository == 'blakinio/canary' && github.ref == 'refs/heads/feat/tcr-004-proficiency-reference-index'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact branch
        uses: actions/checkout@v4
        with:
          ref: feat/tcr-004-proficiency-reference-index
          fetch-depth: 0

      - name: Register TCR-004 and remove helper workflow
        shell: python
        run: |
          from pathlib import Path

          catalog = Path("docs/agents/MODULE_CATALOG.md")
          text = catalog.read_text(encoding="utf-8")
          text = text.replace("Last reviewed: 2026-07-23", "Last reviewed: 2026-07-24", 1)
          row = (
              "| Tibia client-reference proficiency index | active TCR-004 (#858) | "
              "Deterministic manifest-bound read-only `canary-tibia-proficiency-index-v1` preserving IDs, names, optional versions, ordered levels, optional XP requirements and reviewed perk records with explicit duplicate findings | "
              "`tools/ai-agent/tibia_proficiency_reference_index*.py`, focused tests, `docs/ai-agent/TIBIA_PROFICIENCY_REFERENCE_INDEX.md`, schema, dedicated workflow | "
              "Reuse for exact selected proficiency-definition evidence. It does not parse appearances, write `items.xml`, register runtime data or prove persistence/protocol/gameplay. TCR-007 owns correlation through the canonical appearance index. |"
          )
          if row not in text:
              lines = text.splitlines()
              for index, line in enumerate(lines):
                  if line.startswith("| Weapon Proficiency achievement audit,"):
                      lines.insert(index + 1, row)
                      break
              else:
                  raise SystemExit("Weapon Proficiency catalogue anchor not found")
              text = "\n".join(lines) + ("\n" if text.endswith("\n") else "")
          catalog.write_text(text, encoding="utf-8")
          Path(".github/workflows/tcr004-catalog-self-update.yml").unlink()

      - name: Commit exact catalogue change
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/agents/MODULE_CATALOG.md .github/workflows/tcr004-catalog-self-update.yml
          git diff --cached --check
          git commit -m "docs(agents): register TCR-004 proficiency index"
          git push origin HEAD:feat/tcr-004-proficiency-reference-index
