name: Universal Agent E2E

on:
  workflow_dispatch:
    inputs:
      suite:
        description: Scenario suite under tests/e2e/scenarios
        required: true
        default: login
        type: string
      scenario:
        description: Scenario id within the selected suite
        required: true
        default: relog
        type: string
      server_repository:
        description: Optional controlled server repository; empty uses this Canary repository
        required: false
        default: ""
        type: string
      server_ref:
        description: Exact controlled server SHA; required when server_repository is set
        required: false
        default: ""
        type: string
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/universal-agent-e2e.yml"
      - ".github/workflows/reusable-build-linux.yml"
      - ".github/scripts/smoke_test_canary.py"
      - ".github/e2e-controlled-server.env"
      - "tools/agents/ci_incremental_validation.py"
      - "tools/e2e/prepare_otbm_route.py"
      - "tools/e2e/run_agent_e2e.py"
      - "tools/e2e/run_physical_e2e.sh"
      - "tools/e2e/server_selection.py"
      - "tools/e2e/client/**"
      - "tests/e2e/**"
      - "!tests/e2e/load/**"
      - "!tests/e2e/test_load_runner.py"

permissions:
  contents: write
  actions: read
  packages: write

concurrency:
  group: universal-agent-e2e-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  scope:
    name: Decide physical E2E validation scope
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      actions: read
      contents: read
    outputs:
      reuse_parent: ${{ steps.incremental.outputs.reuse_parent || 'false' }}
      run_heavy: ${{ steps.incremental.outputs.run_heavy || 'true' }}
      reason: ${{ steps.incremental.outputs.reason }}
    steps:
      - name: Checkout exact test head
        uses: actions/checkout@v6
        with:
          fetch-depth: 2
          persist-credentials: false
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
      - name: Evaluate immediate-parent physical E2E reuse
        id: incremental
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: >-
          python tools/agents/ci_incremental_validation.py
          --profile universal-e2e
          --workflow-name "Universal Agent E2E"
          --event-name "${{ github.event_name }}"
          --event-action "${{ github.event.action }}"
      - name: Summarize validation decision
        run: |
          echo "reuse_parent=${{ steps.incremental.outputs.reuse_parent || 'false' }}"
          echo "run_heavy=${{ steps.incremental.outputs.run_heavy || 'true' }}"
          echo "reason=${{ steps.incremental.outputs.reason }}"

  resolve:
    name: Resolve scenario
    needs: [scope]
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      client_repository: ${{ steps.metadata.outputs.client_repository }}
      client_ref: ${{ steps.metadata.outputs.client_ref }}
      suite: ${{ steps.metadata.outputs.suite }}
      scenario: ${{ steps.metadata.outputs.scenario }}
      server_repository: ${{ steps.server.outputs.server_repository }}
      server_ref: ${{ steps.server.outputs.server_ref }}
    env:
      REQUESTED_SUITE: ${{ inputs.suite || 'login' }}
      REQUESTED_SCENARIO: ${{ inputs.scenario || 'relog' }}
      REQUESTED_SERVER_REPOSITORY: ${{ inputs.server_repository }}
      REQUESTED_SERVER_REF: ${{ inputs.server_ref }}
    steps:
      - name: Checkout exact test head
        uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Resolve controlled server source
        id: server
        env:
          EVENT_NAME: ${{ github.event_name }}
          CURRENT_REPOSITORY: ${{ github.repository }}
          PR_HEAD_REPOSITORY: ${{ github.event.pull_request.head.repo.full_name }}
        run: |
          set -euo pipefail
          server_repository="${REQUESTED_SERVER_REPOSITORY:-}"
          server_ref="${REQUESTED_SERVER_REF:-}"
          pin_file=".github/e2e-controlled-server.env"

          if [[ -f "${pin_file}" ]]; then
            if [[ "${EVENT_NAME}" != "pull_request" || "${PR_HEAD_REPOSITORY}" != "${CURRENT_REPOSITORY}" ]]; then
              echo "controlled-server pin files are accepted only from same-repository pull requests" >&2
              exit 1
            fi
            pinned_repository="$(grep -E '^SERVER_REPOSITORY=' "${pin_file}" | head -n 1 | cut -d= -f2- || true)"
            pinned_ref="$(grep -E '^SERVER_REF=' "${pin_file}" | head -n 1 | cut -d= -f2- || true)"
            if [[ -n "${pinned_repository}" ]]; then
              server_repository="${pinned_repository}"
            fi
            if [[ -n "${pinned_ref}" ]]; then
              server_ref="${pinned_ref}"
            fi
          fi

          if [[ -n "${server_repository}" ]]; then
            case "${server_repository}" in
              "${CURRENT_REPOSITORY}"|"blakinio/Otheryn") ;;
              *)
                echo "unsupported controlled server repository: ${server_repository}" >&2
                exit 1
                ;;
            esac
            if [[ ! "${server_ref}" =~ ^[0-9a-f]{40}$ ]]; then
              echo "controlled server ref must be an exact 40-character lowercase SHA" >&2
              exit 1
            fi
          elif [[ -n "${server_ref}" ]]; then
            echo "server_repository is required when server_ref is set" >&2
            exit 1
          fi

          echo "server_repository=${server_repository}" >> "${GITHUB_OUTPUT}"
          echo "server_ref=${server_ref}" >> "${GITHUB_OUTPUT}"
      - name: Validate and resolve scenario
        run: |
          set -euo pipefail
          python -m py_compile tools/e2e/run_agent_e2e.py
          python tools/e2e/run_agent_e2e.py list
          python tools/e2e/run_agent_e2e.py validate
          python tools/e2e/run_agent_e2e.py resolve \
            --suite "${REQUESTED_SUITE}" \
            --scenario "${REQUESTED_SCENARIO}" \
            --github-env "${GITHUB_ENV}" \
            > scenario-manifest.json
      - name: Export scenario metadata
        id: metadata
        run: |
          set -euo pipefail
          echo "client_repository=${AGENT_E2E_CLIENT_REPOSITORY}" >> "${GITHUB_OUTPUT}"
          echo "client_ref=${AGENT_E2E_CLIENT_REF}" >> "${GITHUB_OUTPUT}"
          echo "suite=${AGENT_E2E_SUITE}" >> "${GITHUB_OUTPUT}"
          echo "scenario=${AGENT_E2E_SCENARIO_ID}" >> "${GITHUB_OUTPUT}"

  database-preflight:
    name: Validate database bootstrap
    needs: [scope]
    if: needs.scope.outputs.run_heavy == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
    env:
      DB_HOST: 127.0.0.1
      DB_PORT: "3306"
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: agent_e2e
      MYSQL_PWD: root
    services:
      database:
        image: mariadb:11.4
        env:
          MARIADB_ROOT_PASSWORD: root
          MARIADB_DATABASE: agent_e2e
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mariadb-admin ping -h 127.0.0.1 -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=18
    steps:
      - name: Checkout exact test head
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install database client
        run: |
          sudo apt-get update
          sudo apt-get install -y mariadb-client

      - name: Import schema and deterministic fixtures
        shell: bash
        run: |
          set -Eeuo pipefail
          mkdir -p artifacts/database-preflight

          db=(mariadb --protocol=TCP -h "${DB_HOST}" -P "${DB_PORT}" -u "${DB_USER}" "${DB_NAME}")
          admin=(mariadb-admin --protocol=TCP -h "${DB_HOST}" -P "${DB_PORT}" -u "${DB_USER}")

          for attempt in $(seq 1 90); do
            if "${admin[@]}" ping >/dev/null 2>&1; then
              break
            fi
            if [[ "${attempt}" -eq 90 ]]; then
              echo "database did not become ready" | tee artifacts/database-preflight/readiness.stderr
              exit 1
            fi
            sleep 2
          done

          run_file() {
            local label="$1"
            local source="$2"
            echo "${label}" > artifacts/database-preflight/current-phase.txt
            if ! "${db[@]}" --show-warnings --verbose \
              >"artifacts/database-preflight/${label}.stdout" \
              2>"artifacts/database-preflight/${label}.stderr" < "${source}"; then
              cat "artifacts/database-preflight/${label}.stderr" >&2
              return 1
            fi
          }

          run_query() {
            local label="$1"
            local query="$2"
            echo "${label}" > artifacts/database-preflight/current-phase.txt
            if ! "${db[@]}" --show-warnings --verbose -e "${query}" \
              >"artifacts/database-preflight/${label}.stdout" \
              2>"artifacts/database-preflight/${label}.stderr"; then
              cat "artifacts/database-preflight/${label}.stderr" >&2
              return 1
            fi
          }

          run_file schema schema.sql
          run_file accounts docker/data/01-test_account.sql
          run_file players docker/data/02-test_account_players.sql
          run_query cleanup 'DELETE FROM players_online; DELETE FROM boosted_boss;'
          run_query verify "SELECT id,name,email FROM accounts WHERE id=101; SELECT id,name,account_id,level FROM players WHERE name='Knight 1';"
          rm -f artifacts/database-preflight/current-phase.txt

      - name: Upload database bootstrap evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: universal-agent-e2e-database-preflight
          path: artifacts/database-preflight/
          if-no-files-found: error
          retention-days: 14

  build-canary:
    name: Build exact Canary head
    needs: [scope, database-preflight]
    if: needs.scope.outputs.run_heavy == 'true' && needs.database-preflight.result == 'success'
    permissions:
      contents: write
      packages: write
    uses: ./.github/workflows/reusable-build-linux.yml
    with:
      buildtypes: '["linux-release"]'
      run_canary_smoke: false
      run_global_smoke: false

  build-otclient:
    name: Build controlled OTClient
    needs: [scope, resolve, database-preflight]
    if: needs.scope.outputs.run_heavy == 'true' && needs.resolve.result == 'success' && needs.database-preflight.result == 'success'
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    permissions:
      contents: read
      packages: read
    env:
      CC: gcc-14
      CXX: g++-14
      VCPKG_BINARY_CACHE_ACCESS: read
      VCPKG_BINARY_SOURCES: "clear;nuget,https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json,read;nugettimeout,600"
      VCPKG_NUGET_REPOSITORY: https://github.com/${{ needs.resolve.outputs.client_repository }}.git
      VCPKG_NUGET_API_KEY: ${{ github.token }}
    steps:
      - name: Checkout controlled OTClient source
        uses: actions/checkout@v6
        with:
          repository: ${{ needs.resolve.outputs.client_repository }}
          ref: ${{ needs.resolve.outputs.client_ref }}
          persist-credentials: false

      - name: Record controlled client revision
        run: |
          set -euo pipefail
          git rev-parse HEAD | tee otclient-commit.txt

      - name: Read vcpkg baseline
        run: |
          set -euo pipefail
          vcpkg_commit_id="$(grep '.builtin-baseline' vcpkg.json | awk -F: '{print $2}' | tr -d ',\" ')"
          test -n "${vcpkg_commit_id}"
          echo "VCPKG_GIT_COMMIT_ID=${vcpkg_commit_id}" >> "${GITHUB_ENV}"

      - name: Install OTClient build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf \
            autoconf-archive \
            automake \
            ccache \
            gcc-14 \
            g++-14 \
            libgl1-mesa-dev \
            libglu1-mesa-dev \
            libltdl-dev \
            libtool \
            libtool-bin \
            libx11-dev \
            libxcursor-dev \
            libxi-dev \
            libxinerama-dev \
            libxrandr-dev \
            linux-libc-dev \
            make \
            mono-complete \
            ninja-build \
            perl \
            pkg-config
          sudo ln -sf /usr/bin/ninja /usr/bin/ninja-build
          ninja --version

      - name: CCache
        uses: hendrikmuhs/ccache-action@d62db5f07c26379fc4b4e0916f098a92573c3b03
        with:
          max-size: "1G"
          key: universal-e2e-otclient-linux-release
          restore-keys: |
            ccache-linux-release
            ccache-linux

      - name: Set up vcpkg
        uses: lukka/run-vcpkg@b1a0dd252f06b9e25b3c022a9a03bd7a427fb6a2
        with:
          vcpkgGitURL: "https://github.com/microsoft/vcpkg.git"
          vcpkgGitCommitId: ${{ env.VCPKG_GIT_COMMIT_ID }}

      - name: Seed verified FreeType source fallback
        env:
          FREETYPE_SOURCE_URL: https://github.com/freetype/freetype/archive/refs/tags/VER-2-14-3.tar.gz
          FREETYPE_SOURCE_SHA512: c3b6b0cc4b428c9c647ab2148386901dfd315273b68051940e8fea6010d46fdd2913467c3ef58be0d499b8e2ef5a0f1a4cc5e739756155587f4f7dff08ef9695
        run: |
          set -euo pipefail
          vcpkg_root="${VCPKG_ROOT:-$(dirname "$(command -v vcpkg)")}" 
          downloads_dir="${VCPKG_DOWNLOADS:-${vcpkg_root}/downloads}"
          archive="${downloads_dir}/freetype-freetype-VER-2-14-3.tar.gz"
          mkdir -p "${downloads_dir}"

          if [[ -f "${archive}" ]] && printf '%s  %s\n' "${FREETYPE_SOURCE_SHA512}" "${archive}" | sha512sum --check --status; then
            source_kind="existing-cache"
          else
            rm -f "${archive}"
            curl --fail --location --retry 3 --retry-delay 5 \
              "${FREETYPE_SOURCE_URL}" \
              --output "${archive}"
            printf '%s  %s\n' "${FREETYPE_SOURCE_SHA512}" "${archive}" | sha512sum --check -
            source_kind="github-mirror"
          fi

          {
            echo "url=${FREETYPE_SOURCE_URL}"
            echo "sha512=${FREETYPE_SOURCE_SHA512}"
            echo "archive=${archive}"
            echo "source=${source_kind}"
          } | tee freetype-source-fallback.txt

      - name: Configure NuGet package cache
        env:
          NUGET_AUTH_TOKEN: ${{ env.VCPKG_NUGET_API_KEY }}
        run: |
          set -euo pipefail
          unset VCPKG_FORCE_SYSTEM_BINARIES
          nuget_path="$(vcpkg fetch nuget 2>&1 | grep -E '^/' | tail -n 1)"
          if [[ -z "${nuget_path}" || ! -f "${nuget_path}" ]]; then
            vcpkg fetch nuget 2>&1 || true
            exit 1
          fi
          mono "${nuget_path}" sources remove -name "GitHubPackages" >/dev/null 2>&1 || true
          mono "${nuget_path}" sources add \
            -source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" \
            -storepasswordincleartext \
            -name "GitHubPackages" \
            -username "${{ github.repository_owner }}" \
            -password "${NUGET_AUTH_TOKEN}"
          mono "${nuget_path}" setapikey "${NUGET_AUTH_TOKEN}" \
            -source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json"

      - name: Build OTClient release
        uses: lukka/run-cmake@5d55ea7949e25f69f0ecb516d8d572297e03a956
        with:
          configurePreset: linux-release
          buildPreset: linux-release
          configurePresetAdditionalArgs: "['-DTOGGLE_BIN_FOLDER=ON', '-DOPTIONS_ENABLE_IPO=OFF']"

      - name: Upload controlled OTClient build diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: otclient-linux-release-build-diagnostics
          path: |
            freetype-source-fallback.txt
            build/linux-release/CMakeCache.txt
            build/linux-release/.ninja_log
            build/linux-release/CMakeFiles/CMakeConfigureLog.yaml
            build/linux-release/CMakeFiles/CMakeOutput.log
            build/linux-release/CMakeFiles/CMakeError.log
            vcpkg_installed/vcpkg/issue_body.md
            vcpkg_installed/vcpkg/*.log
          if-no-files-found: warn
          retention-days: 14

      - name: Verify OTClient executable
        run: |
          set -euo pipefail
          OTCLIENT_PATH="$(find build/linux-release/bin -maxdepth 2 -type f -name 'otclient' -perm -111 | head -n 1)"
          test -n "${OTCLIENT_PATH}"
          test -x "${OTCLIENT_PATH}"
          printf 'path=%s\nsha256=' "${OTCLIENT_PATH}" > otclient-build.txt
          sha256sum "${OTCLIENT_PATH}" | awk '{print $1}' >> otclient-build.txt

      - name: Upload controlled OTClient artifact
        uses: actions/upload-artifact@v4
        with:
          name: otclient-linux-release
          path: |
            build/linux-release/bin/
            otclient-commit.txt
            otclient-build.txt
            freetype-source-fallback.txt
          if-no-files-found: error
          retention-days: 14

  physical-client:
    name: Physical client / ${{ needs.resolve.outputs.suite }}/${{ needs.resolve.outputs.scenario }}
    needs: [scope, resolve, database-preflight, build-canary, build-otclient]
    if: needs.scope.outputs.run_heavy == 'true' && needs.resolve.result == 'success' && needs.database-preflight.result == 'success' && needs.build-canary.result == 'success' && needs.build-otclient.result == 'success'
    runs-on: ubuntu-24.04
    timeout-minutes: 75
    permissions:
      contents: read
      actions: read
      packages: read
    env:
      AGENT_E2E_SUITE: ${{ needs.resolve.outputs.suite }}
      AGENT_E2E_SCENARIO_ID: ${{ needs.resolve.outputs.scenario }}
      AGENT_E2E_TEST_PASSWORD: test
      AGENT_E2E_ARTIFACT_DIR: ${{ github.workspace }}/artifacts
      AGENT_E2E_OTCLIENT_ROOT: ${{ github.workspace }}/otclient
      AGENT_E2E_ASSET_SOURCE: ${{ github.workspace }}/tibia-client-assets/assets
      DB_HOST: 127.0.0.1
      DB_PORT: "3306"
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: agent_e2e
      MYSQL_PWD: root
      CC: gcc-13
      CXX: g++-13
      VCPKG_BINARY_SOURCES: "clear;nuget,https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json,read;nugettimeout,600"
      VCPKG_NUGET_API_KEY: ${{ github.token }}
    services:
      database:
        image: mariadb:11.4
        env:
          MARIADB_ROOT_PASSWORD: root
          MARIADB_DATABASE: agent_e2e
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mariadb-admin ping -h 127.0.0.1 -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=18

    steps:
      - name: Checkout exact Canary test head
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Prepare evidence directory
        run: mkdir -p artifacts

      - name: Checkout controlled server source
        if: needs.resolve.outputs.server_repository != ''
        uses: actions/checkout@v6
        with:
          repository: ${{ needs.resolve.outputs.server_repository }}
          ref: ${{ needs.resolve.outputs.server_ref }}
          path: controlled-server
          persist-credentials: false

      - name: Record controlled server revision
        if: needs.resolve.outputs.server_repository != ''
        run: |
          set -euo pipefail
          git -C controlled-server rev-parse HEAD | tee artifacts/server-source-commit.txt
          printf 'repository=%s\nref=%s\n' "${{ needs.resolve.outputs.server_repository }}" "${{ needs.resolve.outputs.server_ref }}" > artifacts/server-source-request.txt

      - name: Install controlled server build dependencies
        if: needs.resolve.outputs.server_repository != ''
        run: |
          sudo apt-get update
          sudo apt-get install -y ccache ninja-build gcc-13 g++-13 mono-complete
          sudo ln -sf /usr/bin/ninja /usr/bin/ninja-build
          ninja --version

      - name: Read controlled server vcpkg baseline
        if: needs.resolve.outputs.server_repository != ''
        run: |
          set -euo pipefail
          vcpkg_commit_id="$(grep '.builtin-baseline' controlled-server/vcpkg.json | awk -F: '{print $2}' | tr -d ',\" ')"
          test -n "${vcpkg_commit_id}"
          echo "VCPKG_GIT_COMMIT_ID=${vcpkg_commit_id}" >> "${GITHUB_ENV}"

      - name: Set up controlled server vcpkg
        if: needs.resolve.outputs.server_repository != ''
        uses: lukka/run-vcpkg@b1a0dd252f06b9e25b3c022a9a03bd7a427fb6a2
        with:
          vcpkgGitURL: "https://github.com/microsoft/vcpkg.git"
          vcpkgGitCommitId: ${{ env.VCPKG_GIT_COMMIT_ID }}

      - name: Configure controlled server NuGet package cache
        if: needs.resolve.outputs.server_repository != ''
        env:
          NUGET_AUTH_TOKEN: ${{ env.VCPKG_NUGET_API_KEY }}
        run: |
          set -euo pipefail
          unset VCPKG_FORCE_SYSTEM_BINARIES
          nuget_path="$(vcpkg fetch nuget 2>&1 | grep -E '^/' | tail -n 1)"
          if [[ -z "${nuget_path}" || ! -f "${nuget_path}" ]]; then
            vcpkg fetch nuget 2>&1 || true
            exit 1
          fi
          mono "${nuget_path}" sources remove -name "GitHubPackages" >/dev/null 2>&1 || true
          mono "${nuget_path}" sources add \
            -source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" \
            -storepasswordincleartext \
            -name "GitHubPackages" \
            -username "${{ github.repository_owner }}" \
            -password "${NUGET_AUTH_TOKEN}"
          mono "${nuget_path}" setapikey "${NUGET_AUTH_TOKEN}" \
            -source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json"

      - name: Build controlled server release
        if: needs.resolve.outputs.server_repository != ''
        working-directory: controlled-server
        run: |
          set -euo pipefail
          cmake --preset linux-release \
            -DTOGGLE_BIN_FOLDER=ON \
            -DOPTIONS_ENABLE_CCACHE=ON \
            -DOPTIONS_ENABLE_SCCACHE=OFF
          cmake --build --preset linux-release --parallel 2
          controlled_server_bin="${GITHUB_WORKSPACE}/controlled-server/build/linux-release/bin/canary"
          test -x "${controlled_server_bin}"
          echo "CONTROLLED_SERVER_BIN=${controlled_server_bin}" >> "${GITHUB_ENV}"
          sha256sum "${controlled_server_bin}" | tee "${GITHUB_WORKSPACE}/artifacts/server-binary-sha256.txt"

      - name: Checkout controlled OTClient source
        uses: actions/checkout@v6
        with:
          repository: ${{ needs.resolve.outputs.client_repository }}
          ref: ${{ needs.resolve.outputs.client_ref }}
          path: otclient
          persist-credentials: false

      - name: Checkout matching client assets
        uses: actions/checkout@v6
        with:
          repository: dudantas/tibia-client
          path: tibia-client-assets
          lfs: true
          persist-credentials: false

      - name: Download exact-head Canary binary
        uses: actions/download-artifact@v4
        with:
          name: canary-linux-release
          path: canary-bin

      - name: Download controlled OTClient binary
        uses: actions/download-artifact@v4
        with:
          name: otclient-linux-release
          path: otclient-bin

      - name: Install runtime dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            g++-13 \
            imagemagick \
            libgl1 \
            libglu1-mesa \
            libopenal1 \
            libpulse0 \
            libx11-6 \
            libxcursor1 \
            libxi6 \
            libxinerama1 \
            libxrandr2 \
            mariadb-client \
            x11-utils \
            xvfb

      - name: Resolve executable artifacts
        shell: bash
        run: |
          set -euo pipefail
          find canary-bin otclient-bin -maxdepth 6 -type f -print | tee artifacts/downloaded-files.txt
          if [[ -n "${CONTROLLED_SERVER_BIN:-}" ]]; then
            CANARY_PATH="${CONTROLLED_SERVER_BIN}"
          else
            CANARY_PATH="$(find canary-bin -type f -name 'canary' | head -n 1)"
            git rev-parse HEAD | tee artifacts/server-source-commit.txt
            printf 'repository=%s\nref=%s\n' "${GITHUB_REPOSITORY}" "${GITHUB_SHA}" > artifacts/server-source-request.txt
          fi
          OTCLIENT_PATH="$(find otclient-bin -type f -name 'otclient' | head -n 1)"
          test -n "${CANARY_PATH}"
          test -n "${OTCLIENT_PATH}"
          chmod +x "${CANARY_PATH}" "${OTCLIENT_PATH}"
          test -x "${CANARY_PATH}"
          test -x "${OTCLIENT_PATH}"
          echo "CANARY_BIN=${CANARY_PATH}" >> "${GITHUB_ENV}"
          echo "OTCLIENT_BIN=${GITHUB_WORKSPACE}/${OTCLIENT_PATH}" >> "${GITHUB_ENV}"
          sha256sum "${CANARY_PATH}" "${OTCLIENT_PATH}" | tee artifacts/executable-sha256.txt
          git -C otclient rev-parse HEAD | tee artifacts/otclient-source-commit.txt

      - name: Resolve route preparation metadata
        shell: bash
        run: |
          set -euo pipefail
          python3 tools/e2e/run_agent_e2e.py resolve \
            --suite "${AGENT_E2E_SUITE}" \
            --scenario "${AGENT_E2E_SCENARIO_ID}" \
            --github-env "${GITHUB_ENV}" \
            > artifacts/scenario-manifest.json
          python3 tools/e2e/server_selection.py \
            --manifest artifacts/scenario-manifest.json \
            --root "${GITHUB_WORKSPACE}" \
            --github-env "${GITHUB_ENV}"

      - name: Prepare exact OTBM route artifact
        shell: bash
        run: |
          set -euo pipefail
          route_count="$(python3 - <<'PY'
          import json
          from pathlib import Path

          manifest = json.loads(Path("artifacts/scenario-manifest.json").read_text(encoding="utf-8"))
          steps = manifest.get("scenario", {}).get("steps") or []
          print(sum(1 for step in steps if isinstance(step, dict) and step.get("action") == "follow_route"))
          PY
          )"
          if [[ "${route_count}" -eq 0 ]]; then
            echo "No follow_route steps require OTBM route preparation."
            exit 0
          fi

          if [[ ! -s "${AGENT_E2E_SERVER_MAP_PATH}" ]]; then
            if [[ "${AGENT_E2E_SERVER_ALLOW_MAP_DOWNLOAD}" != "true" ]]; then
              echo "selected non-default map is missing or empty: ${AGENT_E2E_SERVER_MAP_PATH}" >&2
              exit 1
            fi
            mkdir -p "$(dirname "${AGENT_E2E_SERVER_MAP_PATH}")"
            MAP_URL="$(grep -E '^mapDownloadUrl[[:space:]]*=' config.lua.dist | sed -E 's/.*"([^"]+)".*/\1/')"
            test -n "${MAP_URL}"
            curl --fail --location --retry 5 --retry-delay 5 "${MAP_URL}" --output "${AGENT_E2E_SERVER_MAP_PATH}"
          fi

          sha256sum tools/e2e/prepare_otbm_route.py > artifacts/route-preparer.sha256
          python3 tools/e2e/prepare_otbm_route.py \
            --manifest artifacts/scenario-manifest.json \
            --runtime-map "${AGENT_E2E_SERVER_MAP_PATH}" \
            --assets-dir "${AGENT_E2E_ASSET_SOURCE}" \
            --artifact-dir "${AGENT_E2E_ARTIFACT_DIR}" \
            --cxx "${CXX}"

      - name: Run selected physical-client scenario
        shell: bash
        run: bash tools/e2e/run_physical_e2e.sh

      - name: Upload universal E2E evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: universal-agent-e2e-${{ needs.resolve.outputs.suite }}-${{ needs.resolve.outputs.scenario }}
          path: artifacts/
          if-no-files-found: warn
          retention-days: 14

  required:
    name: Required physical E2E
    if: always()
    needs: [scope, resolve, database-preflight, build-canary, build-otclient, physical-client]
    runs-on: ubuntu-24.04
    permissions: {}
    steps:
      - name: Evaluate physical E2E evidence
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import os
          import sys

          jobs = json.loads(os.environ["NEEDS_JSON"])
          scope = jobs["scope"]
          if scope.get("result") != "success":
              raise SystemExit(f"scope must succeed, got {scope.get('result')}")
          if jobs["resolve"].get("result") != "success":
              raise SystemExit(f"resolve must succeed, got {jobs['resolve'].get('result')}")

          outputs = scope.get("outputs", {})
          run_heavy = outputs.get("run_heavy") == "true"
          reuse_parent = outputs.get("reuse_parent") == "true"
          heavy_jobs = (
              "database-preflight",
              "build-canary",
              "build-otclient",
              "physical-client",
          )

          if run_heavy:
              failed = {
                  name: jobs[name].get("result")
                  for name in heavy_jobs
                  if jobs[name].get("result") != "success"
              }
              if failed:
                  raise SystemExit(f"required physical E2E jobs did not pass: {failed}")
          else:
              if not reuse_parent:
                  raise SystemExit("heavy E2E skip requires proven immediate-parent reuse")
              unexpected = {
                  name: jobs[name].get("result")
                  for name in heavy_jobs
                  if jobs[name].get("result") != "skipped"
              }
              if unexpected:
                  raise SystemExit(f"reused E2E jobs must be skipped: {unexpected}")

          print(
              "physical E2E gate passed: "
              f"run_heavy={run_heavy} reuse_parent={reuse_parent}"
          )
          PY
