name: OTBM QA 014-018 Governance Patch

on:
  push:
    branches:
      - docs/otbm-qa-014-018-governance-20260722
    paths:
      - .github/workflows/otbm-qa-014-018-governance-patch.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: docs/otbm-qa-014-018-governance-20260722
          fetch-depth: 0
      - name: Apply exact shared-doc additions
        shell: python
        run: |
          from pathlib import Path

          catalog = Path("docs/agents/MODULE_CATALOG.md")
          text = catalog.read_text(encoding="utf-8")
          rows = [
              "| OTBM Asset and Appearance Compatibility | active (#734) | Deterministic read-only `canary-otbm-asset-compatibility-v1` composition of exact Unified World Index item usage with canonical `canary-appearances-index-v1` and `canary-client-assets-index-v1` evidence, plus optional exact baseline appearance semantic deltas | `tools/ai-agent/otbm_asset_compatibility.py`, CLI, focused tests, `docs/ai-agent/OTBM_ASSET_COMPATIBILITY.md`, manifest/report schemas | Reuse canonical World Index, appearance index and asset index only; never reparse OTBM/appearances/assets, mutate maps or client assets, or claim runtime rendering/gameplay proof. Missing appearance or sprite evidence fails closed; semantic deltas apply only to item IDs used by the exact map. |",
              "| OTBM Static Map Performance Hotspots | active (#735) | Deterministic read-only `canary-otbm-static-hotspots-v1` investigation candidates from explicit `canary-otbm-static-hotspot-policy-v1` thresholds over exact World Index tile, item-depth, mechanic and 256x256-floor area density | `tools/ai-agent/otbm_static_hotspots.py`, CLI, focused tests, `docs/ai-agent/OTBM_STATIC_HOTSPOTS.md`, policy/report schemas | Static prioritization only: reuse the canonical World Index; do not add another parser/pathfinder/profiler, mutate maps or claim CPU, memory, network, database or client-render performance impact without subsystem-owned runtime profiling. |",
              "| OTBM Release Provenance and Certification Freshness | active (#737) | Versioned `canary-otbm-release-bom-v1` exact component SHA-256 inventory and deterministic `canary-otbm-release-provenance-v1` previous/current comparison with explicit dimension dependencies and dependency-scoped staleness | `tools/ai-agent/otbm_release_provenance.py`, CLI, focused tests, `docs/ai-agent/OTBM_RELEASE_PROVENANCE.md`, BOM/report schemas | Exact hashes and declared dependencies are freshness evidence; timestamps are not. The composer does not rerun Semantic Diff, validators or Physical E2E, mutate evidence/certification, or prove runtime compatibility after a dependency change. |",
              "| OTBM Deterministic Change Risk | active (#739) | Transparent `canary-otbm-change-risk-v1` review aid over exact before/after map hashes, versioned `canary-otbm-change-risk-policy-v1` weights/thresholds and `canary-otbm-change-risk-input-v1` evidence-backed factors with visible contributions | `tools/ai-agent/otbm_change_risk.py`, CLI, focused tests, `docs/ai-agent/OTBM_CHANGE_RISK.md`, policy/input/report schemas | No opaque AI score. Reuse exact upstream finding IDs/provenance; unresolved factors remain visible and conservative. Risk never authorizes validation skip, repair or merge and does not prove gameplay regression. |",
              "| OTBM Compact Evidence Gateway | active (#741) | Bounded read-only `canary-otbm-evidence-bundle-v1` extraction of exact SHA/format-pinned canonical JSON report fragments selected by reviewed JSON Pointers through `canary-otbm-evidence-gateway-manifest-v1` | `tools/ai-agent/otbm_evidence_gateway.py`, CLI, focused tests, `docs/ai-agent/OTBM_EVIDENCE_GATEWAY.md`, manifest/bundle schemas | Evidence transport/query only. Do not parse OTBM, reinterpret or validate source semantics, pathfind, run E2E or take downstream acceptance ownership. Unsafe paths, symlinks, stale hashes, format mismatches, missing pointers and oversized extracts fail closed. |",
          ]
          anchor = "| OTBM Identifier and Selector Integrity | merged (#724) |"
          if not all(row in text for row in rows):
              lines = text.splitlines()
              for index, line in enumerate(lines):
                  if line.startswith(anchor):
                      lines[index + 1:index + 1] = [row for row in rows if row not in text]
                      break
              else:
                  raise SystemExit("MODULE_CATALOG anchor not found")
              catalog.write_text("\n".join(lines) + "\n", encoding="utf-8")

          changelog = Path("docs/agents/CHANGELOG.md")
          change_text = changelog.read_text(encoding="utf-8")
          bullets = [
              "- Adds `canary-otbm-asset-compatibility-manifest-v1` and `canary-otbm-asset-compatibility-v1` as a deterministic read-only composition of exact World Index item usage, canonical appearance evidence and exact client-asset sprite coverage. Missing used-object appearances, uncovered sprite IDs and missing covering asset files fail closed; optional exact baseline appearance comparison reports canonical walkability/interaction flag deltas only for item IDs used by the selected map. The tool never reparses OTBM/appearances/assets, mutates maps/client assets or claims runtime rendering or gameplay correctness.",
              "- Adds `canary-otbm-static-hotspot-policy-v1` and `canary-otbm-static-hotspots-v1` as explicit-threshold static investigation candidates over canonical World Index tile placement count, item depth, mechanic density and 256x256-floor area density. The analyzer never reparses OTBM, pathfinds, profiles runtime or claims CPU/memory/network/database/client-render impact; candidates only prioritize subsystem-owned runtime investigation.",
              "- Adds `canary-otbm-release-bom-v1` and `canary-otbm-release-provenance-v1` for exact component-hash release baselines and dependency-scoped certification/evidence freshness. Previous/current comparison reports added/removed/changed components and marks only explicitly dependent dimensions stale; timestamps are never freshness proof, and the composer does not rerun Semantic Diff, validators or Physical E2E, mutate evidence/certification or prove runtime compatibility.",
              "- Adds `canary-otbm-change-risk-policy-v1`, `canary-otbm-change-risk-input-v1` and `canary-otbm-change-risk-v1` as a transparent deterministic review aid over exact before/after map hashes and evidence-backed risk factors. Every weight, threshold, contribution and exact evidence reference remains visible; unresolved factors cannot silently reduce risk. The result is not an opaque AI score and never authorizes validation skip, repair or merge or proves gameplay regression.",
              "- Adds `canary-otbm-evidence-gateway-manifest-v1` and `canary-otbm-evidence-bundle-v1` as a bounded read-only compact evidence gateway over existing canonical JSON reports. Sources are exact SHA/format-pinned safe relative files and extracts are reviewed JSON Pointers with bounded serialized values; the gateway retains source/extract hashes and fails closed on unsafe paths, symlinks, stale hashes, format mismatches, missing pointers or oversized extracts. It does not parse OTBM, validate/reinterpret source semantics, pathfind, run E2E or own downstream acceptance.",
          ]
          if not all(bullet in change_text for bullet in bullets):
              marker = "## Unreleased\n\n"
              if marker not in change_text:
                  raise SystemExit("CHANGELOG Unreleased marker not found")
              additions = "\n".join(bullet for bullet in bullets if bullet not in change_text) + "\n"
              change_text = change_text.replace(marker, marker + additions, 1)
              changelog.write_text(change_text, encoding="utf-8")
      - name: Commit bounded governance result and remove helper workflow
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/otbm-qa-014-018-governance-patch.yml
          git add docs/agents/MODULE_CATALOG.md docs/agents/CHANGELOG.md
          git diff --cached --check
          git commit -m "docs(agents): register OTBM QA-014 through QA-018"
          git push origin HEAD:docs/otbm-qa-014-018-governance-20260722
