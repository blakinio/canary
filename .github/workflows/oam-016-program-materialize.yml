'''
          path.write_text(prefix + tail, encoding='utf-8')

          final_blob = subprocess.check_output(['git', 'hash-object', str(path)], text=True).strip()
          expected_final = 'e22511738d57db18b327b3fc930483650be02603'
          if final_blob != expected_final:
              raise SystemExit(f'fail-closed: materialized blob {final_blob}, expected {expected_final}')
          PY
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add docs/agents/programs/OTERYN_ARCHITECTURE_AND_MIGRATION_PROGRAM.md
          git diff --cached --quiet && exit 0
          git commit -m "docs(oam): materialize durable OAM-016 completion"
