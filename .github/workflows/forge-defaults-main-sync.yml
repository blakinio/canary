name: Synchronize Forge live-default branch with main

on:
  pull_request:
    branches:
      - fix/forge-live-defaults
    paths:
      - docs/ai-agent/.forge-defaults-main-sync-runner

permissions:
  contents: write

jobs:
  sync-main:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/forge-live-defaults
          fetch-depth: 0
          show-progress: false
      - name: Merge current main
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch --no-tags origin main
          git merge --no-edit --no-ff origin/main
          git diff --check origin/main...HEAD
          git push origin HEAD:fix/forge-live-defaults
