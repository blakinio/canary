name: Phase 8 scanner transform

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  transform:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 1
          show-progress: false
      - name: Normalize exact transform matching
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path("tools/ai-agent/phase8_patch_scanner_once.py")
          text = path.read_text(encoding="utf-8")

          old_function = '''def replace_once(old: str, new: str) -> None:
              global text
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"exact replacement count {count}, expected 1 for: {old[:100]!r}")
              text = text.replace(old, new, 1)
          '''
          new_function = '''def _shift_block(block: str, spaces: int) -> str:
              prefix = " " * spaces
              return "".join(prefix + line if line.strip() else line for line in block.splitlines(keepends=True))


          def replace_once(old: str, new: str) -> None:
              global text
              count = text.count(old)
              if count == 1:
                  text = text.replace(old, new, 1)
                  return
              candidates: list[tuple[str, str, int]] = []
              for spaces in (4, 8, 12, 16):
                  shifted_old = _shift_block(old, spaces)
                  shifted_count = text.count(shifted_old)
                  if shifted_count == 1:
                      candidates.append((shifted_old, _shift_block(new, spaces), spaces))
              if len(candidates) != 1:
                  shifts = ", ".join(str(spaces) for _old, _new, spaces in candidates) or "none"
                  raise SystemExit(
                      f"exact replacement count {count}, unique shifted matches {shifts}, expected 1 for: {old[:100]!r}"
                  )
              shifted_old, shifted_new, _spaces = candidates[0]
              text = text.replace(shifted_old, shifted_new, 1)
          '''
          if text.count(old_function) == 1:
              text = text.replace(old_function, new_function, 1)
          elif text.count(new_function) != 1:
              raise SystemExit("replace_once implementation is neither the expected source nor target")

          old_stack = '''replace_once(
              """    std::vector<Context> stack;
              stack.reserve(64);

              size_t position = 4;
          """,
              """    std::vector<Context> stack;
              stack.reserve(64);
              std::optional<uint32_t> nextTilePlacementIndex;

              size_t position = 4;
          """,
          )'''
          new_stack = '''replace_once(
              """ScanData scanMap(const std::vector<uint8_t>& data) {
              ScanData result;
              result.header = parseMapHeader(data);
              result.mechanics.reserve(4096);
              std::vector<Context> stack;
              stack.reserve(64);

              size_t position = 4;
          """,
              """ScanData scanMap(const std::vector<uint8_t>& data) {
              ScanData result;
              result.header = parseMapHeader(data);
              result.mechanics.reserve(4096);
              std::vector<Context> stack;
              stack.reserve(64);
              std::optional<uint32_t> nextTilePlacementIndex;

              size_t position = 4;
          """,
          )'''
          if text.count(old_stack) == 1:
              text = text.replace(old_stack, new_stack, 1)
          elif text.count(new_stack) != 1:
              raise SystemExit("stack replacement is neither the expected source nor target")
          path.write_text(text, encoding="utf-8")
          PY
      - name: Apply exact scanner transform
        id: transform
        shell: bash
        run: |
          set +e
          python3 tools/ai-agent/phase8_patch_scanner_once.py > /tmp/phase8-transform.log 2>&1
          status=$?
          if [ "$status" -eq 0 ]; then
            rm -f tools/ai-agent/phase8-transform-error.txt
          else
            cp /tmp/phase8-transform.log tools/ai-agent/phase8-transform-error.txt
          fi
          exit 0
      - name: Commit transform result
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          if git diff --cached --quiet; then
            exit 0
          fi
          if [ -f tools/ai-agent/phase8-transform-error.txt ]; then
            git commit -m "chore(ai-agent): record scanner transform diagnostic"
          else
            git commit -m "feat(ai-agent): expose OTBM patch anchors"
          fi
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
