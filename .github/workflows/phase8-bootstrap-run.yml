name: Phase 8 scanner transform

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  transform:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 1
          show-progress: false
      - name: Disambiguate first-pass transform
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path("tools/ai-agent/phase8_patch_scanner_once.py")
          text = path.read_text(encoding="utf-8")
          old = '''replace_once(
              """    std::vector<Context> stack;
              stack.reserve(64);

              size_t position = 4;
          """,
              """    std::vector<Context> stack;
              stack.reserve(64);
              std::optional<uint32_t> nextTilePlacementIndex;

              size_t position = 4;
          """,
          )'''
          new = '''replace_once(
              """ScanData scanMap(const std::vector<uint8_t>& data) {
              ScanData result;
              result.header = parseMapHeader(data);
              result.mechanics.reserve(4096);
              std::vector<Context> stack;
              stack.reserve(64);

              size_t position = 4;
          """,
              """ScanData scanMap(const std::vector<uint8_t>& data) {
              ScanData result;
              result.header = parseMapHeader(data);
              result.mechanics.reserve(4096);
              std::vector<Context> stack;
              stack.reserve(64);
              std::optional<uint32_t> nextTilePlacementIndex;

              size_t position = 4;
          """,
          )'''
          if text.count(old) != 1:
              raise SystemExit(f"transform script pattern count is {text.count(old)}, expected 1")
          path.write_text(text.replace(old, new, 1), encoding="utf-8")
          PY
      - name: Apply exact scanner transform
        shell: bash
        run: |
          set +e
          output=$(python3 tools/ai-agent/phase8_patch_scanner_once.py 2>&1)
          status=$?
          printf '%s\n' "$output"
          exit "$status"
      - name: Commit transformed scanner
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "feat(ai-agent): expose OTBM patch anchors"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
