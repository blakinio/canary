name: Phase 8 scanner transform

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  transform:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - name: Apply exact scanner transform
        run: python3 tools/ai-agent/phase8_patch_scanner_once.py
      - name: Commit transformed scanner
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "feat(ai-agent): expose OTBM patch anchors"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
