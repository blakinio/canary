---
name: Gameplay Analytics Dry Run

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "data-otservbr-global/scripts/config/gameplay_analytics.lua"
      - "data-otservbr-global/scripts/lib/gameplay_analytics*.lua"
      - "data-otservbr-global/scripts/systems/gameplay_analytics.lua"
      - "data/scripts/runes/fireball.lua"
      - "data/scripts/runes/intense_healing_rune.lua"
      - "tools/analytics/**"
      - "schema/gameplay_analytics*.sql"
      - "grafana/gameplay-analytics-dashboard.json"
      - "docs/systems/gameplay-analytics-dry-run.md"
      - ".github/workflows/gameplay-analytics-dry-run.yml"
  push:
    branches: [main]
    paths:
      - "data-otservbr-global/scripts/config/gameplay_analytics.lua"
      - "data-otservbr-global/scripts/lib/gameplay_analytics*.lua"
      - "data-otservbr-global/scripts/systems/gameplay_analytics.lua"
      - "data/scripts/runes/fireball.lua"
      - "data/scripts/runes/intense_healing_rune.lua"
      - "tools/analytics/**"
      - "schema/gameplay_analytics*.sql"
      - "grafana/gameplay-analytics-dashboard.json"
      - "docs/systems/gameplay-analytics-dry-run.md"
      - ".github/workflows/gameplay-analytics-dry-run.yml"

permissions:
  contents: read

jobs:
  dry-run:
    name: No server or database
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run static Analytics validators
        run: |
          set -euo pipefail
          python tools/analytics/validate_gameplay_analytics.py
          python tools/analytics/validate_gameplay_analytics_context.py
          python tools/analytics/validate_gameplay_analytics_batching.py
          python tools/analytics/validate_gameplay_analytics_reliability.py
          python tools/analytics/validate_gameplay_analytics_correctness.py
          python tools/analytics/validate_gameplay_analytics_migrations.py
          python tools/analytics/validate_gameplay_analytics_deployment.py
          python tools/analytics/validate_gameplay_analytics_retention.py
          python tools/analytics/validate_gameplay_analytics_dashboard.py
          python tools/analytics/validate_gameplay_analytics_supply_loot_integration.py

      - name: Run Python mutation and contract tests
        run: python -m unittest discover -s tools/analytics -p "test_*.py" -v

      - name: Check shell syntax and maintenance configuration without MariaDB
        run: |
          set -euo pipefail
          bash -n tools/analytics/maintain_gameplay_analytics.sh
          bash -n tools/analytics/test_gameplay_analytics_maintenance_config_dry_run.sh
          bash tools/analytics/test_gameplay_analytics_maintenance_config_dry_run.sh

      - name: Install LuaJIT
        run: |
          sudo apt-get update
          sudo apt-get install -y luajit

      - name: Run mocked Lua runtime tests
        run: |
          set -euo pipefail
          luajit tools/analytics/test_gameplay_analytics_context.lua
          luajit tools/analytics/test_gameplay_analytics_batching.lua
          luajit tools/analytics/test_gameplay_analytics_reliability.lua
          luajit tools/analytics/test_gameplay_analytics_correctness.lua
          luajit tools/analytics/test_gameplay_analytics_correctness_edge_cases.lua
          luajit tools/analytics/test_gameplay_analytics_runtime_hooks.lua
          luajit tools/analytics/test_gameplay_analytics_schema.lua
          luajit tools/analytics/test_gameplay_analytics_supply_loot_prices.lua
          luajit tools/analytics/test_gameplay_analytics_supply_loot_integration.lua

      - name: Parse reporting assets
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          json.loads(Path("grafana/gameplay-analytics-dashboard.json").read_text(encoding="utf-8"))
          sql = Path("schema/gameplay_analytics_views.sql").read_text(encoding="utf-8")
          assert "CREATE OR REPLACE VIEW" in sql
          print("reporting assets parsed")
          PY
