name: Apply bank, Oasis, and wand fixes

on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches: [main]

permissions:
  contents: write

jobs:
  apply-patch:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.head_ref == 'fix/issues-3374-3453-3645'
    runs-on: ubuntu-latest
    steps:
      - name: Check out the PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Detect staged patch
        id: patch
        shell: bash
        run: |
          if [[ -f .github/automation/fix-3374-3453-3645.patch ]]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Apply reviewed patch
        if: steps.patch.outputs.present == 'true'
        shell: bash
        run: |
          git apply --check .github/automation/fix-3374-3453-3645.patch
          git apply .github/automation/fix-3374-3453-3645.patch
          rm .github/automation/fix-3374-3453-3645.patch
          git diff --check

      - name: Commit source changes
        if: steps.patch.outputs.present == 'true'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: address bank, Oasis, and wand issues"
          git push origin "HEAD:${{ github.head_ref }}"
