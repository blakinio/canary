name: Apply bank, Oasis, and wand fixes

on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches: [main]

permissions:
  contents: write

jobs:
  apply-patch:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.head_ref == 'fix/issues-3374-3453-3645'
    runs-on: ubuntu-latest
    steps:
      - name: Check out the PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Detect staged patch
        id: patch
        shell: bash
        run: |
          if [[ -f .github/automation/fix-3374-3453-3645.patch && ! -f .github/automation/fix-3374-3453-3645-error.txt ]]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate and apply reviewed patch
        if: steps.patch.outputs.present == 'true'
        id: apply
        shell: bash
        run: |
          patch_file=.github/automation/fix-3374-3453-3645.patch
          if [[ "$(tail -n 1 "$patch_file")" == "}" ]]; then
            sed -i '$s/^}/+}/' "$patch_file"
          fi

          set +e
          git apply --check --verbose "$patch_file" > .github/automation/fix-3374-3453-3645-error.txt 2>&1
          status=$?
          set -e
          if [[ $status -ne 0 ]]; then
            echo "applied=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          rm .github/automation/fix-3374-3453-3645-error.txt
          git apply "$patch_file"
          rm "$patch_file"
          git diff --check
          echo "applied=true" >> "$GITHUB_OUTPUT"

      - name: Commit source changes or diagnostic
        if: steps.patch.outputs.present == 'true'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if [[ "${{ steps.apply.outputs.applied }}" == "true" ]]; then
            git commit -m "fix: address bank, Oasis, and wand issues"
          else
            git commit -m "chore: record patch application diagnostic"
          fi
          git push origin "HEAD:${{ github.head_ref }}"
