name: Apply Wheel hardening patch

on:
  push:
    branches:
      - validation/wheel-of-destiny-hardening
    paths:
      - .github/workflows/apply-wheel-hardening-patch.yml

permissions:
  contents: write

jobs:
  apply-patch:
    runs-on: ubuntu-latest
    steps:
      - name: Check out validation branch
        uses: actions/checkout@v4
        with:
          ref: validation/wheel-of-destiny-hardening
          fetch-depth: 0

      - name: Reconstruct and verify patch
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          : > /tmp/wheel-hardening.patch.b64
          for blob in \
            7b31ed62d084b554df7abd33efbb198ee3a3b6f6 \
            35bb2a666cb259f29a8ed9b02fbc0498d52e8b39 \
            0030c12f0830923f5c34a3d121e36ebbe1dd0a7c \
            576bb7e8fd154230b35063dd5e6021fefcce9fd8 \
            451ac331c3c202c3d1eed9ea18cf627f3ea4a005 \
            3dd931d2643ea91cc58e6117835cce52888a621e
          do
            gh api "repos/${GITHUB_REPOSITORY}/git/blobs/${blob}" --jq .content \
              | tr -d '\n' \
              | base64 --decode >> /tmp/wheel-hardening.patch.b64
          done
          base64 --decode /tmp/wheel-hardening.patch.b64 > /tmp/wheel-hardening.patch
          echo "2411be961b3329324961d8d09c0f3373fb8cd705d2325d94c8a1ef7903e31ad4  /tmp/wheel-hardening.patch" | sha256sum --check --strict
          git apply --check /tmp/wheel-hardening.patch

      - name: Apply patch and remove temporary workflows
        run: |
          set -euo pipefail
          git apply /tmp/wheel-hardening.patch
          rm -f .github/workflows/apply-wheel-hardening-patch.yml
          rm -f .github/workflows/export-wheel-validation-source.yml
          git diff --check

      - name: Commit hardening changes
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix(wheel): harden allocation, persistence, and gems"
          git push origin HEAD:validation/wheel-of-destiny-hardening
