name: Apply Forge authority evidence patch

on:
  pull_request:
    branches:
      - fix/forge-server-authority
    paths:
      - docs/ai-agent/.forge-authority-docs-runner

permissions:
  contents: write

jobs:
  apply-evidence-patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout task branch
        uses: actions/checkout@v4
        with:
          ref: fix/forge-server-authority
          fetch-depth: 1
          show-progress: false

      - name: Apply exact evidence changes
        id: apply
        continue-on-error: true
        shell: bash
        run: |
          set +e
          python3 tools/ai-agent/apply_forge_authority_docs_patch.py > forge-authority-docs.log 2>&1
          status=$?
          cat forge-authority-docs.log
          exit $status

      - name: Upload evidence patch diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: forge-authority-docs-log
          path: forge-authority-docs.log
          if-no-files-found: error

      - name: Stop on evidence patch failure
        if: steps.apply.outcome != 'success'
        shell: bash
        run: exit 1

      - name: Review and commit evidence
        if: steps.apply.outcome == 'success'
        shell: bash
        run: |
          git diff --check
          git diff -- \
            docs/ai-agent/OTS_AI_EQUIPMENT_UPGRADE_VALIDATION.md \
            docs/agents/MODULE_CATALOG.md \
            docs/agents/CHANGELOG.md
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            docs/ai-agent/OTS_AI_EQUIPMENT_UPGRADE_VALIDATION.md \
            docs/agents/MODULE_CATALOG.md \
            docs/agents/CHANGELOG.md
          git commit -m "docs(forge): record server authority remediation evidence"
          git push origin HEAD:fix/forge-server-authority
