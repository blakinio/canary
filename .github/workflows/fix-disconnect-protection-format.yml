name: Fix disconnect protection formatting

on:
  push:
    branches:
      - feature/disconnect-protection
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/disconnect-protection
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python tools/fix_disconnect_protection_format.py
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/config/configmanager.cpp
          git commit -m "style: align disconnect protection config entries"
          git push origin HEAD:feature/disconnect-protection
