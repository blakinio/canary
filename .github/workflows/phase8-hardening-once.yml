name: Phase 8 publication hardening

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  harden:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 1
          show-progress: false
      - name: Apply exact fail-closed hardening
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          def replace_once(path: Path, old: str, new: str) -> None:
              text = path.read_text(encoding="utf-8")
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"{path}: replacement count {count}, expected 1 for {old[:100]!r}")
              path.write_text(text.replace(old, new, 1), encoding="utf-8")

          types = Path("tools/ai-agent/otbm_bounded_patch_types.py")
          replace_once(
              types,
              '''        sha256 = _text(value["sha256"], "source.sha256").lower()
              if len(sha256) != 64 or any(character not in "0123456789abcdef" for character in sha256):
                  raise BoundedPatchError("source.sha256 must be a lowercase SHA-256 hex digest")
          ''',
              '''        sha256 = _text(value["sha256"], "source.sha256")
              if len(sha256) != 64 or any(character not in "0123456789abcdef" for character in sha256):
                  raise BoundedPatchError("source.sha256 must be a lowercase SHA-256 hex digest")
          ''',
          )

          patcher = Path("tools/ai-agent/otbm_bounded_patch.py")
          replace_once(patcher, "from typing import Any, Iterable, Mapping, Sequence\n", "from typing import Any, Mapping, Sequence\n")
          replace_once(patcher, "MARKER_BYTES = {0xFD, 0xFE, 0xFF}\n", "")
          replace_once(
              patcher,
              '''def _write_json(path: Path, value: Mapping[str, Any]) -> None:
              encoded = (json.dumps(value, ensure_ascii=False, indent=2, sort_keys=True) + "\\n").encode("utf-8")
              descriptor, temporary_name = tempfile.mkstemp(prefix=f".{path.name}.", suffix=".tmp", dir=path.parent)
              temporary = Path(temporary_name)
              try:
                  with os.fdopen(descriptor, "wb") as stream:
                      stream.write(encoded)
                      stream.flush()
                      os.fsync(stream.fileno())
                  os.link(temporary, path)
                  temporary.unlink()
                  _fsync_directory(path.parent)
              except Exception:
                  temporary.unlink(missing_ok=True)
                  raise
          ''',
              '''def _write_json(path: Path, value: Mapping[str, Any]) -> None:
              encoded = (json.dumps(value, ensure_ascii=False, indent=2, sort_keys=True) + "\\n").encode("utf-8")
              descriptor, temporary_name = tempfile.mkstemp(prefix=f".{path.name}.", suffix=".tmp", dir=path.parent)
              temporary = Path(temporary_name)
              linked = False
              try:
                  with os.fdopen(descriptor, "wb") as stream:
                      stream.write(encoded)
                      stream.flush()
                      os.fsync(stream.fileno())
                  os.link(temporary, path)
                  linked = True
                  temporary.unlink()
                  _fsync_directory(path.parent)
              except Exception:
                  if linked:
                      path.unlink(missing_ok=True)
                  temporary.unlink(missing_ok=True)
                  raise


          def _publish_directory_no_overwrite(source: Path, destination: Path) -> None:
              destination.mkdir(mode=0o700)
              try:
                  for child in sorted(source.iterdir(), key=lambda candidate: candidate.name):
                      if child.is_symlink() or not child.is_file():
                          raise BoundedPatchError(f"evidence workspace contains a non-regular entry: {child}")
                      published = destination / child.name
                      os.link(child, published)
                      child.unlink()
                  source.rmdir()
                  _fsync_directory(destination)
                  _fsync_directory(destination.parent)
              except Exception:
                  shutil.rmtree(destination, ignore_errors=True)
                  raise
          ''',
          )
          replace_once(
              patcher,
              '''    published_output = False
              published_evidence = False
              try:
          ''',
              '''    published_output = False
              published_evidence = False
              published_result = False
              try:
          ''',
          )
          replace_once(
              patcher,
              '''        os.rename(workspace, evidence)
              published_evidence = True
              _fsync_directory(evidence.parent)
              _write_json(result_destination, result)
              return result
          ''',
              '''        _publish_directory_no_overwrite(workspace, evidence)
              published_evidence = True
              _write_json(result_destination, result)
              published_result = True
              return result
          ''',
          )
          replace_once(
              patcher,
              '''        if not result_destination.exists():
                  if published_output:
                      output.unlink(missing_ok=True)
                  if published_evidence:
                      shutil.rmtree(evidence, ignore_errors=True)
          ''',
              '''        if not published_result:
                  if published_output:
                      output.unlink(missing_ok=True)
                  if published_evidence:
                      shutil.rmtree(evidence, ignore_errors=True)
          ''',
          )

          test = Path("tools/ai-agent/test_otbm_bounded_patch.py")
          replace_once(
              test,
              "from unittest import mock\n\nfrom otbm_bounded_patch import apply_bounded_patch\n",
              "from unittest import mock\n\nimport otbm_bounded_patch\nfrom otbm_bounded_patch import apply_bounded_patch\n",
          )
          marker = '''    @unittest.skipUnless(hasattr(os, "symlink"), "symlinks are unavailable")
              def test_rejects_symlink_output(self) -> None:
          '''
          addition = '''    def test_result_publication_failure_removes_output_and_evidence(self) -> None:
              self.write_map()
              original = self.source.read_bytes()
              plan = self.make_plan([operation("action", "set-action-id", 0, 100, 1000, 1001)])
              original_write_json = otbm_bounded_patch._write_json

              def fail_result(path: Path, value: object) -> None:
                  if path.name == "result.json":
                      raise OSError("simulated result publication failure")
                  original_write_json(path, value)  # type: ignore[arg-type]

              with mock.patch("otbm_bounded_patch._write_json", side_effect=fail_result):
                  with self.assertRaisesRegex(OSError, "simulated result publication failure"):
                      self.apply(plan)
              self.assertEqual(self.source.read_bytes(), original)
              self.assertFalse((self.artifacts / "patched.otbm").exists())
              self.assertFalse((self.artifacts / "evidence").exists())
              self.assertFalse((self.artifacts / "result.json").exists())

          ''' + marker
          replace_once(test, marker, addition)

          Path(".github/workflows/phase8-hardening-once.yml").unlink()
          PY
      - name: Validate hardening
        shell: bash
        run: |
          set -euo pipefail
          python -m py_compile tools/ai-agent/otbm_bounded_patch_types.py tools/ai-agent/otbm_bounded_patch.py tools/ai-agent/test_otbm_bounded_patch.py
          python -m unittest discover -s tools/ai-agent -p "test_otbm_bounded_patch.py" -v
      - name: Commit hardened implementation
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "fix(ai-agent): harden bounded patch publication"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
