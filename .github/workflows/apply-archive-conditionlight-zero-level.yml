name: Apply ConditionLight archive update

on:
  push:
    branches:
      - docs/archive-conditionlight-zero-level
    paths:
      - .github/workflows/apply-archive-conditionlight-zero-level.yml

permissions:
  contents: write

concurrency:
  group: apply-archive-conditionlight-zero-level
  cancel-in-progress: false

jobs:
  apply:
    if: github.repository == 'blakinio/canary'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout cleanup branch
        uses: actions/checkout@v4
        with:
          ref: docs/archive-conditionlight-zero-level
          fetch-depth: 1
          show-progress: false

      - name: Apply, validate and commit bounded archive update
        shell: bash
        run: |
          set -euo pipefail
          python3 -m py_compile tools/ai-agent/apply_archive_conditionlight_zero_level.py
          python3 tools/ai-agent/apply_archive_conditionlight_zero_level.py
          git diff --check
          git add -A
          git diff --cached --check
          python3 - <<'PY'
          import subprocess

          expected = sorted([
              '.github/workflows/apply-archive-conditionlight-zero-level.yml',
              'docs/agents/programs/CRYSTALSERVER_COMPARISON_PROGRAM.md',
              'tools/ai-agent/apply_archive_conditionlight_zero_level.py',
          ])
          actual = sorted(subprocess.check_output(
              ['git', 'diff', '--cached', '--name-only'], text=True
          ).splitlines())
          if actual != expected:
              raise SystemExit(f'unexpected changed files: {actual!r}')
          PY
          test ! -e .github/workflows/apply-archive-conditionlight-zero-level.yml
          test ! -e tools/ai-agent/apply_archive_conditionlight_zero_level.py
          test -e docs/agents/tasks/archive/CAN-20260713-conditionlight-zero-level.md
          test ! -e docs/agents/tasks/active/CAN-20260713-conditionlight-zero-level.md
          grep -Fq 'None. Select exactly one bounded queue item' docs/agents/programs/CRYSTALSERVER_COMPARISON_PROGRAM.md
          grep -Fq 'b06079f9bc75f0c108720e2674438a2f539c8631' docs/agents/programs/CRYSTALSERVER_COMPARISON_PROGRAM.md
          git status --short
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'docs(agents): complete ConditionLight program handoff'
          git push origin HEAD:docs/archive-conditionlight-zero-level
