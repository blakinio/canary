---
name: Finalize Wheel validation handoff

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/finalize-wheel-handoff.yml

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out handoff branch
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          ref: docs/wheel-validation-handoff-stage
          fetch-depth: 0

      - name: Update merged PR and integration metadata
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          path = Path("docs/ai-agent/OTS_AI_WHEEL_OF_DESTINY_VALIDATION.md")
          text = path.read_text(encoding="utf-8")

          old_branch = "> **Working branch:** `validation/wheel-of-destiny-review-v3`"
          new_integration = "> **Integrated via:** PR #220 into `main` (`35ff51ac022e36d215db9d0fa86053b326a0bdf0`)"

          if old_branch not in text:
              raise SystemExit("expected Working branch marker not found")

          text = text.replace(old_branch, new_integration, 1)
          text = text.replace("PR #216", "PR #220")

          if "PR #216" in text:
              raise SystemExit("stale PR #216 reference remains")
          if old_branch in text:
              raise SystemExit("stale working branch marker remains")

          path.write_text(text, encoding="utf-8")
          PY

          rm -f .github/workflows/finalize-wheel-handoff.yml
          git diff --check

      - name: Commit final handoff metadata
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "docs(ai-agent): finalize Wheel validation handoff"
          git push origin HEAD:docs/wheel-validation-handoff-stage
