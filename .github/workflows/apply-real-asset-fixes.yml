name: Apply Real Asset Fixes

on:
  push:
    branches:
      - fix/otbm-real-client-assets
    paths:
      - .github/workflows/apply-real-asset-fixes.yml
      - .github/real-asset-fix/apply.py

permissions:
  contents: write

jobs:
  apply-test-commit:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout fix branch
        uses: actions/checkout@v4
        with:
          ref: fix/otbm-real-client-assets
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Apply exact fixes
        run: python .github/real-asset-fix/apply.py

      - name: Validate schemas
        run: |
          python -m json.tool docs/ai-agent/OTBM_SPRITE_SHEET_REPORT.schema.json > /dev/null
          python -m json.tool docs/ai-agent/OTBM_RENDER_REPORT.schema.json > /dev/null

      - name: Run focused real asset tests
        run: python -m unittest tools/ai-agent/test_otbm_sprites.py tools/ai-agent/test_otbm_renderer.py -v

      - name: Run all OTBM tests
        run: python -m unittest discover -s tools/ai-agent -p "test_otbm_*.py" -v

      - name: Remove one-shot automation
        run: git rm .github/workflows/apply-real-asset-fixes.yml .github/real-asset-fix/apply.py

      - name: Commit tested fixes
        run: |
          git diff --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tools/ai-agent docs/ai-agent
          git commit -m "fix(ai-agent): support real CIP headers and reduced render assets"
          git push origin HEAD:fix/otbm-real-client-assets
