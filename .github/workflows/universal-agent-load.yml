---
name: Universal Agent Load

on:
  workflow_dispatch:
    inputs:
      profile:
        description: Load profile under tests/e2e/load
        required: true
        default: status-smoke
        type: choice
        options:
          - status-smoke
          - status-load
          - status-stress
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/universal-agent-load.yml"
      - ".github/workflows/reusable-build-linux.yml"
      - ".github/scripts/smoke_test_canary.py"
      - "tools/agents/ci_incremental_validation.py"
      - "tools/e2e/run_agent_load.py"
      - "tools/e2e/run_agent_load_runtime.py"
      - "tests/e2e/load/**"
      - "tests/e2e/test_load_runner.py"
      - "src/server/network/protocol/protocolstatus.cpp"

permissions:
  contents: write
  packages: write
  actions: read

concurrency:
  group: universal-agent-load-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  scope:
    name: Decide load validation scope
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      actions: read
      contents: read
    outputs:
      reuse_parent: ${{ steps.incremental.outputs.reuse_parent || 'false' }}
      run_heavy: ${{ steps.incremental.outputs.run_heavy || 'true' }}
      reason: ${{ steps.incremental.outputs.reason }}
    steps:
      - name: Checkout exact test head
        uses: actions/checkout@v6
        with:
          fetch-depth: 2
          persist-credentials: false
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
      - name: Evaluate immediate-parent load reuse
        id: incremental
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: >-
          python tools/agents/ci_incremental_validation.py
          --profile universal-load
          --workflow-name "Universal Agent Load"
          --event-name "${{ github.event_name }}"
          --event-action "${{ github.event.action }}"
      - name: Summarize validation decision
        run: |
          echo "reuse_parent=${{ steps.incremental.outputs.reuse_parent || 'false' }}"
          echo "run_heavy=${{ steps.incremental.outputs.run_heavy || 'true' }}"
          echo "reason=${{ steps.incremental.outputs.reason }}"

  validate:
    name: Validate load platform
    needs: [scope]
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Checkout exact test head
        uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile and test load runner
        run: |
          set -euo pipefail
          python -m py_compile \
            tools/e2e/run_agent_load.py \
            tools/e2e/run_agent_load_runtime.py \
            tests/e2e/test_load_runner.py
          python tests/e2e/test_load_runner.py -v

  build-canary:
    name: Build exact Canary head
    needs: [scope, validate]
    if: needs.scope.outputs.run_heavy == 'true' && needs.validate.result == 'success'
    permissions:
      contents: write
      packages: write
    uses: ./.github/workflows/reusable-build-linux.yml
    with:
      buildtypes: '["linux-release"]'
      run_canary_smoke: false
      run_global_smoke: false

  load:
    name: Load / ${{ inputs.profile || 'status-smoke' }}
    needs: [scope, validate, build-canary]
    if: needs.scope.outputs.run_heavy == 'true' && needs.validate.result == 'success' && needs.build-canary.result == 'success'
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read
      actions: read
    env:
      PROFILE: ${{ inputs.profile || 'status-smoke' }}
      ARTIFACT_DIR: ${{ github.workspace }}/artifacts/agent-load
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: "${{ github.run_id }}"
          MYSQL_DATABASE: canary_agent_load
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -p${{ github.run_id }}"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=18
    steps:
      - name: Checkout exact test head
        uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Download exact-head Canary binary
        uses: actions/download-artifact@v4
        with:
          name: canary-linux-release
          path: canary-bin
      - name: Install runtime dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y mysql-client
      - name: Resolve exact Canary executable
        run: |
          set -euo pipefail
          CANARY_PATH="$(find canary-bin -type f -name canary -perm -111 | head -n 1)"
          if [[ -z "${CANARY_PATH}" ]]; then
            CANARY_PATH="$(find canary-bin -type f -name canary | head -n 1)"
          fi
          test -n "${CANARY_PATH}"
          chmod +x "${CANARY_PATH}"
          echo "CANARY_BIN=${GITHUB_WORKSPACE}/${CANARY_PATH}" >> "${GITHUB_ENV}"
          sha256sum "${CANARY_PATH}" | tee "${GITHUB_WORKSPACE}/canary.sha256"
      - name: Run exact-head loopback load profile
        run: |
          set -euo pipefail
          mkdir -p "${ARTIFACT_DIR}"
          python tools/e2e/run_agent_load_runtime.py \
            --binary-path "${CANARY_BIN}" \
            --profile "tests/e2e/load/${PROFILE}.json" \
            --artifact-dir "${ARTIFACT_DIR}" \
            --data-pack data-canary \
            --map-name canary \
            --db-host 127.0.0.1 \
            --db-port 3306 \
            --db-user root \
            --db-password "${{ github.run_id }}" \
            --db-name canary_agent_load \
            --login-port 7471 \
            --game-port 7472 \
            --status-port 7473
          cp "${GITHUB_WORKSPACE}/canary.sha256" "${ARTIFACT_DIR}/canary.sha256"
      - name: Upload load evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: universal-agent-load-${{ inputs.profile || 'status-smoke' }}
          path: artifacts/agent-load/
          if-no-files-found: warn
          retention-days: 14

  required:
    name: Required load validation
    if: always()
    needs: [scope, validate, build-canary, load]
    runs-on: ubuntu-24.04
    permissions: {}
    steps:
      - name: Evaluate load evidence
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import os

          jobs = json.loads(os.environ["NEEDS_JSON"])
          scope = jobs["scope"]
          if scope.get("result") != "success":
              raise SystemExit(f"scope must succeed, got {scope.get('result')}")
          if jobs["validate"].get("result") != "success":
              raise SystemExit(f"validate must succeed, got {jobs['validate'].get('result')}")

          outputs = scope.get("outputs", {})
          run_heavy = outputs.get("run_heavy") == "true"
          reuse_parent = outputs.get("reuse_parent") == "true"
          heavy_jobs = ("build-canary", "load")

          if run_heavy:
              failed = {
                  name: jobs[name].get("result")
                  for name in heavy_jobs
                  if jobs[name].get("result") != "success"
              }
              if failed:
                  raise SystemExit(f"required load jobs did not pass: {failed}")
          else:
              if not reuse_parent:
                  raise SystemExit("heavy load skip requires proven immediate-parent reuse")
              unexpected = {
                  name: jobs[name].get("result")
                  for name in heavy_jobs
                  if jobs[name].get("result") != "skipped"
              }
              if unexpected:
                  raise SystemExit(f"reused load jobs must be skipped: {unexpected}")

          print(
              "load gate passed: "
              f"run_heavy={run_heavy} reuse_parent={reuse_parent}"
          )
          PY
