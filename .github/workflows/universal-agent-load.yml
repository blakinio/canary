---
name: Universal Agent Load

on:
  workflow_dispatch:
    inputs:
      profile:
        description: Load profile under tests/e2e/load
        required: true
        default: status-smoke
        type: choice
        options:
          - status-smoke
          - status-load
          - status-stress
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/universal-agent-load.yml"
      - "tools/e2e/run_agent_load.py"
      - "tools/e2e/run_agent_load_runtime.py"
      - "tests/e2e/load/**"
      - "tests/e2e/test_load_runner.py"

permissions:
  contents: write
  packages: write

concurrency:
  group: universal-agent-load-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate load platform
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Checkout exact test head
        uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile and test load runner
        run: |
          set -euo pipefail
          python -m py_compile \
            tools/e2e/run_agent_load.py \
            tools/e2e/run_agent_load_runtime.py
          python tests/e2e/test_load_runner.py

  build-canary:
    name: Build exact Canary head
    needs: [validate]
    permissions:
      contents: write
      packages: write
    uses: ./.github/workflows/reusable-build-linux.yml
    with:
      buildtypes: '["linux-release"]'
      run_canary_smoke: false
      run_global_smoke: false

  load:
    name: Load / ${{ inputs.profile || 'status-smoke' }}
    needs: [validate, build-canary]
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read
      actions: read
    env:
      LOAD_PROFILE: ${{ inputs.profile || 'status-smoke' }}
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: canary_agent_load
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping -h 127.0.0.1 -proot" --health-interval=10s --health-timeout=5s --health-retries=18
    steps:
      - name: Checkout exact test head
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Download exact-head Canary binary
        uses: actions/download-artifact@v4
        with:
          name: canary-linux-release
          path: canary-bin

      - name: Install runtime dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y mysql-client

      - name: Resolve exact Canary executable
        run: |
          set -euo pipefail
          mkdir -p artifacts/universal-agent-load
          CANARY_PATH="$(find canary-bin -type f -name 'canary' | head -n 1)"
          test -n "${CANARY_PATH}"
          chmod +x "${CANARY_PATH}"
          test -x "${CANARY_PATH}"
          echo "CANARY_BIN=${GITHUB_WORKSPACE}/${CANARY_PATH}" >> "${GITHUB_ENV}"
          sha256sum "${CANARY_PATH}" | tee artifacts/universal-agent-load/canary.sha256
          git rev-parse HEAD | tee artifacts/universal-agent-load/canary-source-commit.txt

      - name: Run exact-head loopback load profile
        run: |
          set -euo pipefail
          python tools/e2e/run_agent_load_runtime.py \
            --binary-path "${CANARY_BIN}" \
            --profile "tests/e2e/load/${LOAD_PROFILE}.json" \
            --output-dir artifacts/universal-agent-load \
            --data-pack data-canary \
            --map-name canary \
            --db-host 127.0.0.1 \
            --db-port 3306 \
            --db-user root \
            --db-password root \
            --db-name canary_agent_load \
            --login-port 7471 \
            --game-port 7472 \
            --status-port 7473 \
            --startup-timeout-seconds 300

      - name: Upload load evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: universal-agent-load-${{ inputs.profile || 'status-smoke' }}
          path: artifacts/universal-agent-load/
          if-no-files-found: error
          retention-days: 14
