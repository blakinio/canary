name: Add FileSystem Lua API docs

on:
  pull_request:
    branches: [main]
    types: [synchronize]

permissions:
  contents: write

jobs:
  update:
    if: github.repository == 'blakinio/canary' && github.event.pull_request.head.repo.full_name == 'blakinio/canary' && github.head_ref == 'security/fs-mkdir-shell-free'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: security/fs-mkdir-shell-free
          fetch-depth: 0
          persist-credentials: true
      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - name: Add deterministic FileSystem entries
        run: |
          python3 - <<'PY'
          from collections import OrderedDict
          from pathlib import Path
          import json

          path = Path("docs/lua-api/lua_api.json")
          data = json.loads(path.read_text(encoding="utf-8"), object_pairs_hook=OrderedDict)
          classes = data["classes"]
          if "FileSystem" in classes:
              raise SystemExit("FileSystem already exists in Lua API catalogue")
          classes["FileSystem"] = [
              {
                  "name": "createDirectories",
                  "params": ["path: string"],
                  "return": "boolean, string?",
                  "source": "src/lua/functions/core/game/global_functions.cpp",
              },
              {
                  "name": "createDirectory",
                  "params": ["path: string"],
                  "return": "boolean, string?",
                  "source": "src/lua/functions/core/game/global_functions.cpp",
              },
          ]
          data["classes"] = OrderedDict(sorted(classes.items()))
          path.write_text(json.dumps(data, indent=2, ensure_ascii=False) + "\n", encoding="utf-8")
          PY
          python3 tools/check_lua_api_quality.py
          python3 tools/check_lua_api_binding_docs.py --base origin/main
          git diff --check
      - name: Remove workflow and enforce exact diff
        run: |
          rm -f .github/workflows/add-filesystem-lua-api-docs.yml
          git add -A
          mapfile -t changed < <(git diff --cached --name-only)
          printf '%s\n' "${changed[@]}"
          allowed='^(docs/lua-api/lua_api\.json|\.github/workflows/add-filesystem-lua-api-docs\.yml)$'
          for item in "${changed[@]}"; do
            [[ "$item" =~ $allowed ]] || { echo "Unexpected path: $item" >&2; exit 1; }
          done
          test ! -e .github/workflows/add-filesystem-lua-api-docs.yml
          git diff --cached --check
      - name: Commit Lua API catalogue
        run: |
          git commit -m "docs(lua): catalogue FileSystem directory methods"
          git push origin HEAD:security/fs-mkdir-shell-free
