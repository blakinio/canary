name: Apply issue 3986 fix

on:
  push:
    branches:
      - fix/issue-3986-paralyze-spell-casting
    paths:
      - .github/workflows/apply-issue-3986-fix.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/issue-3986-paralyze-spell-casting
          fetch-depth: 0
      - name: Remove walk exhaustion gate from spell casting
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('src/game/game.cpp')
          text = path.read_text()
          old = '''bool Game::playerSaySpell(const std::shared_ptr<Player> &player, SpeakClasses type, const std::string &text) {
          \tif (player->walkExhausted()) {
          \t\treturn true;
          \t}

          \tstd::string words = text;'''
          new = '''bool Game::playerSaySpell(const std::shared_ptr<Player> &player, SpeakClasses type, const std::string &text) {
          \tstd::string words = text;'''
          if text.count(old) != 1:
              raise SystemExit(f'expected exactly one target block, found {text.count(old)}')
          path.write_text(text.replace(old, new, 1))
          PY
      - name: Remove one-time workflow
        run: rm .github/workflows/apply-issue-3986-fix.yml
      - name: Commit fix
        run: |
          git config user.name "Canary Auto-Fix"
          git config user.email "actions@users.noreply.github.com"
          git add src/game/game.cpp .github/workflows/apply-issue-3986-fix.yml
          git commit -m "fix: allow spell casting while paralyzed"
          git push origin HEAD:fix/issue-3986-paralyze-spell-casting
