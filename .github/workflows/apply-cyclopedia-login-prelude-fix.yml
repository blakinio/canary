---
name: Apply Cyclopedia Login Prelude Fix

on:
  push:
    branches:
      - test/cyclopedia-live-e2e
    paths:
      - "tools/e2e/apply_cyclopedia_login_prelude_fix.py"
      - ".github/workflows/apply-cyclopedia-login-prelude-fix.yml"

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout test branch
        uses: actions/checkout@v6
        with:
          ref: test/cyclopedia-live-e2e
          fetch-depth: 0

      - name: Apply exact source and test replacements
        run: python3 tools/e2e/apply_cyclopedia_login_prelude_fix.py

      - name: Run focused Cyclopedia contracts
        run: |
          python3 -m unittest tools.ai-agent.test_cyclopedia_runtime_fix_contracts -v
          python3 -m py_compile tools/e2e/apply_cyclopedia_login_prelude_fix.py tools/ai-agent/test_cyclopedia_runtime_fix_contracts.py

      - name: Commit reviewed correction
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add src/server/network/protocol/protocol_profile.cpp tools/ai-agent/test_cyclopedia_runtime_fix_contracts.py
          git diff --cached --exit-code && { echo 'Expected login prelude correction was not produced.'; exit 1; }
          git commit -m 'fix(protocol): align current account login prelude with OTClient'
          git push origin HEAD:test/cyclopedia-live-e2e
