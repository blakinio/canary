name: Apply clean Forge Premium Dust patch

on:
  pull_request:
    branches:
      - fix/forge-premium-dust
    paths:
      - docs/ai-agent/.apply-forge-premium-dust

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout target branch
        uses: actions/checkout@v4
        with:
          ref: fix/forge-premium-dust
          fetch-depth: 1
          show-progress: false

      - name: Apply bounded patch
        run: python3 tools/ai-agent/apply_forge_premium_dust.py

      - name: Validate and commit
        shell: bash
        run: |
          git diff --check
          python3 -m json.tool docs/lua-api/lua_api.json >/dev/null
          lua tests/lua/test_exaltation_forge_premium.lua
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            data/libs/systems/exaltation_forge.lua \
            src/lua/functions/creatures/player/player_functions.cpp \
            src/lua/functions/creatures/player/player_functions.hpp \
            docs/lua-api/lua_api.json \
            tests/lua/test_exaltation_forge_premium.lua \
            docs/agents/tasks/active/CAN-20260713-forge-premium-dust.md
          git commit -m "fix(forge): require Premium status for Dust rewards"
          git push origin HEAD:fix/forge-premium-dust
