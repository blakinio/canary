---
name: Account Quests Generated Docs Bootstrap

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: account-quests-generated-docs-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/account-quests-production-hardening
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Patch generated Lua API files
        run: |
          python - <<'PY'
          from pathlib import Path

          d_lua = Path("docs/lua-api/lua_api.d.lua")
          d_text = d_lua.read_text(encoding="utf-8")
          old_d = '''---@param query string
          ---@return boolean
          function db.query(query) end

          ---@param query string
          ---@return boolean|number
          function db.storeQuery(query) end'''.replace("          ", "")
          new_d = '''---@param query string
          ---@return boolean
          function db.query(query) end

          ---@param query string
          ---@return number|false
          function db.queryAffectedRows(query) end

          ---@param query string
          ---@return boolean|number
          function db.storeQuery(query) end'''.replace("          ", "")
          if old_d not in d_text:
              raise SystemExit("lua_api.d.lua marker not found")
          d_lua.write_text(d_text.replace(old_d, new_d, 1), encoding="utf-8")

          md = Path("docs/lua-api/lua_api.md")
          md_text = md.read_text(encoding="utf-8")
          old_md = '''#### `db.query(query: string)`

          - Returns: `boolean`
          - Source: `src/lua/functions/core/libs/db_functions.cpp`

          #### `db.storeQuery(query: string)`'''.replace("          ", "")
          new_md = '''#### `db.query(query: string)`

          - Returns: `boolean`
          - Source: `src/lua/functions/core/libs/db_functions.cpp`

          #### `db.queryAffectedRows(query: string)`

          - Returns: `number|false`
          - Source: `src/lua/functions/core/libs/db_functions.cpp`

          #### `db.storeQuery(query: string)`'''.replace("          ", "")
          if old_md not in md_text:
              raise SystemExit("lua_api.md marker not found")
          md.write_text(md_text.replace(old_md, new_md, 1), encoding="utf-8")
          PY
      - name: Create generated documentation commit object
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPOSITORY: ${{ github.repository }}
        run: |
          python - <<'PY'
          import base64
          import json
          import os
          import subprocess
          import urllib.request

          repository = os.environ["GH_REPOSITORY"]
          token = os.environ["GH_TOKEN"]
          parent = subprocess.check_output(["git", "rev-parse", "HEAD"], text=True).strip()

          def api(method, path, payload=None):
              data = None if payload is None else json.dumps(payload).encode()
              request = urllib.request.Request(
                  f"https://api.github.com/repos/{repository}{path}",
                  data=data,
                  method=method,
                  headers={
                      "Authorization": f"Bearer {token}",
                      "Accept": "application/vnd.github+json",
                      "X-GitHub-Api-Version": "2022-11-28",
                      "Content-Type": "application/json",
                  },
              )
              with urllib.request.urlopen(request) as response:
                  return json.load(response)

          parent_commit = api("GET", f"/git/commits/{parent}")
          entries = []
          for path in ("docs/lua-api/lua_api.d.lua", "docs/lua-api/lua_api.md"):
              content = open(path, "rb").read()
              blob = api("POST", "/git/blobs", {
                  "content": base64.b64encode(content).decode(),
                  "encoding": "base64",
              })
              entries.append({"path": path, "mode": "100644", "type": "blob", "sha": blob["sha"]})
          tree = api("POST", "/git/trees", {
              "base_tree": parent_commit["tree"]["sha"],
              "tree": entries,
          })
          commit = api("POST", "/git/commits", {
              "message": "docs(lua-api): refresh db.queryAffectedRows outputs",
              "tree": tree["sha"],
              "parents": [parent],
          })
          with open("/tmp/account-quests-generated-docs-commit.txt", "w", encoding="utf-8") as output:
              output.write(commit["sha"] + "\n")
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: account-quests-generated-docs-commit
          path: /tmp/account-quests-generated-docs-commit.txt
          if-no-files-found: error
