name: Inspect FS mkdir integration points

on:
  pull_request:
    branches: [main]
    types: [synchronize]

permissions:
  contents: read

jobs:
  inspect:
    if: github.repository == 'blakinio/canary' && github.head_ref == 'security/fs-mkdir-shell-free'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: security/fs-mkdir-shell-free
          fetch-depth: 0
          persist-credentials: false
      - name: Name validation symbols
        run: |
          git grep -n -I -E 'isValid(Name|PlayerName)|valid(Name|PlayerName)|name.*(regex|pattern|character)|player.*name.*(valid|invalid)|ACCOUNT_TYPE|NAMELENGTH|MAX_NAME' -- src data tests config.lua.dist || true
      - name: Lua core library registrations
        run: |
          git grep -n -I -E 'register(Table|Method|GlobalMethod|GlobalVariable)|CoreLibsFunctions|create_director(y|ies)|std::filesystem' -- src/lua src/CMakeLists.txt CMakeLists.txt vcproj tests || true
      - name: Lua test harness and filesystem tests
        run: |
          git grep -n -I -E 'fs\.lua|FS\.mkdir|dofile\(|loadfile\(|CORE_DIRECTORY|os\.execute|io\.open' -- tests/lua .github/workflows/reusable-tests-lua.yml || true
      - name: Build registration anchors
        run: |
          git grep -n -I -E 'logger_functions|metrics_functions|kv_functions|core/libs|GLOB_RECURSE|target_sources' -- CMakeLists.txt src cmake vcproj tests || true
