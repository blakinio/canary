name: Apply Forge transaction-safety corrections

on:
  pull_request:
    branches:
      - fix/forge-transaction-safety
    paths:
      - docs/ai-agent/.forge-transaction-safety-runner

permissions:
  contents: write

jobs:
  apply-transaction-corrections:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout task branch
        uses: actions/checkout@v4
        with:
          ref: fix/forge-transaction-safety
          fetch-depth: 1
          show-progress: false

      - name: Apply exact transaction corrections
        shell: bash
        run: python3 tools/ai-agent/apply_forge_transaction_safety_corrections.py

      - name: Check correction diff
        id: diffcheck
        continue-on-error: true
        shell: bash
        run: |
          set +e
          git diff --check > forge-transaction-diff-check.log 2>&1
          status=$?
          cat forge-transaction-diff-check.log
          exit $status

      - name: Upload correction diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: forge-transaction-diff-check
          path: forge-transaction-diff-check.log
          if-no-files-found: error

      - name: Stop on diff failure
        if: steps.diffcheck.outcome != 'success'
        run: exit 1

      - name: Review and commit bounded corrections
        if: steps.diffcheck.outcome == 'success'
        shell: bash
        run: |
          git diff -- \
            src/creatures/players/player.cpp \
            tests/integration/game/forge_it.cpp
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            src/creatures/players/player.cpp \
            tests/integration/game/forge_it.cpp
          git commit -m "fix(forge): harden transaction preflight and rollback tests"
          git push origin HEAD:fix/forge-transaction-safety
