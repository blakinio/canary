---
name: Apply Vibrancy Patch

on:
  pull_request:
    paths:
      - ".github/workflows/imbuement-source-export.yml"

permissions:
  contents: write

jobs:
  apply:
    name: Apply deterministic patch
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout task branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 1
          show-progress: false
      - name: Apply and push implementation
        env:
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        shell: bash
        run: |
          set -euo pipefail
          git apply --verbose -p1 --check .github/imbuement-vibrancy.patch
          git apply --verbose -p1 .github/imbuement-vibrancy.patch
          git diff --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/XML/imbuements.xml \
            tools/ai-agent/imbuement_validation.py \
            tools/ai-agent/test_imbuement_validation.py \
            docs/ai-agent/IMBUEMENT_VALIDATION_REPORT.md \
            docs/ai-agent/IMBUEMENT_RUNTIME_TEST_PLAN.json
          git commit -m "fix(imbuement): map Vibrancy scrolls"
          git push origin "HEAD:${HEAD_REF}"
