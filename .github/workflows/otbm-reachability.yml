name: OTBM Reachability

on:
  push:
    branches:
      - main
      - "feat/**"
      - "fix/**"
      - "ai/**"
    paths:
      - "tools/ai-agent/otbm_reachability*.py"
      - "tools/ai-agent/test_otbm_reachability.py"
      - "tools/ai-agent/otbm_world_index.py"
      - "tools/ai-agent/otbm_item_audit_scan.cpp"
      - "tools/ai-agent/otbm_appearances.py"
      - "tools/ai-agent/otbm_script_resolution.py"
      - "docs/ai-agent/OTBM_REACHABILITY.schema.json"
      - "docs/ai-agent/OTBM_TRANSITIONS.schema.json"
      - ".github/workflows/otbm-reachability.yml"
  pull_request:
    paths:
      - "tools/ai-agent/otbm_reachability*.py"
      - "tools/ai-agent/test_otbm_reachability.py"
      - "tools/ai-agent/otbm_world_index.py"
      - "tools/ai-agent/otbm_item_audit_scan.cpp"
      - "tools/ai-agent/otbm_appearances.py"
      - "tools/ai-agent/otbm_script_resolution.py"
      - "docs/ai-agent/OTBM_REACHABILITY.schema.json"
      - "docs/ai-agent/OTBM_TRANSITIONS.schema.json"
      - ".github/workflows/otbm-reachability.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate bounded teleport and reachability evidence
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compile native OTBM scanner with warnings as errors
        run: |
          c++ -O2 -std=c++20 -Wall -Wextra -Wpedantic -Werror \
            tools/ai-agent/otbm_item_audit_scan.cpp \
            -o /tmp/otbm_item_audit_scan

      - name: Run focused reachability tests including real World Index integration
        env:
          OTBM_WORLD_INDEX_SCANNER: /tmp/otbm_item_audit_scan
        run: |
          PYTHONPATH=tools/ai-agent \
            python -m unittest -v tools/ai-agent/test_otbm_reachability.py

      - name: Compile Python modules
        run: |
          python -m py_compile \
            tools/ai-agent/otbm_reachability*.py \
            tools/ai-agent/test_otbm_reachability.py

      - name: Validate JSON schema syntax
        run: |
          python -m json.tool docs/ai-agent/OTBM_REACHABILITY.schema.json > /dev/null
          python -m json.tool docs/ai-agent/OTBM_TRANSITIONS.schema.json > /dev/null

      - name: Assemble local reachability toolkit
        run: |
          mkdir -p artifacts/toolkit
          cp /tmp/otbm_item_audit_scan artifacts/toolkit/
          cp tools/ai-agent/otbm_reachability*.py artifacts/toolkit/
          cp tools/ai-agent/otbm_world_index.py artifacts/toolkit/
          cp tools/ai-agent/otbm_world_index_tool.py artifacts/toolkit/
          cp tools/ai-agent/otbm_appearances.py artifacts/toolkit/
          cp tools/ai-agent/otbm_script_resolution.py artifacts/toolkit/
          cp docs/ai-agent/OTBM_REACHABILITY.schema.json artifacts/toolkit/
          cp docs/ai-agent/OTBM_TRANSITIONS.schema.json artifacts/toolkit/
          cp docs/ai-agent/OTBM_REACHABILITY.md artifacts/toolkit/

      - name: Upload local reachability toolkit
        uses: actions/upload-artifact@v4
        with:
          name: otbm-reachability-local-toolkit
          path: artifacts/toolkit
          if-no-files-found: error
          retention-days: 14
