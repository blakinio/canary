name: Apply bounded Forge server authority patch

on:
  pull_request:
    branches:
      - fix/forge-server-authority
    paths:
      - docs/ai-agent/.forge-server-authority-runner

permissions:
  contents: write

jobs:
  apply-authority-patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout task branch
        uses: actions/checkout@v4
        with:
          ref: fix/forge-server-authority
          fetch-depth: 1
          show-progress: false

      - name: Apply exact Forge authority changes
        id: apply
        continue-on-error: true
        shell: bash
        run: |
          set +e
          python3 tools/ai-agent/apply_forge_server_authority_patch.py > forge-authority-patch.log 2>&1
          status=$?
          cat forge-authority-patch.log
          exit $status

      - name: Upload patch diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: forge-authority-patch-log
          path: forge-authority-patch.log
          if-no-files-found: error

      - name: Stop on patch failure
        if: steps.apply.outcome != 'success'
        shell: bash
        run: exit 1

      - name: Review and commit bounded patch
        if: steps.apply.outcome == 'success'
        shell: bash
        run: |
          git diff --check
          git diff -- \
            src/creatures/players/player.cpp \
            src/game/functions/forge_fusion_policy.hpp \
            src/game/functions/forge_transfer_policy.hpp \
            tests/unit/players/forge_test.cpp \
            tests/integration/game/forge_it.cpp
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            src/creatures/players/player.cpp \
            src/game/functions/forge_fusion_policy.hpp \
            src/game/functions/forge_transfer_policy.hpp \
            tests/unit/players/forge_test.cpp \
            tests/integration/game/forge_it.cpp
          if git diff --cached --quiet; then
            echo "No source changes to commit."
            exit 0
          fi
          git commit -m "fix(forge): reject invalid fusion and convergence requests"
          git push origin HEAD:fix/forge-server-authority
