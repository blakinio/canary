name: Apply bounded Forge server authority patch

on:
  push:
    branches:
      - fix/forge-server-authority
    paths:
      - .github/workflows/forge-server-authority-patch.yml

permissions:
  contents: write

jobs:
  apply-authority-patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout task branch
        uses: actions/checkout@v4
        with:
          ref: fix/forge-server-authority
          fetch-depth: 0

      - name: Apply exact Forge authority changes
        shell: bash
        run: python3 tools/ai-agent/apply_forge_server_authority_patch.py

      - name: Review and commit bounded patch
        shell: bash
        run: |
          git diff --check
          git diff -- \
            src/creatures/players/player.cpp \
            src/game/functions/forge_fusion_policy.hpp \
            src/game/functions/forge_transfer_policy.hpp \
            tests/unit/players/forge_test.cpp \
            tests/integration/game/forge_it.cpp
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            src/creatures/players/player.cpp \
            src/game/functions/forge_fusion_policy.hpp \
            src/game/functions/forge_transfer_policy.hpp \
            tests/unit/players/forge_test.cpp \
            tests/integration/game/forge_it.cpp
          if git diff --cached --quiet; then
            echo "No source changes to commit."
            exit 0
          fi
          git commit -m "fix(forge): reject invalid fusion and convergence requests"
          git push origin HEAD:fix/forge-server-authority
