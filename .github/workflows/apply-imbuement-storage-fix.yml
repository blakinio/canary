---
name: Apply Imbuement Storage Fix

on:
  push:
    branches:
      - fix/imbuement-forgotten-knowledge-storages
    paths:
      - ".github/workflows/apply-imbuement-storage-fix.yml"

permissions:
  contents: write

jobs:
  apply:
    name: Apply verified storage replacements
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: fix/imbuement-forgotten-knowledge-storages

      - name: Replace only the confirmed storage IDs
        shell: python
        run: |
          from pathlib import Path
          import xml.etree.ElementTree as ET

          path = Path("data/XML/imbuements.xml")
          text = path.read_text(encoding="utf-8")
          replacements = {
              'storage="50488"': ('storage="45489"', 3),
              'storage="50490"': ('storage="45490"', 3),
              'storage="50492"': ('storage="45491"', 6),
              'storage="50494"': ('storage="45492"', 3),
              'storage="50496"': ('storage="45493"', 3),
              'storage="50498"': ('storage="45494"', 2),
              'storage="50501"': ('storage="45495"', 2),
          }
          for old, (new, expected_count) in replacements.items():
              actual_count = text.count(old)
              if actual_count != expected_count:
                  raise SystemExit(
                      f"refusing replacement: {old} count={actual_count}, expected={expected_count}"
                  )
              text = text.replace(old, new)

          if sum(text.count(new) for new, _ in replacements.values()) != 22:
              raise SystemExit("confirmed replacement total is not 22")
          for old in replacements:
              if old in text:
                  raise SystemExit(f"legacy token remains: {old}")

          ET.fromstring(text)
          path.write_text(text, encoding="utf-8")

      - name: Verify diff boundary
        shell: bash
        run: |
          git diff --check
          test "$(git diff --name-only)" = "data/XML/imbuements.xml"
          test "$(git diff --numstat | awk '{print $1+$2}')" -eq 44

      - name: Commit exact XML repair
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/XML/imbuements.xml
          git commit -m "fix(imbuement): map Powerful unlocks to active boss storages"
          git push origin HEAD:fix/imbuement-forgotten-knowledge-storages
