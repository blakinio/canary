name: Apply Wheel grade and protocol follow-up

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/apply-wheel-followup.yml

permissions:
  contents: write

jobs:
  apply-patch:
    runs-on: ubuntu-latest
    steps:
      - name: Check out staging branch
        uses: actions/checkout@v4
        with:
          ref: validation/wheel-followup-stage
          fetch-depth: 0

      - name: Reconstruct and verify patch
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          : > /tmp/wheel-followup.patch.gz.b64
          for blob in \
            0ecd3869d6132aa40466cc6ecd869c0056d714c0 \
            c7246cb96bdb022ff4081226e10c3e0053c08b48 \
            04ae5db8925145e79923352015a37e77be98755a \
            e422b725394a13b50ddbb958baf21251354ffe73
          do
            gh api "repos/${GITHUB_REPOSITORY}/git/blobs/${blob}" --jq .content \
              | tr -d '\n' \
              | base64 --decode \
              | tr -d '\n' >> /tmp/wheel-followup.patch.gz.b64
          done
          base64 --decode /tmp/wheel-followup.patch.gz.b64 | gzip --decompress > /tmp/wheel-followup.patch
          echo "df177498f2ba826c385ca699561ed5539cd1a006c978a2e552957a90225ab43f  /tmp/wheel-followup.patch" | sha256sum --check --strict
          git apply --check /tmp/wheel-followup.patch

      - name: Apply patch and remove staging workflow
        run: |
          set -euo pipefail
          git apply /tmp/wheel-followup.patch
          rm -f .github/workflows/apply-wheel-followup.yml
          git diff --check

      - name: Commit follow-up
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix(wheel): enforce gem grades and harden protocol"
          git push origin HEAD:validation/wheel-followup-stage
