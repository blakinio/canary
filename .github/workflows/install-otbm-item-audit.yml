name: Install OTBM Item Audit

on:
  push:
    branches:
      - feat/otbm-item-audit
    paths:
      - .github/item-audit/payload.tar.gz.b64

permissions:
  contents: write

jobs:
  install-test-commit:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout item audit branch
        uses: actions/checkout@v4
        with:
          ref: feat/otbm-item-audit
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Restore exact source payload
        shell: bash
        run: |
          base64 --decode .github/item-audit/payload.tar.gz.b64 > /tmp/otbm-item-audit.tar.gz
          echo "f4f8510844bccc72ff8d1a267e1c909bb5eaebcc0cd6ba1dae673e8ac27dfc8d  /tmp/otbm-item-audit.tar.gz" | sha256sum --check
          tar -xzf /tmp/otbm-item-audit.tar.gz
          chmod +x tools/ai-agent/otbm_item_audit_tool.py

      - name: Compile native scanner with warnings
        run: |
          c++ -O2 -std=c++20 -Wall -Wextra -Wpedantic \
            tools/ai-agent/otbm_item_audit_scan.cpp \
            -o /tmp/otbm_item_audit_scan

      - name: Run focused tests
        run: python -m unittest tools/ai-agent/test_otbm_item_audit.py -v

      - name: Validate report schema
        run: python -m json.tool docs/ai-agent/OTBM_ITEM_AUDIT_REPORT.schema.json > /dev/null

      - name: Remove one-shot installer and commit tested files
        shell: bash
        run: |
          git rm .github/workflows/install-otbm-item-audit.yml .github/item-audit/payload.tar.gz.b64
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tools/ai-agent docs/ai-agent
          git diff --cached --check
          git commit -m "feat(ai-agent): audit OTBM item usage and map mechanics"
          git push origin HEAD:feat/otbm-item-audit
