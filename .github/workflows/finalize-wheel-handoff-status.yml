---
name: Finalize Wheel handoff status line

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/finalize-wheel-handoff-status.yml

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out final handoff branch
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          ref: docs/wheel-validation-final-handoff
          fetch-depth: 0

      - name: Replace stale pending-status line
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          path = Path("docs/ai-agent/OTS_AI_WHEEL_OF_DESTINY_VALIDATION.md")
          text = path.read_text(encoding="utf-8")
          old = "- Status: local third patch prepared; formatting/build/CI evidence pending."
          new = "- Status: merged to `main` via PR #220; remaining Tibia 15.25 gaps are explicitly tracked below."

          if text.count(old) != 1:
              raise SystemExit(f"expected one stale status line, found {text.count(old)}")

          text = text.replace(old, new, 1)
          if "CI evidence pending" in text:
              raise SystemExit("stale pending-CI wording remains")

          path.write_text(text, encoding="utf-8")
          PY

          rm -f .github/workflows/finalize-wheel-handoff-status.yml
          git diff --check

      - name: Commit corrected status line
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "docs(ai-agent): record merged Wheel validation status"
          git push origin HEAD:docs/wheel-validation-final-handoff
