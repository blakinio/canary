name: Apply bank StyLua formatting

on:
  pull_request:
    types: [synchronize]
    branches: [main]

permissions:
  contents: write

jobs:
  apply-format:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.head_ref == 'fix/issues-3374-3453-3645'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - name: Apply exact autofix artifact
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("data/npclib/npc_system/bank_system.lua")
          text = path.read_text()
          replacements = [
              (
                  '''\t\t\t\tlocal messageText = count[playerId] and count[playerId] > maximumWithdrawal
          \t\t\t\t\tand string.format("You can withdraw at most %d gold at a time.", maximumWithdrawal)
          \t\t\t\t\tor "There is not enough gold on your account."''',
                  '''\t\t\t\tlocal messageText = count[playerId] and count[playerId] > maximumWithdrawal and string.format("You can withdraw at most %d gold at a time.", maximumWithdrawal) or "There is not enough gold on your account."''',
              ),
              (
                  '''\t\t\tlocal messageText = count[playerId] and count[playerId] > maximumWithdrawal
          \t\t\t\tand string.format("You can withdraw at most %d gold at a time.", maximumWithdrawal)
          \t\t\t\tor "There is not enough gold on your account."''',
                  '''\t\t\tlocal messageText = count[playerId] and count[playerId] > maximumWithdrawal and string.format("You can withdraw at most %d gold at a time.", maximumWithdrawal) or "There is not enough gold on your account."''',
              ),
          ]
          for old, new in replacements:
              if text.count(old) != 1:
                  raise SystemExit(f"expected one formatter target, found {text.count(old)}")
              text = text.replace(old, new, 1)
          path.write_text(text)
          PY
          rm .github/automation/format-bank-system.patch
          rm .github/workflows/apply-format-bank-system.yml
          git diff --check
      - name: Commit formatting
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "style: apply StyLua bank formatting"
          git push origin "HEAD:${{ github.head_ref }}"
