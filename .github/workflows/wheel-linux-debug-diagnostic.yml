---
name: Wheel Linux Debug Diagnostic

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/wheel-linux-debug-diagnostic.yml

permissions:
  actions: read
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-24.04
    steps:
      - name: Download failed linux-debug job log
        env:
          GH_TOKEN: ${{ github.token }}
          FAILED_JOB_ID: "86700266318"
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p wheel-debug-diagnostic

          curl --fail --location \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "Accept: application/vnd.github+json" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/jobs/${FAILED_JOB_ID}/logs" \
            --output wheel-debug-diagnostic/job-download

          if file wheel-debug-diagnostic/job-download | grep -qi 'zip archive'; then
            unzip -p wheel-debug-diagnostic/job-download > wheel-debug-diagnostic/job.log
          else
            cp wheel-debug-diagnostic/job-download wheel-debug-diagnostic/job.log
          fi

          grep -nEi \
            '(^|[^[:alpha:]])(error:|fatal error:|undefined reference|collect2:|FAILED:|Killed signal|ninja: build stopped|compilation terminated)' \
            wheel-debug-diagnostic/job.log \
            | tail -n 300 > wheel-debug-diagnostic/errors.txt || true

          tail -n 600 wheel-debug-diagnostic/job.log > wheel-debug-diagnostic/tail.txt

          echo "=== MATCHED ERRORS ==="
          cat wheel-debug-diagnostic/errors.txt
          echo "=== LOG TAIL ==="
          cat wheel-debug-diagnostic/tail.txt

      - name: Upload diagnostic logs
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: wheel-linux-debug-log-extract
          path: wheel-debug-diagnostic/
          if-no-files-found: error
          retention-days: 1
