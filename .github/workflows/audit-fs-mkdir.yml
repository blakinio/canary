name: Audit FS mkdir

on:
  push:
    branches:
      - security/fs-mkdir-shell-free
    paths:
      - .github/workflows/audit-fs-mkdir.yml
      - tools/ai-agent/audit_fs_mkdir.py
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: audit-fs-mkdir-${{ github.ref }}
  cancel-in-progress: false

jobs:
  audit:
    if: github.repository == 'blakinio/canary' && github.ref == 'refs/heads/security/fs-mkdir-shell-free'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout task branch
        uses: actions/checkout@v4
        with:
          ref: security/fs-mkdir-shell-free
          fetch-depth: 0
          persist-credentials: true

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Generate deterministic audit
        run: python3 tools/ai-agent/audit_fs_mkdir.py

      - name: Validate generated reports
        run: |
          python3 -m json.tool artifacts/upstream/crystalserver/cs006_fs_mkdir_audit.json >/dev/null
          test -s artifacts/upstream/crystalserver/CS006_FS_MKDIR_AUDIT.md
          git diff --check

      - name: Remove temporary runner and stage ignored reports explicitly
        run: |
          rm -f tools/ai-agent/audit_fs_mkdir.py
          rm -f .github/workflows/audit-fs-mkdir.yml
          git add -f artifacts/upstream/crystalserver/CS006_FS_MKDIR_AUDIT.md
          git add -f artifacts/upstream/crystalserver/cs006_fs_mkdir_audit.json
          git add -A tools/ai-agent/audit_fs_mkdir.py .github/workflows/audit-fs-mkdir.yml

      - name: Enforce exact changed-file allowlist
        run: |
          mapfile -t changed < <(git diff --cached --name-only)
          printf '%s\n' "${changed[@]}"
          allowed='^(artifacts/upstream/crystalserver/CS006_FS_MKDIR_AUDIT\.md|artifacts/upstream/crystalserver/cs006_fs_mkdir_audit\.json|tools/ai-agent/audit_fs_mkdir\.py|\.github/workflows/audit-fs-mkdir\.yml)$'
          for path in "${changed[@]}"; do
            if [[ ! "$path" =~ $allowed ]]; then
              echo "Unexpected changed path: $path" >&2
              exit 1
            fi
          done
          test -n "${changed[*]}"
          test ! -e tools/ai-agent/audit_fs_mkdir.py
          test ! -e .github/workflows/audit-fs-mkdir.yml
          git diff --cached --check

      - name: Commit audit evidence and self-removal
        run: |
          git commit -m "docs(security): publish FS mkdir call-site audit"
          git push origin HEAD:security/fs-mkdir-shell-free
