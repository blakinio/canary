---
name: Cyclopedia Live E2E

# Paused experiment: preserve the workflow for manual historical use only.
on:
  workflow_dispatch:

permissions:
  contents: write
  actions: read
  packages: write

jobs:
  build-canary:
    name: Build exact Canary diagnostic head
    permissions:
      contents: write
      packages: write
    uses: ./.github/workflows/reusable-build-linux.yml
    with:
      buildtypes: '["linux-release"]'
      run_canary_smoke: false
      run_global_smoke: false
    secrets: inherit

  live-e2e:
    name: OTClient ↔ Canary ↔ MySQL
    needs: [build-canary]
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    permissions:
      contents: read
      actions: read
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: cyclopedia_e2e
        ports: ["3306:3306"]
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -proot"
          --health-interval=10s --health-timeout=5s --health-retries=12

    steps:
      - name: Checkout exact Canary test head
        uses: actions/checkout@v6

      - name: Checkout maintained OTClient source
        uses: actions/checkout@v6
        with:
          repository: opentibiabr/otclient
          path: otclient

      - name: Checkout matching client assets
        uses: actions/checkout@v6
        with:
          repository: dudantas/tibia-client
          path: tibia-client-assets
          lfs: true

      - name: Download exact-head Canary binary
        uses: actions/download-artifact@v4
        with:
          name: canary-linux-release
          path: canary-bin

      - name: Download maintained OTClient binary
        uses: dawidd6/action-download-artifact@v11
        with:
          repo: opentibiabr/otclient
          workflow: ci.yml
          branch: main
          workflow_conclusion: success
          name: linux-linux-release
          path: otclient-bin
          search_artifacts: true

      - name: Install runtime dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            imagemagick libgl1 libglu1-mesa libopenal1 libpulse0 \
            libx11-6 libxcursor1 libxi6 libxinerama1 libxrandr2 \
            mysql-client tcpdump x11-utils xvfb

      - name: Resolve binaries and protocol version
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts
          find canary-bin otclient-bin -maxdepth 5 -type f -print | tee artifacts/downloaded-files.txt
          CANARY_BIN="$(find canary-bin -type f -name 'canary' | head -n 1)"
          OTCLIENT_BIN="$(find otclient-bin -type f \( -name 'otclient' -o -name 'otclient-*' \) | head -n 1)"
          test -n "${CANARY_BIN}" && test -n "${OTCLIENT_BIN}"
          CLIENT_VERSION="$(grep -E 'static constexpr auto CLIENT_VERSION[[:space:]]*=' src/core.hpp | grep -Eo '[0-9]+' | tail -n 1)"
          ASSET_VERSION="$(tr -cd '0-9.' < tibia-client-assets/package.json.version | cut -d. -f1,2 | tr -d '.')"
          test -n "${CLIENT_VERSION}"
          [[ "${ASSET_VERSION}" == "${CLIENT_VERSION}" ]]
          chmod +x "${CANARY_BIN}" "${OTCLIENT_BIN}"
          echo "CANARY_BIN=${GITHUB_WORKSPACE}/${CANARY_BIN}" >> "${GITHUB_ENV}"
          echo "OTCLIENT_BIN=${GITHUB_WORKSPACE}/${OTCLIENT_BIN}" >> "${GITHUB_ENV}"
          echo "CLIENT_VERSION=${CLIENT_VERSION}" >> "${GITHUB_ENV}"
          printf 'Canary=%s\nCanaryArtifactHead=%s\nOTClient=%s\nVersion=%s\nAssetVersion=%s\nTestHead=%s\n' \
            "${CANARY_BIN}" "${GITHUB_SHA}" "${OTCLIENT_BIN}" \
            "${CLIENT_VERSION}" "${ASSET_VERSION}" "${GITHUB_SHA}" \
            | tee artifacts/resolved-runtime.txt
          ldd "${CANARY_BIN}" | tee artifacts/canary-ldd.txt || true
          ldd "${OTCLIENT_BIN}" | tee artifacts/otclient-ldd.txt || true

      - name: Initialize disposable MySQL database
        shell: bash
        env:
          MYSQL_PWD: root
        run: |
          set -euo pipefail
          for _ in $(seq 1 60); do
            mysql -h 127.0.0.1 -P 3306 -u root -e 'SELECT 1' >/dev/null 2>&1 && break
            sleep 2
          done
          mysql -h 127.0.0.1 -P 3306 -u root cyclopedia_e2e < schema.sql
          mysql -h 127.0.0.1 -P 3306 -u root cyclopedia_e2e < docker/data/01-test_account.sql
          mysql -h 127.0.0.1 -P 3306 -u root cyclopedia_e2e < docker/data/02-test_account_players.sql
          mysql -h 127.0.0.1 -P 3306 -u root cyclopedia_e2e -e 'DELETE FROM boosted_boss;'
          mysql -h 127.0.0.1 -P 3306 -u root cyclopedia_e2e \
            -e "SELECT id,name,email FROM accounts WHERE id=101; SELECT id,name,account_id,level FROM players WHERE name='Knight 1';" \
            | tee artifacts/test-fixtures.tsv

      - name: Prepare global map and isolated server config
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p data-otservbr-global/world
          MAP_URL="$(grep -E '^mapDownloadUrl[[:space:]]*=' config.lua.dist | sed -E 's/.*"([^"]+)".*/\1/')"
          test -n "${MAP_URL}"
          curl --fail --location --retry 5 --retry-delay 5 "${MAP_URL}" \
            --output data-otservbr-global/world/otservbr.otbm
          test -s data-otservbr-global/world/otservbr.otbm
          sha256sum data-otservbr-global/world/otservbr.otbm | tee artifacts/map.sha256
          python3 - <<'PY'
          import re
          from pathlib import Path

          config = Path('config.lua.dist').read_text(encoding='utf-8')
          values = {
              'dataPackDirectory': '"data-otservbr-global"', 'mapName': '"otservbr"',
              'mapDownloadUrl': '""', 'toggleDownloadMap': 'false', 'toggleMapCustom': 'false',
              'startupDatabaseOptimization': 'false', 'mysqlDatabaseBackup': 'false',
              'toggleSaveInterval': 'false', 'forgeInfluencedLimit': '0', 'forgeFiendishLimit': '0',
              'ip': '"127.0.0.1"', 'loginProtocolPort': '7171', 'gameProtocolPort': '7172',
              'statusProtocolPort': '7171', 'serverName': '"Canary E2E"', 'houseRentPeriod': '"never"',
              'mysqlHost': '"127.0.0.1"', 'mysqlUser': '"root"', 'mysqlPass': '"root"',
              'mysqlDatabase': '"cyclopedia_e2e"', 'mysqlPort': '3306', 'mysqlSock': '""',
              'metricsEnablePrometheus': 'false', 'metricsEnableOstream': 'false',
          }
          for key, value in values.items():
              pattern = re.compile(rf'^{re.escape(key)}\s*=.*$', re.MULTILINE)
              if len(pattern.findall(config)) != 1:
                  raise SystemExit(f'expected exactly one config key {key}')
              config = pattern.sub(f'{key} = {value}', config, count=1)

          auth_pattern = re.compile(r'^authType\s*=.*$', re.MULTILINE)
          if auth_pattern.search(config):
              config = auth_pattern.sub('authType = "password"', config, count=1)
          else:
              config += '\nauthType = "password"\n'
          Path('config.lua').write_text(config, encoding='utf-8')
          PY

      - name: Install runtime-only Bestiary probe
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p data/modules/scripts/e2e
          python3 - <<'PY'
          from pathlib import Path

          path = Path('data/modules/modules.xml')
          text = path.read_text(encoding='utf-8')
          marker = '</modules>'
          probe = '  <module type="recvbyte" byte="225" script="e2e/bestiary_probe.lua"/>\n'
          if probe not in text:
              if text.count(marker) != 1:
                  raise SystemExit('unexpected modules.xml structure')
              text = text.replace(marker, probe + marker)
          path.write_text(text, encoding='utf-8')
          PY
          cat > data/modules/scripts/e2e/bestiary_probe.lua <<'LUA'
          print('[E2E_BESTIARY_PROBE] module loaded')
          function onRecvbyte(player, msg, byte)
              print(string.format('[E2E_BESTIARY_PROBE] recv=0x%02X unread=%d player=%s', byte, msg:getUnreadBytes(), player:getName()))
              local response = NetworkMessage()
              response:addByte(0xD5)
              response:addU16(0)
              response:sendToPlayer(player)
              print('[E2E_BESTIARY_PROBE] sent minimal D5 response')
          end
          LUA
          grep -n 'bestiary_probe' data/modules/modules.xml | tee artifacts/bestiary-probe-registration.txt
          sha256sum data/modules/scripts/e2e/bestiary_probe.lua | tee artifacts/bestiary-probe.sha256

      - name: Install verified OTClient assets
        shell: bash
        run: |
          set -euo pipefail
          test -s tibia-client-assets/assets/catalog-content.json
          TARGET="otclient/data/things/${CLIENT_VERSION}"
          rm -rf "${TARGET}" && mkdir -p "${TARGET}"
          cp -a tibia-client-assets/assets/. "${TARGET}/"
          test -s "${TARGET}/catalog-content.json"
          sha256sum "${TARGET}/catalog-content.json" | tee artifacts/catalog-content.sha256
          sha256sum tibia-client-assets/package.json.version | tee artifacts/assets-version.sha256
          printf 'asset_version=%s\n' "$(cat tibia-client-assets/package.json.version)" | tee artifacts/assets-version.txt
          du -sh "${TARGET}" | tee artifacts/assets-size.txt

      - name: Configure OTClient automation
        shell: bash
        run: |
          set -euo pipefail
          cp tools/e2e/cyclopedia_otclient_e2e.lua otclient/otclientrc.lua
          python3 - <<'PY'
          from pathlib import Path

          path = Path('otclient/init.lua')
          text = path.read_text(encoding='utf-8').replace('enabled = true,', 'enabled = false,', 1)
          text = text.replace('installSounds = true,', 'installSounds = false,', 1)
          path.write_text(text, encoding='utf-8')
          PY

      - name: Start exact-head Canary diagnostic server
        shell: bash
        run: |
          set -euo pipefail
          "${CANARY_BIN}" > artifacts/canary.stdout.log 2> artifacts/canary.stderr.log &
          echo $! > artifacts/canary.pid
          for _ in $(seq 1 450); do
            if ! kill -0 "$(cat artifacts/canary.pid)" 2>/dev/null; then
              cat artifacts/canary.stdout.log artifacts/canary.stderr.log
              exit 1
            fi
            grep -qi 'server online!' artifacts/canary.stdout.log artifacts/canary.stderr.log && break
            sleep 2
          done
          grep -qi 'server online!' artifacts/canary.stdout.log artifacts/canary.stderr.log
          python3 - <<'PY'
          import socket

          for port in (7171, 7172):
              with socket.create_connection(('127.0.0.1', port), timeout=10):
                  print(f'port {port} reachable')
          PY
          grep 'E2E_BESTIARY_PROBE' artifacts/canary.stdout.log | tee artifacts/bestiary-probe-load.log
          MYSQL_PWD=root mysql -h 127.0.0.1 -P 3306 -u root cyclopedia_e2e \
            -e 'SELECT * FROM boosted_boss;' | tee artifacts/boosted-boss-after-start.tsv
          test "$(MYSQL_PWD=root mysql -N -s -h 127.0.0.1 -P 3306 -u root cyclopedia_e2e -e 'SELECT COUNT(*) FROM boosted_boss;')" -ge 1

      - name: Run physical OTClient under Xvfb with relog
        shell: bash
        env:
          CYCLOPEDIA_E2E_CLIENT_VERSION: ${{ env.CLIENT_VERSION }}
          CYCLOPEDIA_E2E_ACCOUNT: test1@example.com
          CYCLOPEDIA_E2E_PASSWORD: test
          CYCLOPEDIA_E2E_CHARACTER: Knight 1
          CYCLOPEDIA_E2E_HOST: 127.0.0.1
          CYCLOPEDIA_E2E_PORT: 7172
          CYCLOPEDIA_E2E_WORLD: Canary E2E
          CYCLOPEDIA_E2E_STARTUP_MODE: minimal
        run: |
          set -euo pipefail
          export DISPLAY=:99
          Xvfb :99 -screen 0 1280x800x24 > artifacts/xvfb.log 2>&1 &
          echo $! > artifacts/xvfb.pid
          sudo tcpdump -U -nn -i lo -s 0 -w artifacts/game-port.pcap 'tcp port 7172' \
            > artifacts/tcpdump.stdout.log 2> artifacts/tcpdump.stderr.log &
          echo $! > artifacts/tcpdump.pid
          sleep 2
          (cd otclient && timeout --signal=TERM 180 "${OTCLIENT_BIN}" \
            > ../artifacts/otclient.stdout.log 2> ../artifacts/otclient.stderr.log) &
          echo $! > artifacts/otclient.pid

          online=false
          phase=false
          for _ in $(seq 1 120); do
            [[ -f otclient/e2e-result.txt ]] && grep -q '^login_1=success$' otclient/e2e-result.txt && online=true
            [[ -f otclient/e2e-result.txt ]] && grep -q '^phase_1=complete$' otclient/e2e-result.txt && { phase=true; break; }
            kill -0 "$(cat artifacts/otclient.pid)" 2>/dev/null || break
            sleep 1
          done

          import -display :99 -window root artifacts/cyclopedia-client.png || true
          [[ -f otclient/e2e-result.txt ]] && cp otclient/e2e-result.txt artifacts/e2e-result.txt || true
          MYSQL_PWD=root mysql -h 127.0.0.1 -P 3306 -u root cyclopedia_e2e \
            -e "SELECT * FROM players_online; SELECT id,name,lastlogin,lastlogout FROM players WHERE name='Knight 1';" \
            | tee artifacts/database-at-client-end.tsv || true
          ss -tinp '( sport = :7172 or dport = :7172 )' > artifacts/game-port-sockets.txt || true
          if [[ -f artifacts/tcpdump.pid ]]; then
            sudo kill -INT "$(cat artifacts/tcpdump.pid)" 2>/dev/null || true
            wait "$(cat artifacts/tcpdump.pid)" 2>/dev/null || true
          fi
          sudo tcpdump -nn -tttt -r artifacts/game-port.pcap > artifacts/game-port-packets.txt 2>&1 || true
          grep -E 'E2E_BESTIARY_PROBE|CyclopediaE2E|TransportCodec::prepareInbound|TransportCodec::decryptXtea' \
            artifacts/canary.stdout.log artifacts/canary.stderr.log > artifacts/server-diagnostic-markers.log || true

          if [[ "${online}" != true || "${phase}" != true ]]; then
            cat artifacts/e2e-result.txt artifacts/otclient.stdout.log artifacts/otclient.stderr.log \
              artifacts/server-diagnostic-markers.log artifacts/game-port-packets.txt 2>/dev/null || true
            exit 1
          fi

          MYSQL_PWD=root mysql -h 127.0.0.1 -P 3306 -u root cyclopedia_e2e \
            -e "SELECT * FROM players_online; SELECT id,name,lastlogin,lastlogout FROM players WHERE name='Knight 1';" \
            | tee artifacts/database-during-client.tsv
          wait "$(cat artifacts/otclient.pid)"
          cp otclient/e2e-result.txt artifacts/e2e-result.txt
          cat artifacts/e2e-result.txt
          for marker in session_key_mode_1=password direct_game_login_1= login_1=success \
            bestiary_1= charms_1= bosstiary_1= phase_1=complete logout_1=complete \
            session_key_mode_2=password direct_game_login_2= login_2=success \
            bestiary_2= charms_2= bosstiary_2= phase_2=complete logout_2=complete e2e=success; do
            grep -q "^${marker}" artifacts/e2e-result.txt
          done

      - name: Verify database state after client exit
        shell: bash
        env:
          MYSQL_PWD: root
        run: |
          set -euo pipefail
          mysql -h 127.0.0.1 -P 3306 -u root cyclopedia_e2e \
            -e "SELECT * FROM players_online; SELECT id,name,lastlogin,lastlogout FROM players WHERE name='Knight 1'; SELECT * FROM boosted_boss;" \
            | tee artifacts/database-after-client.tsv
          test "$(mysql -N -s -h 127.0.0.1 -P 3306 -u root cyclopedia_e2e -e 'SELECT COUNT(*) FROM players_online;')" -eq 0
          test "$(mysql -N -s -h 127.0.0.1 -P 3306 -u root cyclopedia_e2e -e "SELECT lastlogin > 0 FROM players WHERE name='Knight 1';")" -eq 1
          test "$(mysql -N -s -h 127.0.0.1 -P 3306 -u root cyclopedia_e2e -e 'SELECT COUNT(*) FROM boosted_boss;')" -ge 1
          ! grep -Eqi 'unhandled|parse error|protocol error|segmentation fault|assertion failed|fatal error' \
            artifacts/otclient.stdout.log artifacts/otclient.stderr.log artifacts/otclient.internal.log

      - name: Stop services
        if: always()
        shell: bash
        run: |
          if [[ -f artifacts/tcpdump.pid ]]; then
            sudo kill -INT "$(cat artifacts/tcpdump.pid)" 2>/dev/null || true
          fi
          for pidfile in artifacts/otclient.pid artifacts/canary.pid artifacts/xvfb.pid; do
            [[ -f "${pidfile}" ]] && kill "$(cat "${pidfile}")" 2>/dev/null || true
          done
          [[ -f artifacts/game-port.pcap ]] && \
            sudo tcpdump -nn -tttt -r artifacts/game-port.pcap > artifacts/game-port-packets.txt 2>&1 || true

      - name: Upload live E2E evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cyclopedia-live-e2e
          path: artifacts/
          if-no-files-found: warn
          retention-days: 14
