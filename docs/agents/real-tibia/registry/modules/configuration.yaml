{
  "schema_version": 1,
  "module_id": "configuration",
  "name": "Configuration",
  "category": "engine-foundation",
  "description": "Typed server configuration loading, reload boundaries, default configuration and feature-flag discovery without owning the feature behavior controlled by those values.",
  "lifecycle": {
    "status": "inventory",
    "program": "docs/agents/programs/TIBIA_SYSTEM_DECOMPOSITION_PROGRAM.md"
  },
  "scope": {
    "includes": [
      "configuration key definitions and typed access",
      "config.lua loading and reload boundaries",
      "default configuration discovery",
      "server and maintained-client feature flag configuration"
    ],
    "excludes": [
      "gameplay behavior enabled by a configuration value",
      "production configuration changes",
      "secret management",
      "protocol correctness claims",
      "runtime feature validation"
    ]
  },
  "paths": {
    "server": [
      "src/config/**"
    ],
    "client": [],
    "data": [
      "config.lua.dist"
    ],
    "tests": [],
    "docs": [
      "docs/agents/programs/TIBIA_SYSTEM_DECOMPOSITION_PROGRAM.md",
      "docs/agents/real-tibia/TIBIA_SYSTEM_DECOMPOSITION_REPORT.md"
    ]
  },
  "relationships": {
    "depends_on": [],
    "interacts_with": [
      "engine-runtime-lifecycle",
      "lua-runtime",
      "protocol"
    ]
  },
  "documents": {
    "program": "docs/agents/programs/TIBIA_SYSTEM_DECOMPOSITION_PROGRAM.md",
    "validation": [
      "docs/agents/real-tibia/TIBIA_SYSTEM_DECOMPOSITION_REPORT.md"
    ]
  },
  "source_requirements": [
    {"source": "canary-current", "mode": "required"},
    {"source": "runtime-observation", "mode": "required-when-related"}
  ],
  "maturity": {
    "implementation": "inventory",
    "evidence": "inventory",
    "persistence": "not-assessed",
    "protocol": "not-assessed",
    "automated_tests": "not-assessed",
    "runtime_validation": "not-assessed",
    "gameplay_e2e": "not-assessed"
  },
  "freshness": {
    "class": "medium",
    "last_inventory": "2026-07-14",
    "warning_after_days": 30,
    "invalid_after_days": 90,
    "refresh_before_each_task": true
  },
  "notes": [
    "Configuration paths are discovery hints and do not authorize production changes.",
    "A key or default value does not prove that the controlled feature behaves correctly.",
    "Protocol-facing feature flags still require server-write, wire, client-parse and runtime proof."
  ]
}
