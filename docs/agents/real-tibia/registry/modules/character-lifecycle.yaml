{
  "schema_version": 1,
  "module_id": "character-lifecycle",
  "name": "Character Lifecycle",
  "category": "social-account",
  "description": "Authenticated character ownership, load/save, online-only component initialization and logout/reload boundary discovery.",
  "lifecycle": {
    "status": "inventory",
    "program": "docs/agents/programs/TIBIA_SYSTEM_DECOMPOSITION_PROGRAM.md"
  },
  "scope": {
    "includes": [
      "account-to-character ownership validation",
      "player load by id or name",
      "always-loaded and online-only component initialization",
      "player save and save-guard orchestration",
      "logout, reload and deletion-state lifecycle boundaries"
    ],
    "excludes": [
      "account credential verification internals",
      "wire-level login and game-session transport",
      "feature-specific progression formulas",
      "proof of save atomicity, completeness or crash recovery"
    ]
  },
  "paths": {
    "server": [
      "src/creatures/players/player.*",
      "src/io/iologindata.*",
      "src/io/functions/iologindata_load_player.cpp",
      "src/io/functions/iologindata_save_player.cpp"
    ],
    "client": [],
    "data": [],
    "tests": [
      "tests/unit/io/**"
    ],
    "docs": [
      "docs/agents/programs/TIBIA_SYSTEM_DECOMPOSITION_PROGRAM.md",
      "docs/agents/real-tibia/TSD_003_ACCOUNT_CHARACTER_PROGRESSION_REPORT.md"
    ]
  },
  "relationships": {
    "depends_on": [
      "account-authentication",
      "player-persistence"
    ],
    "interacts_with": [
      "account-lifecycle",
      "character-progression",
      "protocol",
      "world-persistence"
    ]
  },
  "documents": {
    "program": "docs/agents/programs/TIBIA_SYSTEM_DECOMPOSITION_PROGRAM.md",
    "validation": [
      "docs/agents/real-tibia/TSD_003_ACCOUNT_CHARACTER_PROGRESSION_REPORT.md"
    ]
  },
  "source_requirements": [
    {"source": "canary-current", "mode": "required"},
    {"source": "runtime-observation", "mode": "required-when-related"},
    {"source": "maintained-otclient", "mode": "required-when-related"}
  ],
  "maturity": {
    "implementation": "inventory",
    "evidence": "inventory",
    "persistence": "not-assessed",
    "protocol": "not-assessed",
    "automated_tests": "not-assessed",
    "runtime_validation": "not-assessed",
    "gameplay_e2e": "not-assessed"
  },
  "freshness": {
    "class": "fast",
    "last_inventory": "2026-07-14",
    "warning_after_days": 30,
    "invalid_after_days": 90,
    "refresh_before_each_task": true
  },
  "notes": [
    "Character creation and deletion remain conceptual lifecycle steps; this inventory does not claim that Canary implements every account-management operation.",
    "The record deliberately overlaps the broad player-persistence umbrella without replacing it."
  ]
}