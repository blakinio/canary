{
  "schema_version": 1,
  "module_id": "engine-scheduler",
  "name": "Engine Scheduler",
  "category": "engine-foundation",
  "description": "Generic engine task dispatch, delayed and cyclic scheduling, execution grouping, worker-pool integration, cancellation and scheduler shutdown discovery.",
  "lifecycle": {
    "status": "inventory",
    "program": "docs/agents/programs/TIBIA_SYSTEM_DECOMPOSITION_PROGRAM.md"
  },
  "scope": {
    "includes": [
      "dispatcher task queues and execution groups",
      "delayed and cyclic task scheduling",
      "task cancellation and dispatcher context",
      "thread-pool execution substrate",
      "scheduler shutdown signaling and queue-latency inventory"
    ],
    "excludes": [
      "gameplay event-rate schedules",
      "save and persistence scheduling",
      "feature-specific timers and callbacks",
      "claims of ordering, fairness, race freedom or shutdown correctness"
    ]
  },
