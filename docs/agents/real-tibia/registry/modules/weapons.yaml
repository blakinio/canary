  "lifecycle": {
    "status": "inventory",
    "program": "docs/agents/programs/TIBIA_SYSTEM_DECOMPOSITION_PROGRAM.md"
  },
  "scope": {
    "includes": [
      "weapon registry and script registration",
      "wield, level, magic-level, premium and vocation checks",
      "melee, distance and wand weapon types",
      "weapon damage and elemental damage calculation surfaces",
      "resource, charge, break and item-count consumption",
      "combat, chain and proficiency integration points"
    ],
    "excludes": [
      "generic combat permission and mitigation rules",
      "spell and rune registration owned by the spell system",
      "item economy and market lifecycle",
      "individual weapon classes as standalone modules",
      "proof of weapon formula, hit chance or resource-consumption parity"
    ]
  },
